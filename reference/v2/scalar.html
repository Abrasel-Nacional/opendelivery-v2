<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  </style>
</head>
<body>
<script>
  /* Lee o nome do arquivo de spec via ?spec=nome-do-arquivo.yaml */
  var specFile = new URLSearchParams(window.location.search).get('spec') || '';
  var el = document.createElement('script');
  el.id = 'api-reference';
  if (specFile) el.setAttribute('data-url', specFile);
  document.body.appendChild(el);
</script>
<script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
</body>
</html>
