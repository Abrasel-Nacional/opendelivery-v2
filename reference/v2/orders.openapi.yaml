- name: Orders
  description: |-
    Order snapshot and lifecycle progression operations.

    ## Lifecycle operating model

    - There is **no** `POST /orders` create endpoint in V2. Orders enter the protocol via
      event (`CREATED`) and are read with `GET /orders/{orderId}`.
    - There is **no** `POST /orders/{orderId}/conclude` endpoint in V2. `CONCLUDED` is an
      originator-defined event, emitted by the Ordering Application according to its own
      business timing (for example after `DELIVERED`, user action, or timeout policy).
    - Lifecycle transitions are **async-first**: a `202 Accepted` means accepted for
      processing, not final state confirmation.
    - Reconcile with `GET /orders/{orderId}` (`order.status` is authoritative).

    ## Discovery-driven optional behavior

    Optional (`MAY`) lifecycle events in this capability SHOULD be treated as active
    integration commitments only when declared in [Discovery](../discovery/).

    Consumers SHOULD rely on:
    - all mandatory (`MUST`) behavior, and
    - optional (`MAY`) behavior explicitly declared in Discovery.

    ## Status machine (authoritative states)

    ```mermaid
    stateDiagram-v2
        direction LR
        [*] --> CREATED
        CREATED --> CONFIRMED: confirm
        CONFIRMED --> PREPARING: preparing
        PREPARING --> READY: ready-for-pickup
        CONFIRMED --> READY: ready-for-pickup
        READY --> IN_DELIVERY: dispatch (DELIVERY)
        READY --> DELIVERED: delivered (TAKEOUT/INDOOR)
        IN_DELIVERY --> DELIVERED: delivered
        CREATED --> CANCELLED: CANCELLED (OA decision)
        CONFIRMED --> CANCELLED: CANCELLED (OA decision)
        PREPARING --> CANCELLED: CANCELLED (OA decision)
        READY --> CANCELLED: CANCELLED (OA decision)
        IN_DELIVERY --> CANCELLED: CANCELLED (OA decision)
        DELIVERED --> CONCLUDED: CONCLUDED (originator-defined timing)
        CANCELLED --> CONCLUDED: CONCLUDED (originator-defined timing)
    ```

    | Status | Meaning |
    |---|---|
    | `CREATED` | Registered; awaiting merchant confirmation |
    | `CONFIRMED` | Merchant accepted the order |
    | `PREPARING` | Preparation in progress |
    | `READY` | Ready for courier pickup, customer collection, or service |
    | `IN_DELIVERY` | Out for delivery (`DELIVERY` only) |
    | `DELIVERED` | Customer received / collected / served |
    | `CANCELLED` | Order cancelled (final cancel state) |
    | `CONCLUDED` | Logical closure after delivery or cancellation |

    ## Event matrix by profile

    Legend: **MUST** / **MAY** / **MUST NOT** (reject with `422` if a MUST NOT event is forced for the profile).
    For optional behavior, Discovery declarations define which `MAY` events are expected
    between counterparties.

    ### DELIVERY

    | Event | Projects status | Obligation | Notes |
    |---|---|---|---|
    | `CREATED` | `CREATED` | MUST | Entry signal |
    | `CONFIRMED` | `CONFIRMED` | MUST | After confirm |
    | `PREPARATION_REQUESTED` | (unchanged) | MAY | Informational / on-demand prep |
    | `PREPARING` | `PREPARING` | MAY | |
    | `READY_FOR_PICKUP` | `READY` | MAY | Ready for courier |
    | `PICKUP_ONGOING` | (unchanged) | MAY | Informational logistics |
    | `RIDER_ARRIVED_AT_STORE` | (unchanged) | MAY | Informational logistics |
    | `DISPATCHED` | `IN_DELIVERY` | MAY | Under review for deprecation in later RC |
    | `ORDER_COLLECTED` | `IN_DELIVERY` | MAY | Full-service logistics handoff |
    | `DELIVERY_ONGOING` | (unchanged) | MAY | Informational logistics |
    | `ARRIVED_AT_CUSTOMER` | (unchanged) | MAY | Informational logistics |
    | `DELIVERED` | `DELIVERED` | MUST | Customer received |
    | `CANCELLATION_REQUESTED` | (unchanged) | MAY | Intermediate after SS `requestCancellation` |
    | `CANCELLATION_REQUEST_ACCEPTED` | (unchanged) | MAY | OA accepted merchant request; **MUST** be followed by `CANCELLED` |
    | `CANCELLATION_REQUEST_DENIED` | (unchanged) | MAY | OA denied merchant cancel request |
    | `CANCELLED` | `CANCELLED` | MUST | Final cancel (after accept path **or** OA mandatory) |
    | `CONCLUDED` | `CONCLUDED` | MAY | Originator-defined close timing |

    ### TAKEOUT

    | Event | Projects status | Obligation | Notes |
    |---|---|---|---|
    | `CREATED` | `CREATED` | MUST | |
    | `CONFIRMED` | `CONFIRMED` | MUST | |
    | `PREPARATION_REQUESTED` | (unchanged) | MAY | |
    | `PREPARING` | `PREPARING` | MAY | |
    | `READY_FOR_PICKUP` | `READY` | MUST | Waiting at counter |
    | `PICKUP_ONGOING` | — | MUST NOT | No courier |
    | `RIDER_ARRIVED_AT_STORE` | — | MUST NOT | |
    | `ORDER_COLLECTED` | — | MUST NOT | |
    | `DISPATCHED` | — | MUST NOT | |
    | `DELIVERY_ONGOING` | — | MUST NOT | |
    | `ARRIVED_AT_CUSTOMER` | — | MUST NOT | |
    | `DELIVERED` | `DELIVERED` | MUST | Customer collected |
    | `CANCELLATION_REQUESTED` | (unchanged) | MAY | After SS request |
    | `CANCELLATION_REQUEST_ACCEPTED` | (unchanged) | MAY | Accepted; **then** `CANCELLED` |
    | `CANCELLATION_REQUEST_DENIED` | (unchanged) | MAY | Request denied |
    | `CANCELLED` | `CANCELLED` | MUST | Final cancel |
    | `CONCLUDED` | `CONCLUDED` | MAY | Originator-defined close timing |

    ### INDOOR

    | Event | Projects status | Obligation | Notes |
    |---|---|---|---|
    | `CREATED` | `CREATED` | MUST | Opens/feeds Indoor account on SS |
    | `CONFIRMED` | `CONFIRMED` | MUST | |
    | `PREPARATION_REQUESTED` | (unchanged) | MAY | |
    | `PREPARING` | `PREPARING` | MAY | |
    | `READY_FOR_PICKUP` | `READY` | MAY | Ready to serve |
    | Logistics events | — | MUST NOT | No external delivery |
    | `DELIVERED` | `DELIVERED` | MAY | Served at table/counter |
    | `CANCELLATION_REQUESTED` | (unchanged) | MAY | After SS request |
    | `CANCELLATION_REQUEST_ACCEPTED` | (unchanged) | MAY | Accepted; **then** `CANCELLED` |
    | `CANCELLATION_REQUEST_DENIED` | (unchanged) | MAY | Request denied |
    | `CANCELLED` | `CANCELLED` | MUST | Final cancel |
    | `CONCLUDED` | `CONCLUDED` | MAY | Originator-defined close timing |

    Account-level events (`ACCOUNT_*`, payments, fiscal) are defined only in the
    [Indoor API Spec](../indoor/) — they do not replace order status.

    ## Repeated lifecycle requests (endpoint idempotent behavior)

    Applies to lifecycle operations such as `confirm`, `preparing`, `ready-for-pickup`,
    `dispatch`, and `delivered`.

    | Situation | HTTP | Side effects |
    |---|---|---|
    | Transition is valid and not yet applied | `202 Accepted` | Process toward target state; emit event when done |
    | Same operation already applied (target state already reached) | `202 Accepted` | No new transition; receiver MAY re-present related event |
    | Transition is impossible for current status | `409 Conflict` | No state change; machine-readable error body |

    Receivers **MUST NOT** return `422` / `409` only because the same successful
    lifecycle operation was invoked again after the target state was already reached.

    No client idempotency header is defined by this spec.
- name: Cancellation
  description: |-
    Cancellation contracts and flows for Orders V2.

    ## Model overview

    V2 keeps only one cancellation endpoint:
    - `POST /orders/{orderId}/requestCancellation` (Direction A, Software Service -> Ordering Application)

    Direction B (Ordering Application initiated) has **no endpoint**. The originator emits
    `CANCELLED` directly and the Software Service MUST apply it.

    ## Direction A flow (merchant requests cancellation)

    ```mermaid
    sequenceDiagram
      participant SS as Software Service
      participant OA as Ordering Application

      SS->>OA: POST /orders/{orderId}/requestCancellation
      OA-->>SS: 202 Accepted (request accepted for async processing)
      OA-->>SS: Event CANCELLATION_REQUESTED (optional)
      alt Request accepted
        OA-->>SS: Event CANCELLATION_REQUEST_ACCEPTED
        OA-->>SS: Event CANCELLED (mandatory after accepted)
      else Request denied
        OA-->>SS: Event CANCELLATION_REQUEST_DENIED
      end
    ```

    Normative points:
    - `202` on request means accepted for processing, not final cancellation.
    - After `CANCELLATION_REQUEST_ACCEPTED`, OA MUST emit `CANCELLED`.
    - SS MUST treat the order as cancelled only on `CANCELLED` / status `CANCELLED`.

    ## Direction B flow (originator cancels)

    ```mermaid
    sequenceDiagram
      participant OA as Ordering Application
      participant SS as Software Service

      OA-->>SS: Event CANCELLED (mandatory cancel signal)
      Note over SS: Apply cancellation immediately (no accept/deny endpoint)
    ```

    Normative points:
    - V1 handshake artifacts are removed (`ORDER_CANCELLATION_REQUEST`, `acceptCancellation`, `denyCancellation`).
    - No HTTP accept/deny step exists in V2 for originator-initiated cancellation.
- name: Events
  description: |-
    Order event delivery via **polling** and/or **webhook**.

    ## At-least-once delivery and deduplication

    Event delivery is at-least-once. The same event may be delivered more than once.
    Consumers MUST deduplicate using `eventId`.

    ## Normative rules

    | Rule |
    |---|
    | Event delivery mode (polling, webhook, or both) **MUST** match what the participant declares in Discovery. |
    | Profile-dependent `MAY` events SHOULD be treated as active obligations when declared in Discovery. |
    | Consumers **MUST** deduplicate by `eventId`. |
    | Consumers **MUST NOT** assume strict delivery ordering across events. |
    | After polling, the Software Service **MUST** acknowledge received events so they are not returned forever. |
    | Webhook receivers **MUST** verify HMAC-SHA256 signatures (`X-App-Id`, `X-App-MerchantId`, `X-App-Signature`) — see Authentication. |
    | `order.status` on GET remains the reconciliation source of truth if an event is missed. |
