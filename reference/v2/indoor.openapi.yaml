x-spectral-ignore:
  - owasp:api4:2023-string-restricted
info:
  title: Open Delivery V2 - Salão / Indoor API
  version: 2.0.0-rc
  summary: API proposta para operações de salão/indoor no Open Delivery V2
  description: >
    Contratos de transporte do protocolo Open Delivery para gestão de conta de
    salão (mesa, comanda ou balcão), pagamentos, fechamento e integração fiscal.

servers:
  - url: https://api.example.com/od/v2
    description: Ambiente de production
    x-internal: false
  - url: https://sandbox.example.com/od/v2
    description: Ambiente de staging/homologação
    x-internal: true

security:
  - bearerAuth: []

tags:
  # ── Visão Geral ──────────────────────────────────────────────────────────────
  - name: CapabilityOverview
    x-displayName: Visão Geral
    x-traitTag: true
    description: |-
      ## Salão / Indoor Capability

      Esta especificação descreve os contratos de transporte do protocolo Open Delivery
      para operações de **salão e consumo no local** (indoor). O pedido é o canal de
      entrada de itens; a **conta** é a entidade central para agrupamento operacional,
      pagamentos, fechamento e integração fiscal.

      > **Indoor não é só atendimento de mesa com garçom.** A especificação cobre
      > qualquer modelo de consumo no local — mesa, comanda ou balcão — incluindo
      > **autoatendimento completo** via totem, QR Code ou tablet, sem intervenção
      > de um atendente.

      > **Open Delivery é um protocolo, não uma API de produto.**
      > Não há servidor central nem ambiente de produção. Cada implementação hospeda
      > os endpoints em sua própria infraestrutura.

      ---

      ## ⚠ Pré-requisito: protocolo de Orders

      **Indoor é uma extensão do protocolo de Orders do Open Delivery — não uma
      capability autônoma.** Esta especificação pressupõe que ambas as partes
      (Ordering Application e Software Service) já implementaram o fluxo de pedidos
      base do protocolo.

      O protocolo de Orders define:

      - **Ciclo de vida do pedido** — estados `CREATED`, `CONFIRMED`, `PREPARING`,
        `READY_FOR_PICKUP`, `DISPATCHED`, `DELIVERED`, `CANCELLED`
      - **Recepção de eventos** — via polling (`GET /events`) ou webhook (`POST /orderUpdate`)
      - **Acknowledgment** — confirmação de eventos recebidos via polling
      - **Detalhes do pedido** — consulta via `GET /orders/{orderId}`
      - **Atualizações de estado** — `confirm`, `preparing`, `readyForPickup`, `dispatch`, `delivered`
      - **Cancelamento** — fluxo de solicitação, aceite e recusa entre as partes

      Um pedido indoor (`orderType: INDOOR`) trafega pelo mesmo ciclo de vida e pelos
      mesmos mecanismos de eventos que qualquer outro pedido do protocolo. A capability
      Indoor adiciona sobre esse fluxo base a **gestão de conta de salão** — agrupando
      pedidos, pagamentos e documentos fiscais numa sessão de consumo.

      > **Implementações que não possuem o protocolo de Orders ativo não podem
      > utilizar esta capability.**

      ---

      ## Modos de operação e canais

      O `operationMode` define como a conta é agrupada; o `originChannel` de cada
      pedido define por onde ele entrou. São independentes — uma mesma conta pode
      acumular pedidos vindos de canais diferentes:

      | `operationMode` | Uso típico | Canais de origem comuns |
      |---|---|---|
      | `TABLE` | Atendimento de mesa | `WAITER_TABLET`, `CUSTOMER_TABLET`, `QR_CODE`, `FRONT_DESK` |
      | `TAB` | Comanda numerada/nominal, sem mesa fixa | `POS`, `FRONT_DESK`, `TOTEM`, `APP` |
      | `COUNTER` | Autoatendimento com retirada no balcão | `TOTEM`, `QR_CODE`, `APP` |

      `originChannel.type` aceita: `TOTEM`, `QR_CODE`, `CUSTOMER_TABLET`, `WAITER_TABLET`,
      `FRONT_DESK`, `POS`, `APP`, `WHATSAPP`, `OTHER`. Um cliente pode abrir
      a conta pelo QR Code e o garçom completar com itens adicionais pelo tablet — ambos
      os pedidos se acumulam na mesma conta porque compartilham `operationMode` +
      `identifier`; o canal é só metadado do pedido.

      ## Partes envolvidas

      | Papel | Responsabilidade nesta capability |
      |---|---|
      | **Software Service** | Sistema de gestão do salão. Hospeda e implementa todos os endpoints desta especificação. **Deve ter o protocolo de Orders implementado.** |
      | **Ordering Application** | Aplicação de pedido — totem de autoatendimento, tablet (cliente ou garçom), QR Code, frente de caixa ou app. Consome os endpoints para criar pedidos, consultar contas, registrar pagamentos e solicitar documentos fiscais. **Deve ter o protocolo de Orders implementado.** |

      ## Autenticação

      Todos os endpoints desta especificação exigem um Bearer Token. Os modelos de
      concessão OAuth 2.0 suportados, os escopos e o mecanismo de assinatura de
      webhooks (HMAC-SHA256) são comuns a todo o protocolo Open Delivery e estão
      documentados na [especificação de Autenticação](../authentication/) — não
      duplicados aqui.

      <SecurityDefinitions />

  # ── Conta de Salão ───────────────────────────────────────────────────────────
  - name: AccountOverview
    x-displayName: Visão Geral da Conta
    x-traitTag: true
    description: |-
      ## A Conta como entidade central

      No protocolo Indoor, a **Account** (conta) é o agrupador operacional de todos os
      pedidos, itens, pagamentos e documentos fiscais de uma sessão de consumo.
      Cada conta está associada a uma combinação de `operationMode` + `identifier`
      (ex.: `TABLE` + `"5"`, `TAB` + `"A102"` ou `COUNTER` + `"3"`). A combinação
      independe do canal de origem do pedido — totem, tablet, QR Code ou frente de
      caixa podem alimentar a mesma conta.

      ## Como a conta é criada

      A conta **não é criada por um endpoint desta especificação**. Ela nasce
      automaticamente no Software Service quando o protocolo de Orders processa
      um pedido com `orderType: INDOOR`. Ao receber esse pedido, o Software Service
      cria a conta de salão associada à combinação `operationMode` + `identifier`
      presente no pedido.

      > A Ordering Application não chama nenhum endpoint indoor para criar a conta —
      > isso é uma responsabilidade interna do Software Service, desencadeada pelo
      > fluxo de Orders.

      ## Ciclo de vida da conta e eventos

      A cada transição relevante, o Software Service **DEVE** notificar a Ordering
      Application via webhook ([`accountEvent`](#operation/receiveAccountEvent) — ver seção *Eventos*). Não há
      mecanismo de polling para eventos Indoor: a entrega é exclusivamente via
      webhook, e a Ordering Application **DEVE** expor um endpoint para recebê-los.

      ```mermaid
      sequenceDiagram
          participant OA as Ordering Application
          participant SS as Software Service

          OA->>SS: POST /orders (orderType: INDOOR)
          SS-->>OA: 201 Created
          SS-)OA: ACCOUNT_OPENED — status: IN_USE

          opt pagamento antecipado (opcional, a qualquer momento)
              OA->>SS: POST /accounts/{id}/payments
              SS-->>OA: 200 OK
              SS-)OA: PAYMENT_CREATED
          end

          OA->>SS: POST /accounts/{id}/pre-close
          SS-->>OA: 202 Accepted
          SS-)OA: ACCOUNT_PRE_CLOSED — status: IN_PAYMENT

          OA->>SS: POST /accounts/{id}/payments (quitação final)
          SS-->>OA: 200 OK
          SS-)OA: PAYMENT_CREATED

          OA->>SS: POST /accounts/{id}/close
          SS-->>OA: 202 Accepted
          SS-)OA: ACCOUNT_CLOSED — status: CLOSED
      ```

      > **Pagamento não depende de pré-fechamento.** [`POST /accounts/payments`](#operation/createPayment) pode ser
      > chamado a qualquer momento com a conta `IN_USE` ou `IN_PAYMENT`. O pré-fechamento
      > é um lock que bloqueia novos itens e metadados, sinalizando que chegou a hora da
      > quitação final — não é o gatilho que "libera" o pagamento.

      Para fluxos detalhados (pagamentos parciais, emissão fiscal, cancelamento de itens,
      transferências e desbloqueio), consulte o [guia de fluxos Indoor](../../protocol/indoor/).

      ### Tabela de eventos

      | Evento | Gatilho | Status da conta após |
      |---|---|---|
      | `ACCOUNT_OPENED` | Conta criada pelo fluxo de Orders (`orderType: INDOOR`) | `IN_USE` |
      | `ACCOUNT_ITEM_ADDED` | Novo pedido INDOOR adiciona itens à conta | `IN_USE` |
      | `ACCOUNT_ITEM_REMOVED` | Itens transferidos para outra conta | `IN_USE` |
      | `ACCOUNT_ITEM_CANCELLED` | Item cancelado via [`POST /accounts/items/{itemId}/cancel`](#operation/cancelAccountItem) | `IN_USE` |
      | `ACCOUNT_PRE_CLOSED` | Conta bloqueada para pagamento via [`POST /accounts/pre-close`](#operation/preCloseAccount) | `IN_PAYMENT` |
      | `ACCOUNT_UNLOCKED` | Bloqueio revertido via [`POST /accounts/unlock`](#operation/unlockAccount) | `IN_USE` |
      | `ACCOUNT_CLOSED` | Conta fechada definitivamente via [`POST /accounts/close`](#operation/closeAccount) | `CLOSED` |
      | `PAYMENT_CREATED` | Pagamento lançado via [`POST /accounts/payments`](#operation/createPayment) — em `IN_USE` ou `IN_PAYMENT` | — |
      | `PAYMENT_UPDATED` | Status de pagamento atualizado internamente | — |
      | `FISCAL_ISSUED` | Documento fiscal emitido com sucesso | — |
      | `FISCAL_ERROR` | Falha na emissão do documento fiscal | — |

      ### Operações permitidas por status

      | Operação | `IN_USE` | `IN_PAYMENT` |
      |---|---|---|
      | Adicionar itens (via Orders) | ✅ | ❌ |
      | Cancelar item | ✅ | ❌ |
      | Transferir itens | ✅ | ❌ |
      | **Registrar pagamento** ([`POST /accounts/payments`](#operation/createPayment)) | ✅ | ✅ |
      | Pré-fechar ([`POST /accounts/pre-close`](#operation/preCloseAccount)) | ✅ | — |
      | Desbloquear ([`POST /accounts/unlock`](#operation/unlockAccount)) | — | ✅ |
      | Fechar ([`POST /accounts/close`](#operation/closeAccount)) | ❌ | ✅ |

      ## Responsabilidades por endpoint

      > Os endpoints de criação e consulta de pedidos pertencem ao **protocolo de Orders**,
      > não a esta especificação. A tabela abaixo cobre apenas os endpoints Indoor.

      | Endpoint | Hospedado por | Chamado por |
      |---|---|---|
      | [`GET /accounts`](#operation/getAccount) | Software Service | Ordering Application |
      | [`GET /accounts/{accountId}`](#operation/getAccountById) | Software Service | Ordering Application |
      | [`POST /accounts/pre-close`](#operation/preCloseAccount) | Software Service | Ordering Application |
      | [`POST /accounts/unlock`](#operation/unlockAccount) | Software Service | Ordering Application |
      | [`POST /accounts/close`](#operation/closeAccount) | Software Service | Ordering Application |
      | [`POST /accounts/items/{itemId}/cancel`](#operation/cancelAccountItem) | Software Service | Ordering Application |
      | [`POST /accounts/transfers`](#operation/transferAccountContent) | Software Service | Ordering Application |
      | [`POST /accounts/payments`](#operation/createPayment) | Software Service | Ordering Application |
      | [`GET /accounts/payments`](#operation/listAccountPayments) | Software Service | Ordering Application |
      | [`POST /accounts/fiscal`](#operation/requestFiscalDocument) | Software Service | Ordering Application |
      | [`GET /accounts/fiscal`](#operation/listAccountFiscalDocuments) | Software Service | Ordering Application |
      | Webhook [`accountEvent`](#operation/receiveAccountEvent) | Ordering Application | Software Service *(notificação assíncrona)* |

  - name: Accounts
    description: |-
      Operações sobre a conta de salão: consulta, cancelamento de itens,
      transferência entre contas, pré-fechamento, desbloqueio e fechamento
      definitivo.

  - name: Payments
    description: |-
      Lançamentos de pagamento sobre a conta. Uma conta pode receber múltiplos
      pagamentos parciais antes do fechamento.

  - name: Fiscal
    description: |-
      Solicitação e consulta de documentos fiscais associados à conta.

  # ── Eventos ──────────────────────────────────────────────────────────────────
  - name: Events
    description: |-
      Notificação de eventos do ciclo de vida da conta, pagamento e fiscal.
      A entrega é **exclusivamente via webhook** — não há endpoint de polling
      para eventos Indoor. A Ordering Application DEVE implementar e registrar
      um endpoint compatível com o contrato [`accountEvent`](#operation/receiveAccountEvent) definido em
      `webhooks` para receber as notificações em tempo real.

x-tagGroups:
  - name: Visão Geral
    tags:
      - CapabilityOverview
  - name: Conta de Salão
    tags:
      - AccountOverview
      - Accounts
      - Payments
      - Fiscal
  - name: Eventos
    tags:
      - Events

paths:
  /accounts:
    get:
      tags: [Accounts]
      operationId: getAccount
      summary: Consultar conta por chave operacional
      description: |-
        Recupera a conta ativa usando a chave operacional (operationMode + identifier).
        Esta é a forma primária de acessar e operar sobre uma conta.

        | **Hospedado por** | Software Service |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      responses:
        '200':
          description: Conta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/{accountId}:
    get:
      tags: [Accounts]
      operationId: getAccountById
      summary: Consultar conta por accountId
      description: |-
        Recupera a conta usando o identificador interno (accountId), retornado
        previamente por outra chamada. Alternativa ao acesso pela chave operacional.

        | **Hospedado por** | Software Service |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Conta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/pre-close:
    post:
      tags: [Accounts]
      operationId: preCloseAccount
      summary: Pré-fechar / bloquear conta para pagamento
      description: |-
        Solicita o pré-fechamento da conta — um lock operacional que impede novos
        itens e alterações de metadados, sinalizando que a conta está pronta para o
        checkout final. **Não é um pré-requisito para registrar pagamento** — pagamentos
        podem ter ocorrido antes deste chamado, ou ainda estarem pendentes. É o momento
        em que se espera o **pagamento final**: o saldo restante, se já houve pagamentos
        anteriores, ou o valor total, se nenhum pagamento foi feito até aqui.

        > **Evento emitido:** `ACCOUNT_PRE_CLOSED` — status da conta passa para `IN_PAYMENT`.
        > Novos itens e alterações de metadados são bloqueados até o desbloqueio ou
        > fechamento. Pagamentos continuam sendo aceitos normalmente.

        | **Hospedado por** | Software Service |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountPreCloseRequest'
      responses:
        '202':
          description: Solicitação de pré-fechamento aceita
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/unlock:
    post:
      tags: [Accounts]
      operationId: unlockAccount
      summary: Desbloquear conta
      description: |-
        Remove o lock/pre-close da conta quando o PDV permitir reabertura do fluxo
        operacional antes do fechamento final.

        > **Evento emitido:** `ACCOUNT_UNLOCKED` — status da conta retorna para `IN_USE`.

        | **Hospedado por** | Software Service |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUnlockRequest'
      responses:
        '202':
          description: Solicitação de desbloqueio aceita
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/close:
    post:
      tags: [Accounts]
      operationId: closeAccount
      summary: Fechar conta definitivamente
      description: |-
        Fecha a conta definitivamente. Espera-se que, neste ponto, o total já
        registrado em pagamentos cubra o valor da conta — a validação exata é
        responsabilidade do Software Service. O fechamento final representa o marco
        operacional absoluto e irreversível da conta.

        > **Evento emitido:** `ACCOUNT_CLOSED` — status da conta passa para `CLOSED`.
        > Operação irreversível: nenhuma alteração adicional — **incluindo novos
        > pagamentos** — é aceita após o fechamento.

        | **Hospedado por** | Software Service |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCloseRequest'
      responses:
        '202':
          description: Solicitação de fechamento aceita
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/items/{itemId}/cancel:
    post:
      tags: [Accounts]
      operationId: cancelAccountItem
      summary: Cancelar item da conta
      description: |-
        Cancela um item já lançado na conta. Alterações semânticas de item devem
        ser tratadas como cancelamento e novo lançamento, e não edição direta do item.

        > **Evento emitido:** `ACCOUNT_ITEM_CANCELLED`.

        | **Hospedado por** | Software Service |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
        - $ref: '#/components/parameters/ItemId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCancelRequest'
      responses:
        '200':
          description: Item cancelado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/transfers:
    post:
      tags: [Accounts]
      operationId: transferAccountContent
      summary: Transferir itens ou conta completa
      description: |-
        Executa operação atômica de transferência entre contas/operações — independente
        de modo operacional (mesa, comanda ou balcão).
        Permite transferência parcial por item ou transferência total da conta.

        > **Eventos emitidos:** `ACCOUNT_ITEM_REMOVED` na conta de origem e
        > `ACCOUNT_ITEM_ADDED` na conta de destino.

        | **Hospedado por** | Software Service |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Transferência concluída
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/payments:
    post:
      tags: [Payments]
      operationId: createPayment
      summary: Lançar pagamento na conta
      description: |-
        Registra um lançamento de pagamento na conta. O pagamento pode ser total
        ou parcial, por valor, e opcionalmente por item, conforme capacidade do PDV.

        > **Pagamento não depende de pré-fechamento.** Esta operação pode ser chamada
        > a qualquer momento enquanto a conta estiver `IN_USE` ou `IN_PAYMENT` — o
        > pré-fechamento ([`pre-close`](#operation/preCloseAccount)) não é um pré-requisito para registrar pagamento,
        > apenas o ponto em que se espera a quitação final. A única restrição é a
        > conta já estar `CLOSED`.

        > **Evento emitido:** `PAYMENT_CREATED`.

        | **Hospedado por** | Software Service |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
      responses:
        '200':
          description: Pagamento lançado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Payments]
      operationId: listAccountPayments
      summary: Listar pagamentos da conta
      description: |-
        Retorna todos os lançamentos de pagamento registrados na conta identificada
        pela chave operacional.

        | **Hospedado por** | Software Service |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      responses:
        '200':
          description: Lista de pagamentos
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    maxItems: 1000
                    description: Lista de pagamentos registrados na conta.
                    items:
                      $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # /payments/{paymentId}:
    # get:                               # comentado por solicitação
    #   tags: [Payments]
    #   operationId: getPaymentById
    #   summary: Consultar pagamento por ID
