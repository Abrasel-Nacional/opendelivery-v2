  /accounts/fiscal:
    post:
      tags: [Fiscal]
      operationId: requestFiscalDocument
      summary: Solicitar emissão/associação fiscal da conta
      description: |-
        Solicita a emissão ou recuperação do documento fiscal associado à conta.
        O processamento é assíncrono e deve ser acompanhado via webhook e/ou GET de fallback.

        > **Evento emitido:** `FISCAL_ISSUED` em caso de sucesso ou `FISCAL_ERROR` em caso de
        > falha, notificado via webhook ([`accountEvent`](#operation/receiveAccountEvent)), pois a emissão pode levar tempo
        > variável.

        | **Hospedado por** | Software Service |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FiscalRequest'
      responses:
        '202':
          description: Solicitação fiscal aceita
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Fiscal]
      operationId: listAccountFiscalDocuments
      summary: Listar documentos fiscais vinculados à conta
      description: |-
        Retorna todos os documentos fiscais associados à conta identificada pela
        chave operacional.

        | **Hospedado por** | Software Service |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      responses:
        '200':
          description: Lista de documentos fiscais
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    maxItems: 1000
                    description: Lista de documentos fiscais associados à conta.
                    items:
                      $ref: '#/components/schemas/FiscalDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # /fiscal/{documentId}:
