paths:
  /events:polling:
    get:
      tags: [Events]
      operationId: pollingEvents
      summary: Poll new order events
      description: |-
        Returns pending order lifecycle events for merchants associated with the
        authenticated application. Each event **MUST** be acknowledged via
        [`POST /events/acknowledgment`](#operation/acknowledgeEvents) or it may be
        returned again on subsequent polls.


        ```od-call-flow
        method: GET
        from: Software Service
        fromLabel: Client
        fromParty: ss
        to: Ordering Application
        toLabel: Host
        toParty: oa
        ```

        **Status vs events:** a polled event is a notification. Always reconcile with
        [`GET /orders/{orderId}`](#operation/getOrder) when in doubt.
      parameters:
        - name: x-polling-merchants
          in: header
          required: false
          schema:
            type: array
            items: { type: string }
            maxItems: 100
          description: Optional subset of merchant ids to poll. Omit to use the authenticated scope.
        - name: eventType
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/OrderEventType'
            maxItems: 20
          description: |
            Filter by event types. If set, other types are omitted from the response and
            SHOULD be auto-acknowledged by the host (same practice as V1).
      responses:
        '200':
          description: One or more events
          content:
            application/json:
              schema:
                type: array
                maxItems: 1000
                items:
                  $ref: '#/components/schemas/OrderEvent'
              examples:
                createdAndConfirmed:
                  summary: New order then confirmation
                  value:
                    - eventId: evt-9f3a
                      eventType: CREATED
                      orderId: order-abc123
                      orderURL: https://api.example.com/od/v2/orders/order-abc123
                      createdAt: '2026-07-01T14:30:00Z'
                      sourceAppId: 11111111-1111-1111-1111-111111111111
                    - eventId: evt-9f3b
                      eventType: CONFIRMED
                      orderId: order-abc123
                      orderURL: https://api.example.com/od/v2/orders/order-abc123
                      createdAt: '2026-07-01T14:31:10Z'
        '204':
          description: No pending events
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /events/acknowledgment:
    post:
      tags: [Events]
      operationId: acknowledgeEvents
      summary: Acknowledge polled events
      description: |-
        Dismisses events from future polling responses. The Software Service **MUST**
        acknowledge events it has processed (including types it does not use).


        ```od-call-flow
        method: POST
        from: Software Service
        fromLabel: Client
        fromParty: ss
        to: Ordering Application
        toLabel: Host
        toParty: oa
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventIds]
              properties:
                eventIds:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items: { type: string }
                  description: Event ids previously returned by polling
            examples:
              ack:
                value:
                  eventIds: [evt-9f3a, evt-9f3b]
      responses:
        '202':
          description: Acknowledgment accepted for asynchronous processing.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    get:
      tags: [Orders]
      operationId: getOrder
      summary: Get order details
      description: |-
        Returns the current snapshot of an order, including authoritative **`status`**.
        This is the reconciliation source of truth when events are missed or reordered.


        ```od-call-flow
        method: GET
        from: Software Service
        fromLabel: Client
        fromParty: ss
        to: Ordering Application
        toLabel: Host
        toParty: oa
        ```
      responses:
        '200':
          description: Order snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              examples:
                deliveryCreated:
                  summary: DELIVERY order in CREATED
                  value:
                    id: order-abc123
                    displayId: A123
                    status: CREATED
                    lastEvent: CREATED
                    createdAt: '2026-07-01T14:30:00Z'
                    orderTiming: INSTANT
                    merchant:
                      id: merchant-originator-001
                      externalCode: pdv-loja-42
                      name: Pizza Plaza
                    items:
                      - id: item-1
                        name: Classic Burger
                        externalCode: SKU-BURGER-01
                        quantity: 2
                        pricing:
                          unitPrice: { value: 2500, currency: BRL }
                          originalPrice: { value: 2500, currency: BRL }
                          optionsPrice: { value: 0, currency: BRL }
                          totalPrice: { value: 5000, currency: BRL }
                        options:
                          - id: opt-1
                            name: Extra cheese
                            quantity: 1
                            pricing:
                              unitPrice: { value: 0, currency: BRL }
                              originalPrice: { value: 0, currency: BRL }
                              totalPrice: { value: 0, currency: BRL }
                    total:
                      itemsPrice: { value: 5000, currency: BRL }
                      otherFees: { value: 500, currency: BRL }
                      discount: { value: 0, currency: BRL }
                      orderAmount: { value: 5500, currency: BRL }
                    otherFees:
                      - name: Delivery fee
                        type: DELIVERY_FEE
                        price: { value: 500, currency: BRL }
