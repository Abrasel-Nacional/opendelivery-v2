  /orders/{orderId}/confirm:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      operationId: confirmOrder
      summary: Confirm order for processing
      description: |-
        This endpoint confirms the order for processing.
        It MUST be supported for all profiles.

        | Event emitted | Projected status | Obligation |
        |---|---|---|
        | `CONFIRMED` | `CONFIRMED` | **MUST** (all profiles) |

        **Duplicate request behavior:** if the order is already `CONFIRMED`
        (or in a later valid status), return **`202 Accepted`** with no new transition;
        the host MAY re-present the `CONFIRMED` event.


        ```od-call-flow
        method: POST
        from: Software Service
        fromLabel: Client
        fromParty: ss
        to: Ordering Application
        toLabel: Host
        toParty: oa
        ```
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                estimatedPreparationTimeMinutes:
                  type: integer
                  minimum: 0
                  description: Estimated preparation time in minutes
                  example: 25
            examples:
              withEta:
                value:
                  estimatedPreparationTimeMinutes: 25
      responses:
        '202':
          description: Accepted for asynchronous processing, or already applied (idempotent success).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Invalid state for confirmation (e.g. order cancelled). Not for “already confirmed”.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                cancelled:
                  value:
                    code: INVALID_ORDER_STATE_TRANSITION
                    message: Cannot confirm an order in CANCELLED status
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}/preparing:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      operationId: setOrderPreparing
      summary: Signal that preparation has started
      description: |-
        This endpoint signals that preparation has started.
        It is optional for some profiles.

        | Event emitted | Projected status | Obligation |
        |---|---|---|
        | `PREPARING` | `PREPARING` | **MAY** (profile-dependent) |

        **Duplicate request behavior:** if the order is already `PREPARING`
        (or in a later valid status), return **`202 Accepted`** with no new transition;
        the host MAY re-present the `PREPARING` event.


        ```od-call-flow
        method: POST
        from: Software Service
        fromLabel: Client
        fromParty: ss
        to: Ordering Application
        toLabel: Host
        toParty: oa
        ```
      responses:
        '202':
          description: Accepted for asynchronous processing, or already applied (idempotent success).
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Invalid state for this transition (not “already applied”)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}/ready-for-pickup:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      operationId: setOrderReadyForPickup
      summary: Signal order is ready for pickup
      description: |-
        This endpoint signals that the order is ready for pickup/service.

        - **DELIVERY:** Ready for courier pickup at the store
        - **TAKEOUT:** Ready for customer collection (MUST in typical takeout flows)
        - **INDOOR:** Ready to be served (MAY)

        | Event emitted | Projected status | Obligation |
        |---|---|---|
        | `READY_FOR_PICKUP` | `READY` | **DELIVERY:** MAY; **TAKEOUT:** MUST; **INDOOR:** MAY |

        **Duplicate request behavior:** if the order is already `READY`
        (or in a later valid status), return **`202 Accepted`** with no new transition;
        the host MAY re-present the `READY_FOR_PICKUP` event.


        ```od-call-flow
        method: POST
        from: Software Service
        fromLabel: Client
        fromParty: ss
        to: Ordering Application
        toLabel: Host
        toParty: oa
        ```
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pickupCode:
                  type: string
                  description: Code shown to customer for TAKEOUT pickup
                  example: A42
      responses:
        '202':
          description: Accepted for asynchronous processing, or already applied (idempotent success).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Invalid state for this transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}/dispatch:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      operationId: dispatchOrder
      summary: Signal order dispatched to customer
      description: |-
        This endpoint signals dispatch to the customer.
        It is valid **only** for `DELIVERY`.

        | Event emitted | Projected status | Obligation |
        |---|---|---|
        | `DISPATCHED` | `IN_DELIVERY` | **MAY** (`DELIVERY` only) |

        > **Possible deprecation:** this signal is under review for a later release.
        > Prefer clear logistics events when using the Logistics capability; do not treat
        > dispatch as required if Discovery marks it optional.

        **Duplicate request behavior:** if the order is already `IN_DELIVERY`
        (or in a later valid status), return **`202 Accepted`** with no new transition;
        the host MAY re-present the `DISPATCHED` event.


        ```od-call-flow
        method: POST
        from: Software Service
        fromLabel: Client
        fromParty: ss
        to: Ordering Application
        toLabel: Host
        toParty: oa
        ```
      responses:
        '202':
          description: Accepted for asynchronous processing, or already applied (idempotent success).
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}/delivered:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      operationId: setOrderDelivered
      summary: Signal order delivered to customer
      description: |-
        This endpoint signals that the customer received the order.
        It applies to all profiles:

        - **DELIVERY:** at the delivery address
        - **TAKEOUT:** collected at the counter
        - **INDOOR:** served at table / counter

        | Event emitted | Projected status | Obligation |
        |---|---|---|
        | `DELIVERED` | `DELIVERED` | **DELIVERY:** MUST; **TAKEOUT:** MUST; **INDOOR:** MAY |

        **Duplicate request behavior:** if the order is already `DELIVERED`
        (or in a later valid status), return **`202 Accepted`** with no new transition;
        the host MAY re-present the `DELIVERED` event.


        ```od-call-flow
        method: POST
        from: Software Service
        fromLabel: Client
        fromParty: ss
        to: Ordering Application
        toLabel: Host
        toParty: oa
        ```
      responses:
        '202':
          description: Accepted for asynchronous processing, or already applied (idempotent success).
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Invalid state for this transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}/tracking:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      operationId: sendOrderTracking
      summary: Send delivery tracking updates (merchant-controlled delivery)
      description: |-
        Sends delivery tracking updates to the Ordering Application when the
        delivery execution is controlled by the merchant side (Software Service
        and/or its delivery operator).

        This endpoint belongs to the Orders capability.

        It is typically used only for `DELIVERY` profile orders and does not,
        by itself, redefine the authoritative `order.status`.

        **Duplicate request behavior:** if the same tracking snapshot is sent more than once,
        return **`202 Accepted`** and keep processing idempotent.


        ```od-call-flow
        method: POST
        from: Software Service
        fromLabel: Client
        fromParty: ss
        to: Ordering Application
        toLabel: Host
        toParty: oa
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderTracking'
      responses:
        '202':
          description: Accepted for asynchronous processing, or already applied (idempotent success).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Business validation failed for tracking payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}/validateCode:
    parameters:
      - $ref: '#/components/parameters/OrderId'
      - name: deliveryCode
        in: query
        required: true
        schema:
          type: string
        description: Delivery confirmation code informed by the customer
    post:
      tags: [Orders]
      operationId: validateDeliveryCode
      summary: Validate customer delivery confirmation code
      description: |-
        Validates the delivery confirmation code generated by the Ordering Application
        and informed by the customer at handoff time.

        This endpoint MUST be synchronous and MUST NOT emit lifecycle events by itself.

        It may be called by the merchant Software Service or by a delivery operator
        acting under merchant control.


        ```od-call-flow
        method: POST
        from: Software Service
        fromLabel: Client
        fromParty: ss
        to: Ordering Application
        toLabel: Host
        toParty: oa
        ```
      responses:
        '200':
          description: Delivery code is valid; handoff can proceed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryConfirmationCode'
        '400':
          description: Delivery code is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}/details:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    patch:
      tags: [Orders]
      operationId: patchOrderDetails
      summary: Update non-lifecycle order details
      description: |-
        Optional endpoint to update order properties that do not represent
        a lifecycle status transition.

        This endpoint belongs to Orders and is intended for partial, targeted
        corrections such as preparation planning details.


        ```od-call-flow
        method: PATCH
        from: Software Service
        fromLabel: Client
        fromParty: ss
        to: Ordering Application
        toLabel: Host
        toParty: oa
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchOrderDetails'
      responses:
        '200':
          description: Order details updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}/requestCancellation:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Cancellation]
      operationId: requestCancellation
      summary: Request order cancellation (merchant / Software Service)
      description: |-
        This endpoint requests cancellation in **Direction A**
        (Software Service initiates, merchant wants to cancel).

        Host: **Ordering Application**. Caller: **Software Service**.

        This is a **request**, not a final cancel. HTTP `202` means the Ordering Application
        accepted the request for **asynchronous processing**. The order is cancelled only when
        a **`CANCELLED`** event is emitted and `order.status` becomes `CANCELLED`.

        | Event emitted | Projected status | Obligation |
        |---|---|---|
        | `CANCELLATION_REQUESTED` | Unchanged | **MAY** |
        | `CANCELLATION_REQUEST_ACCEPTED` | Unchanged | **MAY** |
        | `CANCELLATION_REQUEST_DENIED` | Unchanged | **MAY** |
        | `CANCELLED` | `CANCELLED` | **MUST** after `CANCELLATION_REQUEST_ACCEPTED` |

        **When the handshake is accepted:** Ordering Application MUST emit
        `CANCELLATION_REQUEST_ACCEPTED` and **then** emit **`CANCELLED`** (and set status
        `CANCELLED`). Do not skip `CANCELLED` after acceptance. Software Service MUST NOT treat
        `CANCELLATION_REQUEST_ACCEPTED` alone as final cancellation.

        ### Not this operation

        - Ordering Application **mandatory** cancel does **not** use this endpoint — OA emits
          `CANCELLED` directly (see [Cancellation](#tag/Cancellation)).
        - V1 endpoints `acceptCancellation` / `denyCancellation` and event
          `ORDER_CANCELLATION_REQUEST` are **removed** (they applied only to OA-initiated handshake).

        **Duplicate request behavior:** if the order is already `CANCELLED`, return
        **`202 Accepted`** with no new transition; the host MAY re-present `CANCELLED`.


        ```od-call-flow
        method: POST
        from: Software Service
        fromLabel: Client
        fromParty: ss
        to: Ordering Application
        toLabel: Host
        toParty: oa
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestCancellation'
            examples:
              unavailableItem:
                value:
                  reason: Item unavailable after confirmation
                  code: UNAVAILABLE_ITEM
                  mode: MANUAL
      responses:
        '202':
          description: Cancellation request accepted for asynchronous processing, or already cancelled (idempotent success).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Invalid state for a cancellation request (not merely “already cancelled”)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Business rule rejected the request payload or policy forbids request at this stage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

webhooks:
  orderEvent:
    post:
      tags: [Events]
      operationId: receiveOrderEvent
      summary: Webhook for order event notification
      description: |-
        Optional push path. The **Ordering Application** sends order events to the
        Software Service webhook URL. Acknowledgment is HTTP `200` or `204` with empty body.

        Signature headers (`X-App-Id`, `X-App-MerchantId`, `X-App-Signature`) **MUST** be
        verified — see [Authentication](../authentication/).


        ```od-call-flow
        method: POST
        from: Ordering Application
        fromLabel: Client
        fromParty: oa
        to: Software Service
        toLabel: Host
        toParty: ss
        ```

        Polling and webhook MAY coexist; Discovery declares which modes are supported.
      parameters:
        - $ref: '#/components/parameters/XAppId'
        - $ref: '#/components/parameters/XAppMerchantId'
        - $ref: '#/components/parameters/XAppSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderEvent'
            examples:
              created:
                summary: CREATED
                value:
                  eventId: evt-001
                  eventType: CREATED
                  orderId: order-abc123
                  orderURL: https://api.example.com/od/v2/orders/order-abc123
                  createdAt: '2026-07-01T14:30:00Z'
              cancelled:
                summary: CANCELLED (final — merchant request accepted or OA mandatory)
                value:
                  eventId: evt-090
                  eventType: CANCELLED
                  orderId: order-abc123
                  orderURL: https://api.example.com/od/v2/orders/order-abc123
                  createdAt: '2026-07-01T14:45:00Z'
                  metadata:
                    code: UNAVAILABLE_ITEM
                    reason: Item unavailable
              cancellationAccepted:
                summary: CANCELLATION_REQUEST_ACCEPTED (must be followed by CANCELLED)
                value:
                  eventId: evt-091
                  eventType: CANCELLATION_REQUEST_ACCEPTED
                  orderId: order-abc123
                  orderURL: https://api.example.com/od/v2/orders/order-abc123
                  createdAt: '2026-07-01T14:45:30Z'
                  metadata:
                    code: UNAVAILABLE_ITEM
                    reason: Request accepted; cancel will follow
              cancellationDenied:
                summary: CANCELLATION_REQUEST_DENIED (merchant request refused)
                value:
                  eventId: evt-092
                  eventType: CANCELLATION_REQUEST_DENIED
                  orderId: order-abc123
                  orderURL: https://api.example.com/od/v2/orders/order-abc123
                  createdAt: '2026-07-01T14:46:00Z'
                  metadata:
                    code: OTHER_CANCELLATION_REASON
                    reason: Consumer did not accept cancellation
      responses:
        '200':
          description: Accepted (V1 compatibility; prefer 204)
        '204':
          description: Event received (no body)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer Token issued via OAuth 2.0. See the [Authentication specification](../authentication/).
        Preferred scope for this capability: `od.orders`.
  parameters:
    OrderId:
      name: orderId
      in: path
      required: true
      description: Unique order identifier (generated by the Ordering Application)
      schema: { type: string }
      example: order-abc123
    XAppId:
      in: header
      name: X-App-Id
      required: true
      schema:
        type: string
        format: uuid
      description: Sender application id (see Authentication)
    XAppMerchantId:
      in: header
      name: X-App-MerchantId
      required: true
      schema: { type: string }
      description: Merchant id associated with the event
    XAppSignature:
      in: header
      name: X-App-Signature
      required: true
      schema: { type: string }
      description: HMAC-SHA256 of the raw body (see Authentication)
  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Insufficient scope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Order or event not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Invalid state transition for the current order status
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    OrderEventType:
      type: string
      description: |
        Order event types for V2.

        **Cancellation (two directions):**
        - Merchant request path: `CANCELLATION_REQUESTED` (MAY) →
          `CANCELLATION_REQUEST_ACCEPTED` then **`CANCELLED`**, or `CANCELLATION_REQUEST_DENIED`.
        - After `CANCELLATION_REQUEST_ACCEPTED`, host MUST emit `CANCELLED` (acceptance ≠ final cancel).
        - Originator mandatory path: `CANCELLED` only (no handshake).
        - **Removed from V1:** `ORDER_CANCELLATION_REQUEST`, and the accept/deny HTTP pair
          used when the Ordering Application requested cancel via handshake.
        - **`PICKED_UP` removed.** Logistics intermediate events are informational.
      enum:
        - CREATED
        - CONFIRMED
        - PREPARATION_REQUESTED
        - PREPARING
        - READY_FOR_PICKUP
        - PICKUP_ONGOING
        - RIDER_ARRIVED_AT_STORE
        - DISPATCHED
        - ORDER_COLLECTED
        - DELIVERY_ONGOING
        - ARRIVED_AT_CUSTOMER
        - DELIVERED
        - CANCELLATION_REQUESTED
        - CANCELLATION_REQUEST_ACCEPTED
        - CANCELLATION_REQUEST_DENIED
        - CANCELLED
        - CONCLUDED
    OrderStatus:
      type: string
      description: Authoritative order status (GET snapshot)
      enum:
        - CREATED
        - CONFIRMED
        - PREPARING
        - READY
        - IN_DELIVERY
        - DELIVERED
        - CANCELLED
        - CONCLUDED
    OrderEvent:
      type: object
      required: [eventId, eventType, orderId, createdAt]
      properties:
        eventId:
          type: string
          description: Unique event id — consumers MUST deduplicate on this value
          example: evt-9f3a
        eventType:
          $ref: '#/components/schemas/OrderEventType'
        orderId:
          type: string
          description: Order id (Ordering Application)
          example: order-abc123
        orderURL:
          type: string
          format: uri
          description: URL to GET full order details
          example: https://api.example.com/od/v2/orders/order-abc123
        createdAt:
          type: string
          format: date-time
          description: Event timestamp (UTC, RFC 3339)
        sourceAppId:
          type: string
          format: uuid
          description: Ordering Application app id (useful for hubs)
        metadata:
          type: object
          additionalProperties: true
          description: Optional event-specific payload (e.g. cancellation details)
    RequestCancellation:
      type: object
      title: RequestCancellation
      description: |
        Body of `POST /orders/{orderId}/requestCancellation` (Software Service → Ordering Application).
        Aligns with V1 `RequestCancelled` / cancel-request fields.
      required: [reason, code, mode]
      properties:
        reason:
          type: string
          description: Open text explaining the cancellation request
          example: Item unavailable after confirmation
        code:
          type: string
          description: Machine-readable reason for a **merchant** cancellation request
          enum:
            - SYSTEMIC_ISSUES
            - DUPLICATE_APPLICATION
            - UNAVAILABLE_ITEM
            - RESTAURANT_WITHOUT_DELIVERY_PERSON
            - OUTDATED_MENU
            - ORDER_OUTSIDE_THE_DELIVERY_AREA
            - BLOCKED_CUSTOMER
            - OUTSIDE_DELIVERY_HOURS
            - INTERNAL_DIFFICULTIES_OF_THE_RESTAURANT
            - RISK_AREA
            - DELIVERY_PROBLEM
          example: UNAVAILABLE_ITEM
        mode:
          type: string
          description: Whether the request was produced automatically or by a human operator at the Software Service
          enum: [AUTO, MANUAL]
          example: MANUAL
        outOfStockItems:
          type: array
          description: Item ids that are out of stock (when applicable)
          items:
            type: string
          maxItems: 100
    DeliveryConfirmationCode:
      type: object
      description: Delivery confirmation code validation payload.
      required: [orderId, deliveryCode]
      properties:
        orderId:
          type: string
          description: Order identifier validated in this operation
          example: order-abc123
        deliveryCode:
          type: string
          description: Customer-provided delivery confirmation code
          example: '735194'

    PatchOrderDetails:
      type: object
      description: Partial updates for non-lifecycle order fields.
      properties:
        preparationStartDateTime:
          type: string
          format: date-time
          description: Updated preparation start timestamp (UTC, RFC 3339)
        observations:
          type: string
          description: Updated order-level remarks

    OrderTracking:
      type: object
      description: Merchant-controlled delivery tracking snapshot/update.
      required: [deliveryTrackingInfo]
      properties:
        deliveryTrackingInfo:
          $ref: '#/components/schemas/DeliveryTrackingInfo'

    DeliveryTrackingInfo:
      type: object
      description: Tracking details for a delivery update.
      properties:
        event:
          $ref: '#/components/schemas/DeliveryTrackingEvent'
        problem:
          $ref: '#/components/schemas/DeliveryTrackingProblem'
        vehicle:
          $ref: '#/components/schemas/DeliveryTrackingVehicle'
        eta:
          $ref: '#/components/schemas/DeliveryTrackingEta'
        deliveryPerson:
          $ref: '#/components/schemas/DeliveryTrackingPerson'
        geoLocalization:
          $ref: '#/components/schemas/DeliveryTrackingGeoLocalization'
        externalTrackingURL:
          type: string
          format: uri
          description: External real-time tracking URL if available

    DeliveryTrackingEvent:
      type: object
      required: [type, datetime]
      properties:
        type:
          type: string
          enum:
            - PICKUP_ONGOING
            - ARRIVED_AT_MERCHANT
            - ORDER_PICKED
            - DELIVERY_ONGOING
            - ARRIVED_AT_CUSTOMER
            - ORDER_DELIVERED
            - CANCELLED
        message:
          type: string
          description: Optional free-text event details
        datetime:
          type: string
          format: date-time
          description: Event timestamp (UTC, RFC 3339)

    DeliveryTrackingProblem:
      type: object
      required: [reason, datetime]
      properties:
        reason:
          type: string
          enum:
            - DELIVERYPERSON_OCCURRENCE
            - PAYMENT_PROBLEMS
            - WRONG_PRODUCT_OR_ITEM
            - ORDER_DELAYED
            - ORDER_DAMAGED_OR_VIOLATED
            - CUSTOMER_DID_NOT_PLACE_ORDER
            - CUSTOMER_ADDRESS_UNKNOWN
            - ORDER_MISSING_ITEMS
            - NOBODY_TO_RECEIVE
            - DELIVERYPERSON_WAITING_PAYMENT_FOR_ALREADY_PAID_ORDER
            - ORDER_DELIVERED_WITHOUT_PAYMENT
            - FRAUD_OR_THEFT
        message:
          type: string
          description: Optional free-text problem details
        datetime:
          type: string
          format: date-time
          description: Problem timestamp (UTC, RFC 3339)

    DeliveryTrackingVehicle:
      type: object
      properties:
        type:
          type: array
          items:
            type: string
            enum:
              - MOTORBIKE_BAG
              - MOTORBIKE_BOX
              - CAR
              - BICYCLE
              - SCOOTER
              - VUC
          maxItems: 10
        licencePlate:
          type: string
          description: Vehicle plate identifier

    DeliveryTrackingEta:
      type: object
      properties:
        pickupEtaInMinutes:
          type: integer
        pickupEtaDatetime:
          type: string
          format: date-time
        deliveryEtaInMinutes:
          type: integer
        deliveryEtaDatetime:
          type: string
          format: date-time
        maxDeliveryTime:
          type: string
          format: date-time

    DeliveryTrackingPerson:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        pictureURL:
          type: string
          format: uri

    DeliveryTrackingGeoLocalization:
      type: object
      properties:
        latitude:
          type: number
          format: float
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: float
          minimum: -180
          maximum: 180
        lastAddress:
          type: object
          description: Last known rider address context
          properties:
            country:
              type: string
              pattern: '^[A-Z]{2}$'
            state:
              type: string
            city:
              type: string
            district:
              type: string
            street:
              type: string
            postalCode:
              type: string
            distanceToPickup:
              type: string
            distanceToDelivery:
              type: string
            timestamp:
              type: string
              format: date-time
        invalidItems:
          type: array
          description: Item ids that are invalid (when applicable)
          items:
            type: string
          maxItems: 100
    Order:
      type: object
      required: [id, displayId, createdAt, merchant, timing, fulfillment, items, total, payments]
      properties:
        id:
          type: string
          description: The unique identifier of the order. The order ID is generated by the **Ordering Application**.
          example: order-abc123
        displayId:
          type: string
          description: Order Id shown in the **Ordering Application** interface for the customer.
          example: A123
        createdAt:
          type: string
          format: date-time
          description: Order creation date and time (UTC date-time in ISO timestamp format).
        sourceAppId:
          type: string
          format: uuid
          description: This field must be filled in with the AppId of the **Ordering Application** that originated the order.
        merchant:
          type: object
          description: '**[V2 CHANGED]** Merchant information for this order. In V2, `merchant.id` is originator-owned and `merchant.externalCode` is used for Software Service/PDV correlation.'
          required: [id]
          properties:
            id:
              type: string
              description: |-
                **[V2 CHANGED]** Unique Identifier for merchant correlation in the order.
                In V2, this id is generated and owned by the **Ordering Application** (originator), not by the merchant's **Software Service**.

                The **Software Service** should use `merchant.externalCode` to map this identifier to its internal merchant registry.
            externalCode:
              type: string
              description: '**[V2 NEW]** Merchant code in the Software Service/PDV used to correlate the originator merchant id with the internal merchant record.'
            name:
              type: string
              description: Merchant Public Name.
        customer:
          $ref: '#/components/schemas/OrderCustomer'
          description: Customer related information.
        timing:
          $ref: '#/components/schemas/OrderTimingContext'
          description: '**[V2 CHANGED]** Unified timing and scheduling context for this order. Consolidates V1 `orderTiming`, `schedule`, `preparationStartDateTime`, and `orderPriority` under one object.'
        fulfillment:
          allOf:
            - $ref: '#/components/schemas/OrderFulfillment'
          description: '**[V2 CHANGED]** Information for DELIVERY, TAKEOUT, or INDOOR orders. In V2, profile and context moved from root fields to `fulfillment`.'
        status:
          $ref: '#/components/schemas/OrderStatus'
          description: '**[V2 NEW]** Authoritative order status in the current snapshot. Consumers MUST use this field as source of truth for lifecycle state.'
        lastEvent:
          $ref: '#/components/schemas/OrderEventType'
          description: The last valid event polled (whether acknowledged or not) or sent via webhook.
        items:
          type: array
          minItems: 1
          description: '**[V2 CHANGED]** Order items. Each item now groups price fields under `item.pricing`.'
          items:
            $ref: '#/components/schemas/OrderItem'
        otherFees:
          type: array
          description: Other fees that may apply.
          items:
            type: object
            required: [name, type, price]
            properties:
              name:
                type: string
                description: Name related to the other fees.
              type:
                type: string
                description: |-
                  Type of fee.

                  - `DELIVERY_FEE`: Fee charged for delivering the order to the customer's address.
                  - `SERVICE_FEE`: Fee charged for the service provided by the Ordering Application platform or merchant.
                  - `TIP`: Gratuity amount given to the delivery person or service staff.
                  - `MIN_ORDER_FEE`: Additional fee charged when the order value is below the minimum required amount.
                enum: [DELIVERY_FEE, SERVICE_FEE, TIP, MIN_ORDER_FEE]
              receivedBy:
                type: string
                description: Indicates who is the final recipient of the fee amount.
                enum: [MARKETPLACE, MERCHANT, LOGISTIC_SERVICES]
              price:
                $ref: '#/components/schemas/Price'
                description: The fee price.
        discounts:
          type: array
          description: |-
            Any discounts that may apply.

            **IMPORTANT: A payment method MUST NOT be used as a discount. Discounts are amounts that subtract a portion of the final order value. To avoid duplication, if a value is declared in this object it MUST NOT be declared in the `payments` object.**
          items:
            type: object
            required: [amount, target, sponsorshipValues]
            properties:
              amount:
                $ref: '#/components/schemas/Price'
                description: Amount value of the discount.
              target:
                type: string
                description: Discount target.
                enum: [CART, DELIVERY_FEE, ITEM]
              targetId:
                type: string
                description: Only mandatory for `target` = `ITEM`.
              sponsorshipValues:
                type: array
                description: Values sponsored by either party. The sum of the amounts listed in this attribute must match `amount`.
                items:
                  type: object
                  required: [name, amount]
                  properties:
                    name:
                      type: string
                      description: Sponsoring party.
                      enum: [MARKETPLACE, MERCHANT, CHAIN]
                    amount:
                      $ref: '#/components/schemas/Price'
                      description: Discount amount given by the sponsor.
                    discountCode:
                      type: string
                      description: Code related to the discount applied.
        total:
          $ref: '#/components/schemas/OrderTotal'
          description: Set of fields with the sum of the values previously described in the order.
        payments:
          $ref: '#/components/schemas/OrderPayments'
          description: |-
            Payment details for the order.

            **IMPORTANT: A discount MUST NOT be used as a payment method. It is important that the sum of all values declared as payment methods is exactly equal to `total.orderAmount`. To avoid duplication, do not declare a payment method as a discount as well.**
        taxInvoice:
          $ref: '#/components/schemas/OrderTaxInvoice'
          description: Tax invoice information.
        context:
          type: object
          description: '**[V2 NEW]** Optional informational metadata about the order origin, not required for processing.'
          properties:
            salesChannel:
              type: string
              description: '**[V2 CHANGED]** You can indicate through which sales channel this order originated. In V2 this value is carried under `context.salesChannel`.'
        observations:
          type: string
          description: >
            **[V2 NEW]** General order-level remarks, not tied to a specific item (distinct from
            item-level `observations` and fulfillment-context notes).
        extraInfo:
          type: string
          description: Extra information shared by the originator for operational context.
    OrderItem:
      type: object
      required: [id, name, quantity, pricing]
      description: '**[V2 CHANGED]** Order items. Item pricing fields were consolidated into `pricing` in V2.'
      properties:
        id:
          type: string
          description: A unique identifier of the item.
        name:
          type: string
          description: Product name.
          example: Classic Burger
        externalCode:
          type: string
          description: External product code.
        itemOfferId:
          type: string
          description: '**[V2 NEW]** Catalog item offer reference when available.'
        quantity:
          type: number
          minimum: 0
          description: |-
            Amount of items.

            > Use fractional values for quantities smaller than the unit of measure:
            > Example: 500 grams = 0.5 KG
        unit:
          type: string
          enum: [UN, KG, L, OZ, LB, GAL]
          description: |
            Item's Unit of Measurement.

            Possible values:
            - `UN` - Unit
            - `KG` - Kilogram
            - `L` - Liter
            - `OZ` - Ounce
            - `LB` - Pound
            - `GAL` - Gallon

            > Use fractional values for quantities smaller than the unit of measure:
            > Example: 500 grams = 0.5 KG
          default: UN
        pricing:
          $ref: '#/components/schemas/OrderItemPricing'
          description: '**[V2 CHANGED]** Set of pricing fields for this item. Replaces flat V1 item price fields with a grouped pricing object.'
        options:
          type: array
          description: The optional extras chosen by the consumer, related to this item.
          items:
            $ref: '#/components/schemas/OrderItemOption'
        observations:
          type: string
          description: '**[V2 CHANGED]** Special instructions about the items. Equivalent to V1 `specialInstructions`.'
    OrderItemPricing:
      type: object
      required: [unitPrice, totalPrice]
      description: '**[V2 CHANGED]** Set of prices for an item grouped under `item.pricing`.'
      properties:
        unitPrice:
          allOf:
            - $ref: '#/components/schemas/Price'
          description: Price per unit. This is the price the customer is paying and will be considered for order totals calculations.
        originalPrice:
          allOf:
            - $ref: '#/components/schemas/Price'
          description: |-
            Original price of the product.
            This price **is for information purposes only** and should be used to inform the price of an item before applying markdowns on the list price.

            Discounts applied during the order such as coupons and vouchers should not be considered here. These must be reported in the `discounts` object.

            **THIS PRICE WILL NOT BE CONSIDERED FOR ORDER TOTALS CALCULATIONS.**
        optionsPrice:
          allOf:
            - $ref: '#/components/schemas/Price'
          description: The sum of the total prices of all options of the item.
        totalPrice:
          allOf:
            - $ref: '#/components/schemas/Price'
          description: Total Price of the item. **(quantity * (unitPrice + optionsPrice))**
    OrderItemOption:
      type: object
      required: [id, name, quantity, pricing]
      description: '**[V2 CHANGED]** Option selected for an item. Option pricing fields were consolidated into `pricing` in V2.'
      properties:
        id:
          type: string
          description: A unique identifier of the item.
        name:
          type: string
          description: Options name.
          example: Medium rare
        optionGroupId:
          type: string
          description: Unique option group identifier.
        optionGroupName:
          type: string
          description: Option group name.
        quantity:
          type: integer
          minimum: 1
          description: Amount of options selected.
        defaultQuantity:
          type: integer
          minimum: 0
          description: >
            **[V2 NEW]** Quantity of this option already included by default in the item (e.g. a free
            ingredient). Quantity beyond this value is billable. Distinguishes standard
            (already-included) selections from add-ons.
        pricing:
          $ref: '#/components/schemas/OrderItemOptionPricing'
          description: '**[V2 CHANGED]** Set of pricing fields for this option. Replaces flat V1 option price fields with a grouped pricing object.'
        options:
          type: array
          description: '**[V2 NEW]** Nested options for multi-level customization.'
          items:
            $ref: '#/components/schemas/OrderItemOption'
    OrderItemOptionPricing:
      type: object
      required: [unitPrice, totalPrice]
      description: '**[V2 CHANGED]** Set of prices for an option grouped under `option.pricing`.'
      properties:
        unitPrice:
          allOf:
            - $ref: '#/components/schemas/Price'
          description: Price per unit. This is the price the customer is paying and will be considered for order totals calculations.
        originalPrice:
          allOf:
            - $ref: '#/components/schemas/Price'
          description: |-
            Original price of the option.
            This price **is for information purposes only** and should be used to inform the price of an option before applying markdowns on the list price.

            Discounts applied during the order such as coupons and vouchers should not be considered here. These must be reported in the `discounts` object.

            **THIS PRICE WILL NOT BE CONSIDERED FOR ORDER TOTALS CALCULATIONS.**
        totalPrice:
          allOf:
            - $ref: '#/components/schemas/Price'
          description: Total Price of the option. **(quantity * unitPrice)**
    OrderTotal:
      type: object
      required: [itemsPrice, otherFees, discount, orderAmount]
      description: Set of fields with the sum of the values previously described in the order.
      properties:
        itemsPrice:
          $ref: '#/components/schemas/Price'
          description: Sum of the total price of the items listed in the `items` attribute.
        otherFees:
          $ref: '#/components/schemas/Price'
          description: Sum of the total value of other fees listed in the `otherFees` attribute. If there isn't one, use 0.
        discount:
          $ref: '#/components/schemas/Price'
          description: Sum of any discounts that may be listed in the `discounts` attribute. If there isn't one, use 0.
        orderAmount:
          $ref: '#/components/schemas/Price'
          description: The final value of the order (itemsPrice + otherFees - discounts).
    OrderCustomer:
      type: object
      required: [id, phone, name, ordersCountOnMerchant]
      description: |-
        Customer related information.

        **[V2 CHANGED]** This object is **REQUIRED** when `fulfillment.orderType` is `DELIVERY`.
      properties:
        id:
          type: string
          description: A unique identifier related to the consumer. If the Ordering Application does not have an Id for the customer, this Id can be generated when creating the order.
        name:
          type: string
          description: Customer name.
        documentNumber:
          type: string
          description: Customer document.
        phone:
          type: object
          required: [number]
          description: |-
            Customer's phone. Here you can enter the customer's phone number directly (provided that the customer has given permission for this data to be shared, according to local policies) or another phone number (such as the Ordering Application call center phone number) where the merchant can communicate about order issues that affect the customer.

            **Please note**: The telephone number is considered an identification field and therefore the customer's advance consent is required.
          properties:
            number:
              type: string
              description: Main customer phone number.
            extension:
              type: string
              description: Optional phone extension.
        email:
          type: string
          description: Customer email.
        ordersCountOnMerchant:
          type: integer
          description: Total number of orders that the customer already placed within the merchant.
        birthDate:
          type: string
          format: date
          description: '**[V2 NEW]** Optional customer birth date used for CRM/Loyalty segmentation and age-based campaigns.'
        gender:
          type: string
          description: '**[V2 NEW]** Optional customer gender used for CRM/Loyalty segmentation and communication personalization.'
    OrderTimingContext:
      type: object
      required: [orderTiming]
      description: |
        **[V2 CHANGED]** Unified timing block for order execution strategy.

        This object consolidates the V1 `orderTiming`, `orderPriority`, and `schedule`
        concepts in a single location while preserving the same semantics.
      properties:
        orderTiming:
          type: string
          description: |
            Indicates the timing for initiating the order:

            `INSTANT`: for orders that must be prepared immediately.
            `SCHEDULED`: for orders scheduled for a specific date and time. It is used with `schedule`.
            `ONDEMAND`: for orders that should start after `PREPARATION_REQUESTED`.

            **[V2 CHANGED]** When `orderTiming` is `SCHEDULED`, `timing.schedule` is required.
          enum: [INSTANT, SCHEDULED, ONDEMAND]
        schedule:
          $ref: '#/components/schemas/OrderSchedule'
          description: '**[V2 CHANGED]** Information for scheduled orders moved under `timing.schedule`.'
        preparationStartDateTime:
          type: string
          format: date-time
          description: '**[V2 CHANGED]** Suggestion for the preparation start time after order creation. In V2, this field lives under `timing`.'
        orderPriority:
          type: string
          description: |
            **[V2 CHANGED]** Defines the priority of preparation and delivery of this order in relation to other
            orders from the same Ordering Application. The lower the priority, the faster this
            order should be fulfilled.

            This field was moved under `timing` in V2 to keep all time/urgency decisions in one place.
          enum: [PRIORITY1, PRIORITY2, PRIORITY3, PRIORITY4, PRIORITY5]
    OrderSchedule:
      type: object
      required: [scheduledDateTimeStart, scheduledDateTimeEnd]
      description: |-
        Information for scheduled orders.

        **[V2 CHANGED]** This object is **REQUIRED** when `timing.orderTiming` is `SCHEDULED`.
      properties:
        scheduledDateTimeStart:
          type: string
          format: date-time
          description: |-
            Date and time for when the order is ready (start of scheduled window).
            It can be calculated by the **Ordering Application** using the average preparation time of the dishes.
            Default is the same time as order creation time.
        scheduledDateTimeEnd:
          type: string
          format: date-time
          description: |-
            Date and time for when the order is ready (end of scheduled window).
            It can be calculated by the **Ordering Application** using the average preparation time of the dishes.
            Default is the same time as order creation time.
    OrderPayments:
      type: object
      required: [prepaid, pending, methods]
      description: |
        All the description of the payment, such as methods, pre-payments, change, etc.

        **IMPORTANT: A discount MUST NOT be used as a payment method. It is important that the sum of all values declared as payment methods is exactly equal to `total.orderAmount`. To avoid duplication, do not declare a payment method as a discount as well.**
      properties:
        prepaid:
          type: number
          format: decimal
          description: Amount paid in advance.
        pending:
          type: number
          format: decimal
          description: Amount that is still to be paid.
        methods:
          type: array
          description: The payment method used. Whether it was online, on delivery, credit card, voucher, cash, etc.
          items:
            $ref: '#/components/schemas/OrderPaymentMethod'
    OrderPaymentMethod:
      type: object
      required: [value, currency, type, method]
      description: Payment method entry.
      properties:
        type:
          type: string
          description: '`PREPAID` if the payment was made through some platform, or `PENDING` if it is going to be paid on delivery or in cash, for example.'
          enum: [PREPAID, PENDING]
        method:
          type: string
          description: Payment method type.
          enum: [CREDIT, DEBIT, MEAL_VOUCHER, FOOD_VOUCHER, DIGITAL_WALLET, PIX, CASH, CREDIT_DEBIT, COUPON, REDEEM, PREPAID_REDEEM, OTHER]
        brand:
          type: string
          description: |-
            Indicates the brand of the card selected in the `method` field.

            This field must only be filled in if `method` is `CREDIT`, `DEBIT`, `CREDIT_DEBIT`, `MEAL_VOUCHER` or `FOOD_VOUCHER`.

            If `OTHER` is chosen, it is recommended that you describe the brand name in the `methodInfo` field.
          enum: [VISA, MASTERCARD, DINERS, AMEX, HIPERCARD, ELO, AURA, DISCOVER, VR_BENEFICIOS, SODEXO, TICKET, GOOD_CARD, BANESCARD, SOROCARD, POLICARD, VALECARD, AGICARD, JCB, CREDSYSTEM, CABAL, GREEN_CARD, VEROCHEQUE, AVISTA, OTHER]
        methodInfo:
          type: string
          description: |-
            Additional information regarding the payment method.
            It can be used to indicate useful information for the chosen payment method, such as wallet name or an authorization number.

            This field can be used for any `method`, but it is highly recommended when `method` is `OTHER`.
        value:
          type: number
          format: decimal
          description: Price value. 4 decimals places are accepted.
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: The 3-letter ISO 4217 currency code.
          example: BRL
        changeFor:
          type: number
          format: decimal
          description: |-
            Indicates the total that will be paid in cash by the customer and that should be considered for change calculation.

            Only mandatory when `method` is `CASH`.
        transaction:
          $ref: '#/components/schemas/OrderPaymentTransaction'
    OrderPaymentTransaction:
      type: object
      description: Authorization details and intermediary identification for payment transactions.
      properties:
        authorizationCode:
          type: string
          description: Credit card and/or subsidy transaction authorization number.
        acquirerDocument:
          type: string
          description: Document of the transaction intermediary (agency, delivery platform, marketplace, and similar).
    OrderTaxInvoice:
      type: object
      description: Tax invoice status and retrieval information.
      properties:
        issued:
          type: boolean
          description: Inform if a tax invoice has already been issued for this order.
          default: false
        taxInvoiceURL:
          type: string
          description: The address to download the tax invoice issued.
    Price:
      type: object
      required: [value, currency]
      description: Price object.
      properties:
        value:
          type: number
          format: decimal
          description: Price value. 4 decimals places are accepted
          example: 55
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: The 3-letter ISO 4217 currency code.
          example: BRL
    OrderFulfillment:
      type: object
      additionalProperties: false
      required: [orderType]
      description: |
        **[V2 CHANGED]** Fulfillment envelope and order profile selector.

        `orderType` is the single source of truth for the order profile in V2.
        The selected profile determines which fulfillment context object MUST be
        present:
        - `DELIVERY` -> `delivery`
        - `TAKEOUT` -> `takeout`
        - `INDOOR` -> `indoor`

        This schema uses `oneOf` to enforce profile/object consistency and to
        avoid ambiguous payloads with multiple active fulfillment contexts.
      properties:
        orderType:
          type: string
          enum: [DELIVERY, TAKEOUT, INDOOR]
          description: |
            **[V2 CHANGED]** Order profile discriminator within fulfillment.

            In V1, profile was represented by root field `order.type`. In V2, it moved to `fulfillment.orderType`.

            Normative rules:
            - MUST always be provided.
            - MUST match exactly one fulfillment context object.
            - MUST be used by consumers to interpret lifecycle/profile-specific rules.
        delivery:
          $ref: '#/components/schemas/DeliveryContext'
          description: |
            Delivery fulfillment context.
            MUST be present when `orderType` is `DELIVERY`.
            MUST NOT be present for other order types.
        takeout:
          $ref: '#/components/schemas/TakeoutContext'
          description: |
            Takeout fulfillment context.
            MUST be present when `orderType` is `TAKEOUT`.
            MUST NOT be present for other order types.
        indoor:
          $ref: '#/components/schemas/IndoorContext'
          description: |
            Indoor fulfillment context.
            MUST be present when `orderType` is `INDOOR`.
            MUST NOT be present for other order types.
      oneOf:
        - $ref: '#/components/schemas/OrderFulfillmentDelivery'
        - $ref: '#/components/schemas/OrderFulfillmentTakeout'
        - $ref: '#/components/schemas/OrderFulfillmentIndoor'
    OrderFulfillmentDelivery:
      title: Delivery
      description: DELIVERY profile payload
      type: object
      required: [orderType, delivery]
      properties:
        orderType:
          type: string
          enum: [DELIVERY]
        delivery:
          allOf:
            - $ref: '#/components/schemas/DeliveryContext'
          description: Delivery context payload for DELIVERY orders.
    OrderFulfillmentTakeout:
      title: Takeout
      description: TAKEOUT profile payload
      type: object
      required: [orderType, takeout]
      properties:
        orderType:
          type: string
          enum: [TAKEOUT]
        takeout:
          allOf:
            - $ref: '#/components/schemas/TakeoutContext'
          description: Takeout context payload for TAKEOUT orders.
    OrderFulfillmentIndoor:
      title: Indoor
      description: INDOOR profile payload
      type: object
      required: [orderType, indoor]
      properties:
        orderType:
          type: string
          enum: [INDOOR]
        indoor:
          allOf:
            - $ref: '#/components/schemas/IndoorContext'
          description: Indoor context payload for INDOOR orders.
    DeliveryContext:
      type: object
      description: '**[V2 CHANGED]** Delivery-specific context (when `fulfillment.orderType` is `DELIVERY`). Moved from root `order.delivery` in V1.'
      properties:
        address:
          type: object
          description: The address to which the order will be delivered.
          properties:
            street:
              type: string
              description: Street name.
            complement:
              type: string
              description: Address complement.
            neighborhood:
              type: string
              description: Neighborhood or district.
            city:
              type: string
              description: City name.
            state:
              type: string
              description: State or country subdivision.
            postalCode:
              type: string
              description: Postal Code.
            coordinates:
              type: object
              description: Geographic coordinates of the delivery address.
              properties:
                latitude:
                  type: number
                  format: double
                  description: Latitude in degrees. Values are restricted to the range [-90, 90].
                longitude:
                  type: number
                  format: double
                  description: Longitude in degrees. Values are restricted to the range [-180, 180].
        estimatedDeliveryDateTime:
          type: string
          format: date-time
          description: Estimated delivery date and time shown to the customer.
        observations:
          type: string
          description: Additional delivery observations.
    TakeoutContext:
      type: object
      description: '**[V2 CHANGED]** Takeout-specific context (when `fulfillment.orderType` is `TAKEOUT`). Moved from root `order.takeout` in V1.'
      properties:
        pickupCode:
          type: string
          description: Pickup verification code when applicable.
        observations:
          type: string
          description: Additional takeout observations.
    IndoorContext:
      type: object
      description: |
        **[V2 CHANGED]** Indoor context on an order with `fulfillment.orderType: INDOOR`.
        Aligns with the Indoor extension operational key (`operationMode` + `identifier`) and
        carries operational hints for channel, service, fulfillment, and fiscal behavior.

        Canonical identifiers are English-only in V2:
        - `operationMode`: `TABLE`, `TAB`, `COUNTER`
        - `originChannel.type`: `TOTEM`, `QR_CODE`, `CUSTOMER_TABLET`, `WAITER_TABLET`, `FRONT_DESK`, `POS`, `APP`, `WHATSAPP`, `OTHER`
        - `consumptionType`: `DINE_IN`, `TAKEAWAY`

        Common legacy labels in integrations map to the canonical tokens above (for example:
        MESA->TABLE, COMANDA->TAB, BALCAO->COUNTER).
      required: [operationMode, identifier, originChannel, consumptionType]
      properties:
        operationMode:
          allOf:
            - $ref: '#/components/schemas/IndoorOperationMode'
          description: Account grouping mode.
        identifier:
          type: string
          description: Table number, tab id, or counter position
          example: '5'
        account:
          type: object
          description: Existing account reference when already known by the Software Service.
          required: [id]
          properties:
            id:
              type: string
              description: Existing account identifier (`account.id` in payload notation).
        consumptionType:
          allOf:
            - $ref: '#/components/schemas/IndoorConsumptionType'
          description: Consumption intent for this indoor order.
        originChannel:
          allOf:
            - $ref: '#/components/schemas/IndoorOriginChannel'
          description: Order origin channel metadata.
        service:
          allOf:
            - $ref: '#/components/schemas/IndoorServiceInfo'
          description: Service metadata such as waiter and party size.
        fulfillment:
          allOf:
            - $ref: '#/components/schemas/IndoorFulfillmentInfo'
          description: On-premise handoff strategy (`CALL` or `DISPATCH`).
        fiscal:
          allOf:
            - $ref: '#/components/schemas/IndoorOrderFiscalInfo'
          description: Fiscal preferences informed at order time.
        notifications:
          allOf:
            - $ref: '#/components/schemas/IndoorNotifications'
          description: Notification channels tied to this order/account.
    IndoorOperationMode:
      type: string
      enum: [TABLE, TAB, COUNTER]
      description: |
        Primary operational mode for indoor service.
        Canonical values replace common legacy labels:
        - `TABLE` (legacy: MESA)
        - `TAB` (legacy: COMANDA)
        - `COUNTER` (legacy: BALCAO)
    IndoorConsumptionType:
      type: string
      enum: [DINE_IN, TAKEAWAY]
      description: |
        Consumption intent associated with the indoor order.
        Canonical values replace common legacy labels:
        - `DINE_IN` (legacy: CONSUMIR_NO_LOCAL)
        - `TAKEAWAY` (legacy: LEVAR)
    IndoorOriginChannel:
      type: object
      description: Indoor order origin channel.
      required: [type]
      properties:
        type:
          type: string
          enum:
            - TOTEM
            - QR_CODE
            - CUSTOMER_TABLET
            - WAITER_TABLET
            - FRONT_DESK
            - POS
            - APP
            - WHATSAPP
            - OTHER
          description: |
            Indoor order origin channel.
            Canonical values replace common legacy labels such as TABLET_CLIENTE,
            TABLET_GARCOM, FRENTE_DE_CAIXA, PDV, APLICATIVO, and OUTRO.
        id:
          type: string
          description: Specific channel/device/origin identifier.
        notes:
          type: string
          description: Free-text note about the origin channel.
    IndoorFulfillmentInfo:
      type: object
      description: Order handoff mode for indoor consumption.
      required: [type]
      properties:
        type:
          type: string
          enum: [DISPATCH, CALL]
          description: |
            Indoor handoff mode.
            - `DISPATCH`: order is taken to a place/seat/table
            - `CALL`: customer is called to collect/receive
        dispatch:
          allOf:
            - $ref: '#/components/schemas/IndoorDispatchInfo'
          description: Dispatch metadata when `type = DISPATCH`.
        call:
          allOf:
            - $ref: '#/components/schemas/IndoorCallInfo'
          description: Call strategy when `type = CALL`.
    IndoorCallInfo:
      type: object
      description: How the customer is called for pickup/service.
      properties:
        type:
          type: string
          enum: [TICKET_NUMBER, PAGER, CALL_NAME, WHATSAPP, OTHER]
          description: |
            Customer call identifier type.
            `TICKET_NUMBER` corresponds to legacy "senha" flows.
        label:
          type: string
          description: Visible call label (ticket number, pager label, name, etc).
        notifyOriginator:
          type: boolean
          description: Whether the originator should be notified about call progress.
    IndoorDispatchInfo:
      type: object
      description: Dispatch destination metadata.
      properties:
        id:
          type: string
          description: Dispatch point/location identifier.
        label:
          type: string
          description: Friendly name of the dispatch point/location.
        sector:
          type: string
          description: Sector, court, or operational area for dispatch.
        seat:
          allOf:
            - $ref: '#/components/schemas/IndoorSeatRef'
          description: Seat/place/position metadata.
    IndoorSeatRef:
      type: object
      description: Reference to a seat, place, or position.
      properties:
        id:
          type: string
          description: Seat, place, or position identifier.
        label:
          type: string
          description: Friendly seat/place/position label.
    IndoorServiceInfo:
      type: object
      description: Service metadata associated with the indoor order.
      properties:
        waiterCode:
          type: string
          description: Code of the responsible waiter/attendant.
        waiterName:
          type: string
          description: Name of the responsible waiter/attendant.
        peopleCount:
          type: integer
          minimum: 0
          description: Number of people associated with the account/session.
    IndoorNotifications:
      type: object
      description: Notification channels linked to the account or customer.
      properties:
        whatsAppId:
          type: string
          description: WhatsApp identifier linked to the account or customer.
    IndoorOrderFiscalInfo:
      type: object
      description: Fiscal preferences provided on the indoor order.
      required: [shouldIssueDocument]
      properties:
        shouldIssueDocument:
          type: boolean
          description: Whether the order/account should generate a fiscal document.
        documentStatus:
          type: string
          enum: [NOT_ISSUED, ISSUED, PENDING]
          description: |
            Known fiscal status at order time.
            Canonical values replace common legacy labels:
            - `NOT_ISSUED` (legacy: NAO_EMITIDA)
            - `ISSUED` (legacy: EMITIDA)
            - `PENDING` (legacy: PENDENTE)
        printDocument:
          type: boolean
          description: Whether physical document printing is requested.
        paymentNSURequiredForNFCE:
          type: boolean
          description: Whether payment NSU is required for NFC-e issuance.
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: INVALID_ORDER_STATE_TRANSITION
        message:
          type: string
          example: Cannot confirm an order in CANCELLED status
        details:
          type: array
          description: Optional list with field-level validation details.
          items:
            type: object
            properties:
              field:
                type: string
                description: Name/path of the field related to the issue.
              issue:
                type: string
                description: Human-readable description of the validation issue.
