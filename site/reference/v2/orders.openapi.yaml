tags:
- name: ReleaseNotes
  x-displayName: Release notes
  x-traitTag: true
  description: |-
    ## Release Candidate status

    This contract is part of Open Delivery Protocol **V2.0.0-rc** (Release Candidate).
    It is published for **ecosystem validation**: company review and implementation pilots.
    Clarifying or corrective changes may still occur based on pilot feedback.
    A stable release will follow only after validation completes.
    **V1 remains the production reference** during the transition.

    ## Breaking changes from V1

    | Change | V1 | V2 |
    |---|---|---|
    | Cancellation (Software Service → OA) | `POST …/requestCancellation`; outcomes via events | **Kept** + explicit **`CANCELLATION_REQUEST_ACCEPTED`** then **`CANCELLED`** (or `CANCELLATION_REQUEST_DENIED`) |
    | Cancellation (Ordering Application → SS) | Optional handshake: event `ORDER_CANCELLATION_REQUEST` + `acceptCancellation` / `denyCancellation`, **or** mandatory `CANCELLED` | **Handshake removed.** Only **mandatory cancellation**: OA emits **`CANCELLED`** (and status `CANCELLED`); SS MUST apply it |
    | Cancel endpoints removed | `acceptCancellation`, `denyCancellation` | **Removed** (they existed only for OA-initiated handshake) |
    | Event `ORDER_CANCELLATION_REQUEST` | OA → SS (handshake) | **Removed** |
    | `PICKED_UP` / `pickedUp` | Present (ambiguous takeout vs logistics) | **Removed** |
    | Order profile field | `order.type` at root | **Moved** to `fulfillment.orderType` (profile discriminator) |
    | Order fulfillment context fields | `order.delivery` / `order.takeout` / `order.indoor` at root | **Moved** to `order.fulfillment.delivery` / `.takeout` / `.indoor` |
    | Order create HTTP | None (event-driven) | Still **none** — explicit: no `POST /orders` |
    | Duplicate lifecycle call | Often `422` if treated as sync reprocess | **`202` if already in target state** |
    | Authoritative status field (`order.status`) | No authoritative status field; many integrations inferred state from events (`lastEvent`) | **Added** on `GET /orders/{orderId}` as source of truth |
    | Status vs events semantics | Frequently confused | **Status** on GET is authoritative; events are notifications |
    | Merchant id on order | Often PDV-generated | Originator-owned merchant id + PDV `externalCode` (see Merchant) |
- name: CapabilityOverview
  x-displayName: Overview
  x-traitTag: true
  description: |-
    ## Orders capability

    Open Delivery Orders coordinates the **interoperable lifecycle of an order** between
    the Ordering Application (originator) and the Software Service (merchant systems),
    with optional logistics parties.

    > **Open Delivery is a protocol, not a product API.**
    > There is no central server. Each party hosts the endpoints it is responsible for.

    ## How an order enters the protocol

    1. The **Ordering Application** creates the order in its own system.
    2. It emits a **`CREATED`** event (polling and/or webhook).
    3. The **Software Service** acknowledges the event and calls
       **`GET /orders/{orderId}`** to load the full snapshot (items, totals, fulfillment).
    4. Lifecycle progresses via explicit operations (`confirm`, `preparing`, …) hosted by
       the Ordering Application (marketplace model, same as V1).
    5. Every relevant fact is notified again as an **event**. **`order.status`** on GET
       remains the reconciliation source of truth.

    ```mermaid
    sequenceDiagram
        participant OA as Ordering Application
        participant SS as Software Service

        Note over OA: Order created in OA system
        SS->>OA: GET /events:polling
        OA-->>SS: 200 [{ eventType: CREATED, orderId }]
        SS->>OA: POST /events/acknowledgment
        SS->>OA: GET /orders/{orderId}
        OA-->>SS: 200 Order (status: CREATED)
        SS->>OA: POST /orders/{orderId}/confirm
        OA-->>SS: 202 Accepted
        SS->>OA: GET /events:polling
        OA-->>SS: 200 [{ eventType: CONFIRMED, orderId }]
    ```

    ## Parties

    | Role | Responsibility in this capability |
    |---|---|
    | **Ordering Application** | Originates the order. **Hosts** polling, order GET, and lifecycle mutation endpoints (marketplace model). Emits events. |
    | **Software Service** | Merchant system. **Consumes** events (polling and/or webhook), loads order details, calls lifecycle operations. Operational authority at the store. |
    | **Delivery Platform** (optional) | Logistics. Emits **informational** tracking facts that MUST NOT redefine order status. See Logistics. |

    ## Status vs events

    V2 introduces **authoritative order status** as a first-class concept. V1 integrations
    often relied on lifecycle events alone; in V2, implementers must separate the
    **current business state** of the order from the **notifications** that announce facts
    about that order.

    | Concept | What it is | Source of truth |
    |---|---|---|
    | **Status** | Current business condition of the order | `order.status` on `GET /orders/{orderId}` |
    | **Event** | Immutable lifecycle fact / notification | Polling or webhook payload (`eventId`, `eventType`) |

    - **Status** MUST be explicit and queryable at any time. Use it for reconciliation.
    - **Events** MUST NOT be treated as commands. They notify that something happened.
    - Some events **project** a status change (for example `CONFIRMED` -> status `CONFIRMED`).
    - Some events are **informational only** and MUST NOT change authoritative order status.
    - Consumers MUST NOT infer authoritative status from the event stream alone.

    The full state machine and profile-specific lifecycle obligations are defined in
    [Order lifecycle](#tag/Orders).

    ## Responsibilities by endpoint (marketplace model)

    | Endpoint | Hosted by | Called by |
    |---|---|---|
    | [`GET /events:polling`](#operation/pollingEvents) | Ordering Application | Software Service |
    | [`POST /events/acknowledgment`](#operation/acknowledgeEvents) | Ordering Application | Software Service |
    | Webhook [`orderEvent`](#operation/receiveOrderEvent) | Software Service | Ordering Application |
    | [`GET /orders/{orderId}`](#operation/getOrder) | Ordering Application | Software Service |
    | [`POST …/confirm`](#operation/confirmOrder) (and other lifecycle) | Ordering Application | Software Service |
    | [`POST …/tracking`](#operation/sendOrderTracking) | Ordering Application | Software Service or delivery operator acting for merchant |
    | [`POST …/validateCode`](#operation/validateDeliveryCode) | Ordering Application | Software Service or delivery operator acting for merchant |
    | [`PATCH …/details`](#operation/patchOrderDetails) | Ordering Application | Software Service |
    | [`POST …/requestCancellation`](#operation/requestCancellation) | Ordering Application | Software Service (merchant wants to cancel) |
    | Mandatory cancel (`CANCELLED` event) | Ordering Application emits | Software Service consumes (no HTTP accept/deny) |

    Authentication and Discovery declarations are defined in [Integration](#tag/IntegrationProfile).

- name: IntegrationProfile
  x-displayName: Integration
  x-traitTag: true
  description: |-
    ## Authentication

    All endpoints require `Authorization: Bearer {token}` unless marked otherwise.

    OAuth 2.0 grant models, scopes, and webhook signature validation (HMAC-SHA256)
    are defined in the [Authentication specification](../authentication/).

    Preferred scope for this capability: `od.orders`.

    <SecurityDefinitions />

    ## Discovery declarations

    Implementations MUST publish Orders capability behavior in
    [Discovery](../discovery/) so counterparties can integrate predictably.

    At minimum, declare:
    - `capabilities.orders.version` and `capabilities.orders.supported`.
    - Role declarations under `capabilities.orders.originator` and/or `capabilities.orders.receiver`.
    - Delivery mode support via `supportsWebhook` and `supportsPolling` in the active role.
    - `supportedOperations`/`unsupportedOperations` and `supportedEvents`/`unsupportedEvents` as applicable.

    Legacy migration note (V1 `sendXXX` style flags):
    - `sendPreparing` -> declare `setOrderPreparing` in `supportedOperations`.
    - `sendReadyForPickup` -> declare `setOrderReadyForPickup` in `supportedOperations`.
    - `sendDispatch` -> declare `dispatchOrder` in `supportedOperations`.
    - `sendDelivered` -> declare `setOrderDelivered` in `supportedOperations`.
    - `sendTracking` -> declare `sendOrderTracking` in `supportedOperations`.
    - `sendPickedUp` is deprecated/removed in V2 and MUST NOT be declared as active behavior.

    Normative interpretation:
    - `MUST` events remain mandatory regardless of Discovery declarations.
    - `MUST NOT` events remain forbidden for the profile.
    - `MAY` events become integration commitments when declared in Discovery.
    - Consumers SHOULD implement all mandatory behavior plus declared optional behavior.

