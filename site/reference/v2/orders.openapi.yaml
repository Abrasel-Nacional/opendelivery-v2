info:
  title: Open Delivery V2 — Orders
  version: 2.0.0-rc
  summary: Normative Orders contracts — lifecycle, status, events, polling, and webhooks
  description: |-
    This specification is the **normative, self-contained contract** of Open Delivery
    for the **order lifecycle**: endpoints, fields, MUST rules, errors, and JSON examples.

    Recommended reading flow in ReDoc:
    1. **Release notes** (RC status and V1 breaking changes)
    2. **Overview** (model and status vs events)
    3. **Integration** (authentication and Discovery declarations)
    4. **Orders** (lifecycle operation semantics)
    5. **Events** (polling/webhook delivery and deduplication)
    6. **External docs** (related capabilities and guides)

    The RC and compatibility notes are in the **Release notes** section.
