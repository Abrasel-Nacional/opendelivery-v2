paths:
  /customers:
    get:
      tags: [Customers]
      summary: Lista e consulta clientes com filtros
      operationId: listCustomers
      description: |-
        Consulta clientes de forma paginada, priorizando filtros em vez de
        navegação por identificador unitário. Uso recomendado para integrações
        CRM e importação/consulta em massa.

        | **Hospedado por** | Software Service (CRM) |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service (CRM)"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/customerIdentifierType'
        - $ref: '#/components/parameters/customerIdentifierValue'
        - $ref: '#/components/parameters/externalId'
        - $ref: '#/components/parameters/updatedFrom'
        - $ref: '#/components/parameters/updatedTo'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Lista paginada de clientes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Customers]
      summary: Importa ou sincroniza clientes em lote
      operationId: upsertCustomers
      description: |-
        Importação/sincronização de clientes. Suporta lote pequeno ou médio,
        conforme os limites declarados no documento de descoberta.
        Processamento é assíncrono — `202 Accepted` confirma recebimento do lote,
        não a persistência individual de cada registro.

        | **Hospedado por** | Software Service (CRM) |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service (CRM)"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerUpsertRequest'
      responses:
        '202':
          description: Lote recebido para processamento assíncrono.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /leads:
    get:
      tags: [Leads]
      summary: Lista leads com filtros
      operationId: listLeads
      description: |-
        Consulta leads de forma paginada. Uso recomendado para sincronização
        inicial ou reconciliação de dados entre a plataforma e o CRM.

        | **Hospedado por** | Software Service (CRM) |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service (CRM)"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/updatedFrom'
        - $ref: '#/components/parameters/updatedTo'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Lista paginada de leads.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Leads]
      summary: Importa ou sincroniza leads em lote
      operationId: upsertLeads
      description: |-
        Importação/sincronização de leads. Processamento é assíncrono —
        `202 Accepted` confirma recebimento do lote, não a persistência individual.

        | **Hospedado por** | Software Service (CRM) |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service (CRM)"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadUpsertRequest'
      responses:
        '202':
          description: Lote recebido para processamento assíncrono.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders:
    get:
      tags: [Orders]
      summary: Consulta pedidos em lote/histórico para uso pelo CRM
      operationId: listOrders
      description: |-
        Consulta pedidos de forma paginada para enriquecimento do perfil do cliente
        no CRM. Esta operação **não** replica o lifecycle operacional de pedidos —
        para isso, consulte a especificação de Orders.

        | **Hospedado por** | Software Service (CRM) |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service (CRM)"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/customerIdentifierType'
        - $ref: '#/components/parameters/customerIdentifierValue'
        - $ref: '#/components/parameters/storeId'
        - $ref: '#/components/parameters/originChannel'
        - $ref: '#/components/parameters/createdFrom'
        - $ref: '#/components/parameters/createdTo'
        - $ref: '#/components/parameters/updatedFrom'
        - $ref: '#/components/parameters/updatedTo'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Lista paginada de pedidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Orders]
      summary: Importa ou sincroniza pedidos em lote
      operationId: upsertOrders
      description: |-
        Importação em lote de pedidos para integração com CRM. Processamento é
        assíncrono — `202 Accepted` confirma recebimento do lote, não a persistência
        individual de cada registro.

        | **Hospedado por** | Software Service (CRM) |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service (CRM)"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpsertRequest'
      responses:
        '202':
          description: Lote recebido para processamento assíncrono.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}:
    get:
      tags: [Orders]
      summary: Consulta pedido específico
      operationId: getOrderById
      description: |-
        Endpoint opcional para cenários que demandem consulta direta a um pedido
        conhecido. A integração continua privilegiando consultas por filtros e lote.

        | **Hospedado por** | Software Service (CRM) |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service (CRM)"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/orderId'
      responses:
        '200':
          description: Pedido encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /reviews:
    get:
      tags: [Reviews]
      summary: Lista avaliações com filtros
      operationId: listReviews
      description: |-
        Consulta avaliações de forma paginada com filtros por cliente, pedido e período.

        | **Hospedado por** | Software Service (CRM) |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service (CRM)"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/customerIdentifierType'
        - $ref: '#/components/parameters/customerIdentifierValue'
        - $ref: '#/components/parameters/orderIdQuery'
        - $ref: '#/components/parameters/createdFrom'
        - $ref: '#/components/parameters/createdTo'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: Lista paginada de avaliações.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Reviews]
      summary: Envia avaliações ao CRM
      operationId: createReviews
      description: |-
        A Ordering Application envia avaliações de clientes ao CRM em lote.
        Processamento é assíncrono — `202 Accepted` confirma recebimento do lote.

        | **Hospedado por** | Software Service (CRM) |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service (CRM)"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewUpsertRequest'
      responses:
        '202':
          description: Lote recebido para processamento assíncrono.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /reviews/{reviewId}:
    get:
      tags: [Reviews]
      summary: Consulta avaliação específica
      operationId: getReviewById
      description: |-
        Consulta direta a uma avaliação pelo seu identificador.

        | **Hospedado por** | Software Service (CRM) |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service (CRM)"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
