openapi: 3.1.0
x-spectral-ignore:
  - owasp:api4:2023-string-restricted
info:
  title: Open Delivery V2 - Customer & Loyalty
  version: 2.0.0-rc1
  summary: Contratos de transporte CRM e Loyalty do protocolo Open Delivery V2
  description: >
    Contratos de transporte do protocolo Open Delivery para gestão de dados de clientes,
    leads, pedidos no contexto de CRM, avaliações, eventos de relacionamento e
    programas de fidelidade.

servers:
  - url: https://api.example.com/od/v2
    description: Ambiente de produção
    x-internal: false
  - url: https://sandbox.example.com/od/v2
    description: Ambiente de staging/homologação
    x-internal: true

security:
  - bearerAuth: []

tags:
  # ── Visão Geral ──────────────────────────────────────────────────────────────
  - name: CapabilityOverview
    x-displayName: Visão Geral
    x-traitTag: true
    description: |-
      ## Customer & Loyalty Capability

      Esta especificação descreve os contratos de transporte do protocolo Open Delivery
      para as capacidades de **CRM** (Customers, Leads, Orders, Reviews, Events) e
      **Loyalty** (programas, contas, transações, recompensas, cupons, resgates e eventos).

      > **Open Delivery é um protocolo, não uma API de produto.**
      > Não há servidor central nem ambiente de produção. Cada parte implementa os
      > endpoints que lhe cabem em sua própria infraestrutura.

      ## Partes envolvidas

      | Papel | Responsabilidade nesta capability |
      |---|---|
      | **Ordering Application** | Plataforma de pedidos. Envia dados ao CRM/Loyalty e recebe eventos via webhook. |
      | **Software Service — CRM/Loyalty** | Plataforma de CRM e fidelidade. Hospeda e implementa os endpoints desta especificação. Emite eventos via webhook à Ordering Application. |

      ## Fluxo feliz — CRM

      ```mermaid
      sequenceDiagram
          participant OA as Ordering Application
          participant SS as Software Service (CRM)

          Note over OA,SS: Sincronização inicial de clientes
          OA->>SS: POST /customers (lote)
          SS-->>OA: 202 Accepted

          Note over OA,SS: Lead capturado na plataforma
          OA->>SS: POST /leads (lote)
          SS-->>OA: 202 Accepted

          Note over OA,SS: Pedido concluído — CRM recebe contexto
          OA->>SS: POST /orders (lote)
          SS-->>OA: 202 Accepted

          Note over OA,SS: CRM enriquece dados via pull
          SS->>OA: GET /customers (filtros)
          OA-->>SS: 200 OK (lista paginada)

          Note over OA,SS: Cliente submete avaliação
          OA->>SS: POST /reviews
          SS-->>OA: 202 Accepted

          Note over OA,SS: Evento relevante de cliente
          SS-)OA: webhook: customerEvent
          OA-->>SS: 204 No Content
      ```

      ## Fluxo feliz — Loyalty

      ```mermaid
      sequenceDiagram
          participant OA as Ordering Application
          participant SS as Software Service (Loyalty)

          Note over OA,SS: OA consulta saldo do cliente
          OA->>SS: GET /customers/{id}/loyalty-accounts
          SS-->>OA: 200 OK (contas e saldo)

          Note over OA,SS: Cliente escolhe recompensa
          OA->>SS: GET /loyalty/rewards
          SS-->>OA: 200 OK (catálogo)

          Note over OA,SS: Cliente confirma resgate
          OA->>SS: POST /loyalty/redemptions
          SS-->>OA: 202 Accepted

          Note over OA,SS: SS notifica OA sobre movimentação
          SS-)OA: webhook: loyaltyEvent
          OA-->>SS: 204 No Content
      ```

      ## Descoberta de capacidades

      Antes de qualquer operação, a **Ordering Application DEVE** consultar
      `GET /.well-known/opendelivery` no Software Service para descobrir as
      capacidades disponíveis, limites de payload, paginação e metadados de
      integração. O contrato completo desse endpoint está na
      [especificação de Discovery](../discovery/).

      ## Autenticação

      Todos os endpoints desta especificação exigem um Bearer Token. Os modelos de
      concessão OAuth 2.0 suportados, os escopos e o mecanismo de assinatura de
      webhooks (HMAC-SHA256) são comuns a todo o protocolo Open Delivery e estão
      documentados na [especificação de Autenticação](../authentication/) — não
      duplicados aqui.

      <SecurityDefinitions />

  # ── CRM ──────────────────────────────────────────────────────────────────────
  - name: CRMOverview
    x-displayName: Visão Geral do CRM
    x-traitTag: true
    description: |-
      ## CRM no contexto do protocolo

      A capacidade de CRM define contratos de transporte para sincronização de dados
      entre a plataforma de pedidos e o sistema de CRM. O protocolo **não impõe**
      regras de negócio internas — segmentação, eligibilidade de campanhas e lógica
      promocional são responsabilidade de cada implementação.

      > **Customer não é Loyalty.** Esta capability cobre cadastro de clientes, leads,
      > pedidos no contexto CRM, avaliações e eventos de relacionamento. Acúmulo de
      > pontos, resgates e cupons estão na seção Loyalty.

      ## Responsabilidades por endpoint

      | Endpoint | Ordering Application | Software Service (CRM) |
      |---|:---:|:---:|
      | `GET /customers` | ↗️ | ✅ |
      | `POST /customers` | ↗️ | ✅ |
      | `GET /leads` | ↗️ | ✅ |
      | `POST /leads` | ↗️ | ✅ |
      | `GET /orders` | ↗️ | ✅ |
      | `POST /orders` | ↗️ | ✅ |
      | `GET /orders/{orderId}` | ↗️ | ✅ |
      | `GET /reviews` | ↗️ | ✅ |
      | `POST /reviews` | ↗️ | ✅ |
      | `GET /reviews/{reviewId}` | ↗️ | ✅ |
      | Webhook `customerEvent` | ✅ | ↗️ |

      ✅ implementa (hospeda) · ↗️ consome (chama)

  - name: Customers
    description: |-
      Entidade central do padrão Customer. Representa o cliente final com
      identificadores canônicos, dados de contato, endereços e consentimentos.

      O único campo obrigatório é `identifier` — todos os demais são opcionais e
      podem ser enriquecidos progressivamente ao longo do relacionamento.

  - name: Leads
    description: |-
      Lead representa um potencial cliente em fase de aquisição, com estrutura mínima.
      A plataforma de pedidos envia leads ao CRM conforme eventos de interesse
      (ex.: carrinho abandonado, consulta de cardápio, formulário preenchido).

  - name: Orders
    description: |-
      Visão CRM dos pedidos: histórico e sincronização em lote. Esta tag **não**
      replica o lifecycle operacional de pedidos — para isso, consulte a
      especificação de Orders. Aqui o foco é enriquecer o perfil do cliente
      no CRM com o histórico de compras para analytics e segmentação.

  - name: Reviews
    description: |-
      Avaliações com modelo MVP flexível. O campo `ratings` suporta múltiplas
      metodologias de avaliação (NPS, estrelas, escala numérica, thumbs) que
      podem coexistir dentro do mesmo protocolo.

  - name: CustomerEvents
    description: |-
      Webhook assíncrono de eventos focados no cliente. Notifica a Ordering
      Application sobre eventos com relevância direta para CRM, sem replicar
      o lifecycle operacional completo do pedido.

  # ── Loyalty ──────────────────────────────────────────────────────────────────
  - name: LoyaltyOverview
    x-displayName: Visão Geral do Loyalty
    x-traitTag: true
    description: |-
      ## Loyalty no contexto do protocolo

      A capacidade de Loyalty define contratos de transporte para programas de
      fidelidade. O protocolo transporta estrutura e estado — **não impõe** regras
      de eligibilidade, cálculo de pontos, expiração ou segmentação de campanhas.

      > **Loyalty é uma extensão de Customer.** Implementações que não possuem
      > a capability Customer ativa não podem usar esta extensão.

      ## Responsabilidades por endpoint

      | Endpoint | Ordering Application | Software Service (Loyalty) |
      |---|:---:|:---:|
      | `GET /loyalty/programs` | ↗️ | ✅ |
      | `POST /loyalty/programs` | ↗️ | ✅ |
      | `GET /loyalty/programs/{programId}` | ↗️ | ✅ |
      | `GET /customers/{customerId}/loyalty-accounts` | ↗️ | ✅ |
      | `GET /loyalty/accounts/{accountId}` | ↗️ | ✅ |
      | `GET /loyalty/accounts/{accountId}/transactions` | ↗️ | ✅ |
      | `GET /loyalty/rewards` | ↗️ | ✅ |
      | `GET /loyalty/coupons` | ↗️ | ✅ |
      | `POST /loyalty/redemptions` | ↗️ | ✅ |
      | Webhook `loyaltyEvent` | ✅ | ↗️ |

      ✅ implementa (hospeda) · ↗️ consome (chama)

      ## Operações permitidas por status de conta

      | Operação | `ENROLLED` | `ACTIVE` | `SUSPENDED` |
      |---|---|---|---|
      | Consultar saldo | ✅ | ✅ | ✅ |
      | Acumular pontos | ↗️ | ✅ | ↗️ |
      | Resgatar recompensa | ↗️ | ✅ | ↗️ |
      | Usar cupom | ↗️ | ✅ | ↗️ |

  - name: Loyalty
    description: |-
      Fidelidade orientada a programa: contas, transações, recompensas, cupons
      e resgates. Cada conta de fidelidade está vinculada a um programa e a um
      cliente identificado pelo protocolo Customer.

  - name: LoyaltyEvents
    description: |-
      Webhook específico de eventos de fidelidade. Notifica a Ordering Application
      sobre movimentações relevantes no programa de fidelidade do cliente:
      acúmulo de pontos, resgates, uso de cupons e mudança de tier.

