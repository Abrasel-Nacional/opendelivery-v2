  /accounts/pre-close:
    post:
      tags:
      - Accounts
      operationId: preCloseAccount
      summary: Pre-close / lock account for checkout
      description: |-
        Requests account pre-close — an operational lock that blocks new items and
        metadata changes, signalling the account is ready for final checkout.
        **It is not a prerequisite to post payment** — payments may already have been
        posted, or may still be pending. This is when the **final payment** is expected:
        the remaining balance if earlier payments exist, or the full amount if none yet.

        > **Event emitted:** `ACCOUNT_PRE_CLOSED` — account status becomes `IN_PAYMENT`.
        > New items and metadata changes are blocked until unlock or close. Payments
        > continue to be accepted.

        **Preconditions:** account **MUST** be `IN_USE`. Otherwise return `409 Conflict`.

        | **Hosted by** | Software Service |
        |---|---|
        | **Called by** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
      - $ref: '#/components/parameters/OperationModeQuery'
      - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountPreCloseRequest'
            examples:
              withReason:
                summary: Pre-close with reason
                value:
                  reason: Customer requested the check
                  requestedBy: ordering-app-qr
      responses:
        '202':
          description: 'Pre-close request accepted. Expected event: ACCOUNT_PRE_CLOSED.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
              examples:
                accepted:
                  summary: Accepted for processing
                  value: null
                  status: ACCEPTED
                  correlationId: corr-a1b2c3d4
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /accounts/unlock:
    post:
      tags:
      - Accounts
      operationId: unlockAccount
      summary: Unlock account
      description: |-
        Removes the account lock/pre-close when the POS allows reopening the operational
        flow before final close.

        > **Event emitted:** `ACCOUNT_UNLOCKED` — account status returns to `IN_USE`.

        | **Hosted by** | Software Service |
        |---|---|
        | **Called by** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
      - $ref: '#/components/parameters/OperationModeQuery'
      - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUnlockRequest'
            examples:
              withReason:
                summary: Unlock to add items
                value:
                  reason: Customer ordered another item
      responses:
        '202':
          description: 'Unlock request accepted. Expected event: ACCOUNT_UNLOCKED.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
              examples:
                accepted:
                  summary: Accepted for processing
                  value: null
                  status: ACCEPTED
                  correlationId: corr-a1b2c3d4
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /accounts/close:
    post:
      tags:
      - Accounts
      operationId: closeAccount
      summary: Close account permanently
      description: |-
        Closes the account permanently. At this point the total payments registered
        are expected to cover the account amount — exact validation is the Software
        Service responsibility. Final close is the absolute, irreversible operational
        milestone of the account.

        > **Event emitted:** `ACCOUNT_CLOSED` — account status becomes `CLOSED`.
        > Irreversible: no further changes — **including new payments** — are accepted.

        **Preconditions:** account **MUST** be `IN_PAYMENT`. The Software Service **MUST**
        validate that paid total covers the account amount (except business courtesy/discount).
        If balance does not allow close, return `409 Conflict`.

        | **Hosted by** | Software Service |
        |---|---|
        | **Called by** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
      - $ref: '#/components/parameters/OperationModeQuery'
      - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCloseRequest'
            examples:
              withDiscount:
                summary: Close with courtesy discount
                value:
                  reason: Final checkout
                  discount: 5.0
      responses:
        '202':
          description: 'Close request accepted. Expected event: ACCOUNT_CLOSED. Irreversible.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
              examples:
                accepted:
                  summary: Accepted for processing
                  value: null
                  status: ACCEPTED
                  correlationId: corr-a1b2c3d4
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /accounts/items/{itemId}/cancel:
    post:
      tags:
      - Accounts
      operationId: cancelAccountItem
      summary: Cancel account item
      description: |-
        Cancels an item already posted on the account. Semantic item changes MUST be
        handled as cancel + new post, not direct item edit.

        > **Event emitted:** `ACCOUNT_ITEM_CANCELLED`.

        | **Hosted by** | Software Service |
        |---|---|
        | **Called by** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
      - $ref: '#/components/parameters/OperationModeQuery'
      - $ref: '#/components/parameters/IdentifierQuery'
      - $ref: '#/components/parameters/ItemId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCancelRequest'
            examples:
              withReason:
                summary: Cancellation with reason
                value:
                  reason: Wrong item — customer cancelled
      responses:
        '200':
          description: 'Item cancelled. Expected event: ACCOUNT_ITEM_CANCELLED.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountItem'
              examples:
                itemCancelled:
                  summary: Item with CANCELLED status
                  value:
                    itemId: item-2
                    externalCode: SKU-SODA-01
                    name: Soft drink 350ml
                    quantity: 2
                    unitPrice: 8.5
                    totalPrice: 17.0
                    origin: ORDERING_APPLICATION
                    addedAt: '2026-03-15T19:18:41Z'
                    status: CANCELLED
                    notes: Cancelled at customer request
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /accounts/transfers:
    post:
      tags:
      - Accounts
      operationId: transferAccountContent
      summary: Transfer items or full account
      description: |-
        Performs an atomic transfer between accounts/operations — independent of
        operational mode (table, tab, or counter).
        Supports partial transfer by item or full account transfer.

        > **Events emitted:** `ACCOUNT_ITEM_REMOVED` on the source account and
        > `ACCOUNT_ITEM_ADDED` on the target account.

        | **Hosted by** | Software Service |
        |---|---|
        | **Called by** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
      - $ref: '#/components/parameters/OperationModeQuery'
      - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
            examples:
              partialItems:
                summary: Partial item transfer
                value:
                  transferType: ITEMS
                  itemIds:
                  - item-2
                  target:
                    operationMode: TABLE
                    identifier: '12'
                  reason: Customer changed tables
              fullAccount:
                summary: Full account transfer
                value:
                  transferType: FULL_ACCOUNT
                  target:
                    operationMode: TAB
                    identifier: A-88
                  reason: Tab swap
      responses:
        '200':
          description: |
            Transfer completed. Expected events: ACCOUNT_ITEM_REMOVED on source and ACCOUNT_ITEM_ADDED on target.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
              examples:
                itemsTransferred:
                  summary: Partial transfer result
                  value:
                    sourceAccountId: acc-table-5-20260315
                    targetAccountId: acc-table-12-20260315
                    transferredItemIds:
                    - item-2
                    transferredAt: '2026-03-15T19:40:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /accounts/payments:
    post:
      tags:
      - Payments
      operationId: createPayment
      summary: Post payment on account
      description: |-
        Registers a payment posting on the account. Payment may be full or partial by
        amount, and optionally by item, depending on POS capability.

        > **Payment does not depend on pre-close.** This operation may be called at any
        > time while the account is `IN_USE` or `IN_PAYMENT` — pre-close
        > ([`pre-close`](#operation/preCloseAccount)) is not a prerequisite to post payment,
        > only the moment when final settlement is expected. The only restriction is that
        > the account must not already be `CLOSED`.

        > **Event emitted:** `PAYMENT_CREATED`.

        | **Hosted by** | Software Service |
        |---|---|
        | **Called by** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
      - $ref: '#/components/parameters/OperationModeQuery'
      - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
            examples:
              partialWhileInUse:
                summary: Partial payment while account is still IN_USE
                value:
                  amount: 20.0
                  methodInfo:
                    method: PIX
              finalSettlement:
                summary: Settle remaining balance in IN_PAYMENT
                value:
                  amount: 75.48
                  methodInfo:
                    method: CREDIT_CARD
                    brand: VISA
                    nsu: '12345678901234'
                  tip: 5.0
      responses:
        '200':
          description: 'Payment posted. Expected event: PAYMENT_CREATED.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
              examples:
                paymentCreated:
                  summary: Card payment with NSU
                  value: null
                  paymentId: pay-2
                  amount: 75.48
                  methodInfo:
                    method: CREDIT_CARD
                    brand: VISA
                    nsu: '12345678901234'
                  tip: 5.0
                  paidAt: '2026-03-15T20:10:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
      - Payments
      operationId: listAccountPayments
      summary: List account payments
      description: |-
        Returns all payment postings registered on the account identified by the
        operational key.

        | **Hosted by** | Software Service |
        |---|---|
        | **Called by** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
      - $ref: '#/components/parameters/OperationModeQuery'
      - $ref: '#/components/parameters/IdentifierQuery'
      responses:
        '200':
          description: Payment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    maxItems: 1000
                    description: List of payments registered on the account.
                    items:
                      $ref: '#/components/schemas/Payment'
              examples:
                paymentList:
                  summary: Two payments (partial + settlement)
                  value:
                    payments:
                    - paymentId: pay-1
                      amount: 20.0
                      methodInfo:
                        method: PIX
                      paidAt: '2026-03-15T19:25:00Z'
                    - paymentId: pay-2
                      amount: 75.48
                      methodInfo:
                        method: CREDIT_CARD
                        brand: VISA
                        nsu: '12345678901234'
                      tip: 5.0
                      paidAt: '2026-03-15T20:10:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /accounts/fiscal:
    post:
      tags:
      - Fiscal
      operationId: requestFiscalDocument
      summary: Request account fiscal issuance/association
      description: |-
        Requests issuance or retrieval of the fiscal document associated with the account.
        Processing is asynchronous and MUST be followed via webhook and/or GET fallback.

        > **Event emitted:** `FISCAL_ISSUED` on success or `FISCAL_ERROR` on failure,
        > notified via webhook ([`accountEvent`](#operation/receiveAccountEvent)), because
        > issuance may take a variable amount of time.

        | **Hosted by** | Software Service |
        |---|---|
        | **Called by** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
      - $ref: '#/components/parameters/OperationModeQuery'
      - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FiscalRequest'
            examples:
              withPrint:
                summary: Request NFC-e with print
                value:
                  printDocument: true
                  paymentNSURequiredForNFCE: true
      responses:
        '202':
          description: |
            Fiscal request accepted. Expected events: FISCAL_ISSUED (success) or FISCAL_ERROR (failure). Use GET /accounts/fiscal as fallback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
              examples:
                accepted:
                  summary: Accepted for asynchronous processing
                  value: null
                  status: ACCEPTED
                  correlationId: corr-a1b2c3d4
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
      - Fiscal
      operationId: listAccountFiscalDocuments
      summary: List fiscal documents linked to the account
      description: |-
        Returns all fiscal documents associated with the account identified by the
        operational key.

        | **Hosted by** | Software Service |
        |---|---|
        | **Called by** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
      - $ref: '#/components/parameters/OperationModeQuery'
      - $ref: '#/components/parameters/IdentifierQuery'
      responses:
        '200':
          description: Fiscal document list
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    maxItems: 1000
                    description: List of fiscal documents associated with the account.
                    items:
                      $ref: '#/components/schemas/FiscalDocument'
              examples:
                documentIssued:
                  summary: NFC-e issued successfully
                  value:
                    documents:
                    - documentId: doc-nfce-9001
                      documentStatus: ISSUED
                      documentNumber: '000123'
                      documentSeries: '1'
                      documentKey: '35260312345678000190550010000001231000001234'
                      environment: '1'
                      authorizationProtocol: '135260000000123'
                      model: '65'
                      issuedAt: '2026-03-15T20:12:30Z'
                      statusCode: '100'
                      statusReason: NF-e use authorized
                      issuanceType: '1'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
webhooks:
  accountEvent:
    post:
      tags:
      - Events
      operationId: receiveAccountEvent
      summary: Webhook for event notification
      description: |-
        Webhook consumed by the originator to receive account, payment, and fiscal events.
        As with every protocol webhook, the request MUST carry HMAC-SHA256 signature
        headers (`X-App-Id`, `X-App-MerchantId`, `X-App-Signature`) defined in the
        [Authentication specification](../authentication/).

        | **Hosted by** | Ordering Application (webhook endpoint) |
        |---|---|
        | **Called by** | Software Service |

        ```mermaid
        graph LR
            SS["Software Service"] -- POST --> OA["Ordering Application"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
      - $ref: '#/components/parameters/XAppId'
      - $ref: '#/components/parameters/XAppMerchantId'
      - $ref: '#/components/parameters/XAppSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventNotification'
            examples:
              accountOpened:
                summary: ACCOUNT_OPENED
                value:
                  eventId: evt-001
                  eventType: ACCOUNT_OPENED
                  occurredAt: '2026-03-15T19:02:11Z'
                  accountId: acc-table-5-20260315
                  orderId: ord-1001
              accountItemAdded:
                summary: ACCOUNT_ITEM_ADDED
                value:
                  eventId: evt-002
                  eventType: ACCOUNT_ITEM_ADDED
                  occurredAt: '2026-03-15T19:18:41Z'
                  accountId: acc-table-5-20260315
                  orderId: ord-1002
              paymentCreated:
                summary: PAYMENT_CREATED
                value:
                  eventId: evt-010
                  eventType: PAYMENT_CREATED
                  occurredAt: '2026-03-15T19:25:00Z'
                  accountId: acc-table-5-20260315
                  paymentId: pay-1
              accountPreClosed:
                summary: ACCOUNT_PRE_CLOSED
                value:
                  eventId: evt-020
                  eventType: ACCOUNT_PRE_CLOSED
                  occurredAt: '2026-03-15T20:05:00Z'
                  accountId: acc-table-5-20260315
              fiscalIssued:
                summary: FISCAL_ISSUED
                value:
                  eventId: evt-030
                  eventType: FISCAL_ISSUED
                  occurredAt: '2026-03-15T20:12:30Z'
                  accountId: acc-table-5-20260315
                  documentId: doc-nfce-9001
              accountClosed:
                summary: ACCOUNT_CLOSED
                value:
                  eventId: evt-040
                  eventType: ACCOUNT_CLOSED
                  occurredAt: '2026-03-15T20:15:00Z'
                  accountId: acc-table-5-20260315
              fiscalError:
                summary: FISCAL_ERROR
                value:
                  eventId: evt-031
                  eventType: FISCAL_ERROR
                  occurredAt: '2026-03-15T20:12:45Z'
                  accountId: acc-table-5-20260315
                  documentId: doc-nfce-9002
                  payload:
                    statusCode: '999'
                    statusReason: Timeout SEFAZ
      responses:
        '204':
          description: Event received and processed (or queued) by the Ordering Application
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer Token issued via OAuth 2.0. See the [Authentication specification](../authentication/) for supported grant models (`client_credentials_merchant`, `client_credentials_application`, `authorization_code`).
  parameters:
    OrderId:
      in: path
      name: orderId
      required: true
      schema:
        type: string
      description: Unique order identifier.
    AccountId:
      in: path
      name: accountId
      required: true
      schema:
        type: string
      description: Internal account identifier when already known.
    ItemId:
      in: path
      name: itemId
      required: true
      schema:
        type: string
      description: Unique item identifier within the account.
    PaymentId:
      in: path
      name: paymentId
      required: true
      schema:
        type: string
      description: Unique payment identifier.
    DocumentId:
      in: path
      name: documentId
      required: true
      schema:
        type: string
      description: Unique fiscal document identifier.
    OperationModeQuery:
      in: query
      name: operationMode
      required: true
      schema:
        $ref: '#/components/schemas/OperationMode'
      description: Indoor account operational mode.
    IdentifierQuery:
      in: query
      name: identifier
      required: true
      schema:
        type: string
      description: Operational identifier for table, tab, or counter.
    XAppId:
      in: header
      name: X-App-Id
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Unique identifier of the Software Service sending the webhook. Detailed in the [Authentication specification](../authentication/).
    XAppMerchantId:
      in: header
      name: X-App-MerchantId
      required: true
      schema:
        type: string
      description: |
        Unique merchant identifier associated with this event. Detailed in the [Authentication specification](../authentication/).
    XAppSignature:
      in: header
      name: X-App-Signature
      required: true
      schema:
        type: string
      description: |
        HMAC-SHA256 signature of the raw request body, using the shared `client_secret` as key (lowercase hex). Algorithm detailed in the [Authentication specification](../authentication/).
  responses:
    BadRequest:
      description: Invalid request (malformed payload or invalid parameters)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidParameters:
              summary: Incomplete operational key
              value:
                code: INVALID_PARAMETER
                message: operationMode and identifier are required
                details:
                - query.identifier is required
    NotFound:
      description: Account, item, or resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            accountNotFound:
              summary: Account not found
              value:
                code: ACCOUNT_NOT_FOUND
                message: No active account for TABLE/5
    Conflict:
      description: |
        State conflict (e.g. pre-close on a CLOSED account, add item while IN_PAYMENT, close with open balance per SS rules)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            accountLocked:
              summary: Operation invalid for current status
              value:
                code: INVALID_ACCOUNT_STATE
                message: Account in IN_PAYMENT does not accept new items
                details:
                - currentStatus=IN_PAYMENT
                - requiredStatus=IN_USE
    Unauthorized:
      description: Request without valid authentication credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Request rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected internal error while processing the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    OrderCreateRequest:
      type: object
      description: Request body to create an indoor order (orderType INDOOR).
      required:
      - orderType
      - items
      - indoor
      properties:
        orderType:
          type: string
          enum:
          - INDOOR
          description: Order type. For this module, always INDOOR.
        items:
          type: array
          minItems: 1
          description: Items included in this order posting.
          items:
            $ref: '#/components/schemas/OrderItemInput'
        indoor:
          allOf:
          - $ref: '#/components/schemas/Indoor'
          description: Indoor extension data for the order.
    OrderCreateResponse:
      type: object
      description: Response returned after creating an indoor order.
      required:
      - orderId
      - status
      properties:
        orderId:
          type: string
          description: Identifier of the created order.
        accountId:
          type: string
          description: |
            Account identifier when it already exists or was created while processing the order.
        status:
          type: string
          enum:
          - ACCEPTED
          - REJECTED
          - PENDING
          description: Result of the initial order processing.
    Order:
      description: Full representation of an already created indoor order.
      allOf:
      - $ref: '#/components/schemas/OrderCreateRequest'
      - type: object
        properties:
          orderId:
            type: string
            description: Order identifier.
          accountId:
            type: string
            description: Account related to the order.
          createdAt:
            type: string
            format: date-time
            description: Order creation date/time.
    Indoor:
      type: object
      description: Indoor extension attached to the order — operational key, channel, and service preferences.
      example:
        operationMode: TABLE
        identifier: '5'
        originChannel:
          type: QR_CODE
          id: qr-table-5
        consumptionType: DINE_IN
      required:
      - operationMode
      - identifier
      - originChannel
      - consumptionType
      properties:
        operationMode:
          allOf:
          - $ref: '#/components/schemas/OperationMode'
          description: Account operational mode (table, tab, or counter).
        identifier:
          type: string
          description: |
            Operational identifier of the table, tab, or counter used to locate the active session before, during, or after order creation.
        accountId:
          type: string
          description: |
            Internal account identifier when already known. MUST NOT be required on the first order POST.
        originChannel:
          allOf:
          - $ref: '#/components/schemas/OriginChannel'
          description: Order origin channel.
        consumptionType:
          allOf:
          - $ref: '#/components/schemas/ConsumptionType'
          description: Consumption intent (dine-in or takeaway).
        fulfillment:
          allOf:
          - $ref: '#/components/schemas/FulfillmentInfo'
          description: Order delivery or pickup method.
        service:
          allOf:
          - $ref: '#/components/schemas/ServiceInfo'
          description: Service data such as responsible waiter and party size.
        notifications:
          allOf:
          - $ref: '#/components/schemas/Notifications'
          description: Notification channels linked to the account or customer.
        fiscal:
          allOf:
          - $ref: '#/components/schemas/OrderFiscalInfo'
          description: Fiscal preferences provided on the order.
    OrderItemInput:
      type: object
      description: Item provided when creating an indoor order.
      required:
      - externalCode
      - name
      - quantity
      properties:
        externalCode:
          type: string
          description: External item code in the source system.
        name:
          type: string
          description: Commercial name of the item.
        quantity:
          type: number
          format: double
          description: Requested item quantity.
        unitPrice:
          type: number
          format: double
          description: Unit price provided on the order, when applicable.
        notes:
          type: string
          description: Free-text item notes.
        seat:
          type: string
          description: Seat, place, or customer reference associated with the item.
        options:
          type: array
          description: Options/add-ons selected for this item.
          items:
            $ref: '#/components/schemas/AccountItemOption'
    Account:
      type: object
      description: Indoor account — aggregator of orders, items, payments, and fiscal documents for a
        consumption session.
      example:
        accountId: acc-table-5-20260315
        operationMode: TABLE
        identifier: '5'
        status: IN_USE
        lastEvent: ACCOUNT_ITEM_ADDED
        openedAt: '2026-03-15T19:02:11Z'
        totals:
          itemsSubtotal: 86.8
          paid: 20.0
          due: 75.48
      required:
      - operationMode
      - identifier
      - status
      - openedAt
      properties:
        accountId:
          type: string
          description: Internal account/ticket/sale identifier when present.
        operationMode:
          allOf:
          - $ref: '#/components/schemas/OperationMode'
          description: Account operational mode (table, tab, or counter).
        identifier:
          type: string
          description: Current operational account identifier.
        status:
          allOf:
          - $ref: '#/components/schemas/AccountStatus'
          description: Current operational account status.
        lastEvent:
          allOf:
          - $ref: '#/components/schemas/EventType'
          description: |
            Type of the last event emitted for this account — mirrors the last webhook sent to the Ordering Application. Useful for sync and debugging when webhook delivery is uncertain (e.g. after reconnection).
        openedAt:
          type: string
          format: date-time
          description: Operational account open date/time.
        closedAt:
          type: string
          format: date-time
          description: Final account close date/time.
        orders:
          type: array
          description: Summarized list of orders linked to the account.
          items:
            $ref: '#/components/schemas/AccountOrderRef'
        items:
          type: array
          description: Aggregated account items.
          items:
            $ref: '#/components/schemas/AccountItem'
        payments:
          type: array
          description: Payment postings associated with the account.
          items:
            $ref: '#/components/schemas/Payment'
        totals:
          allOf:
          - $ref: '#/components/schemas/AccountTotals'
          description: Consolidated account totals (subtotal, charges, paid, due).
        fiscal:
          allOf:
          - $ref: '#/components/schemas/AccountFiscalSummary'
          description: Account fiscal status summary.
    AccountOrderRef:
      type: object
      description: Summarized reference to an order linked to the account.
      required:
      - orderId
      - createdAt
      properties:
        orderId:
          type: string
          description: Order identifier.
        originChannel:
          type: string
          description: Summarized order origin channel.
        createdAt:
          type: string
          format: date-time
          description: Order creation date/time.
    AccountItem:
      type: object
      description: Item posted on the account.
      required:
      - itemId
      - name
      - quantity
      - status
      - addedAt
      properties:
        itemId:
          type: string
          description: Unique item identifier on the account.
        externalCode:
          type: string
          description: External item code in the source system (POS).
        name:
          type: string
          description: Item name.
        quantity:
          type: number
          format: double
          description: Item quantity on the account.
        unitPrice:
          type: number
          format: double
          description: Item unit price.
        discount:
          type: number
          format: double
          description: |
            Discount applied to this item. Difference between original and charged price, enabling display (e.g. strikethrough on the UI).
        totalPrice:
          type: number
          format: double
          description: Item total after discount, if any.
        origin:
          type: string
          enum:
          - ORDERING_APPLICATION
          - POS
          - OTHER
          description: Logical origin of the item addition.
        addedAt:
          type: string
          format: date-time
          description: Date/time the item entered the account.
        status:
          type: string
          enum:
          - ACTIVE
          - CANCELLED
          - PAID
          description: Current item status.
        notes:
          type: string
          description: Free-text notes associated with the item.
        seat:
          type: string
          description: Seat, place, or position associated with the item.
        options:
          type: array
          description: |
            Options/add-ons selected for this item, reusing the Open Delivery options structure.
          items:
            $ref: '#/components/schemas/AccountItemOption'
    AccountItemOption:
      type: object
      description: Option/add-on selected for an account item.
      required:
      - name
      - quantity
      properties:
        externalCode:
          type: string
          description: External option code in the source system.
        name:
          type: string
          description: Name of the selected option.
        quantity:
          type: number
          format: double
          description: Selected option quantity.
        unitPrice:
          type: number
          format: double
          description: Option unit price.
        totalPrice:
          type: number
          format: double
          description: Option total amount.
        options:
          type: array
          description: Nested sub-options for combo structures.
          items:
            $ref: '#/components/schemas/AccountItemOption'
    PaymentCreateRequest:
      type: object
      description: Request body to create a payment posting on the account.
      example:
        amount: 75.48
        methodInfo:
          method: CREDIT_CARD
          brand: VISA
          nsu: '12345678901234'
        tip: 5.0
      required:
      - amount
      - methodInfo
      properties:
        amount:
          type: number
          format: double
          description: Payment posting amount.
        methodInfo:
          allOf:
          - $ref: '#/components/schemas/PaymentMethodInfo'
          description: Payment method used for this posting.
        serviceCharge:
          allOf:
          - $ref: '#/components/schemas/ChargeAmount'
          description: Service charge applied to this payment, when present.
        tip:
          type: number
          format: double
          description: Tip in addition to the payment.
        items:
          type: array
          description: Optional list of items settled by this payment.
          items:
            type: string
        seat:
          type: string
          description: Customer seat/position associated with the payment, when applicable.
    Payment:
      description: Payment already registered on the account.
      allOf:
      - $ref: '#/components/schemas/PaymentCreateRequest'
      - type: object
        required:
        - paymentId
        - paidAt
        properties:
          paymentId:
            type: string
            description: Unique payment identifier.
          paidAt:
            type: string
            format: date-time
            description: Payment confirmation date/time.
    PaymentMethodInfo:
      type: object
      description: Details of the payment method used.
      required:
      - method
      properties:
        method:
          type: string
          enum:
          - CASH
          - CREDIT_CARD
          - DEBIT_CARD
          - PIX
          - VOUCHER
          - OTHER
          description: Payment method used.
        brand:
          type: string
          enum:
          - VISA
          - MASTERCARD
          - AMEX
          - ELO
          - HIPERCARD
          - AURA
          - SODEXO
          - VR
          - BENEFIT
          - OTHER
          description: Card brand or payment method brand, when applicable.
        nsu:
          type: string
          description: NSU/transaction identifier when applicable or required.
    ChargeAmount:
      type: object
      description: Monetary charge expressed as a rate and/or effective amount.
      properties:
        rate:
          type: number
          format: double
          description: Applied percentage rate.
        amount:
          type: number
          format: double
          description: Effective monetary amount of the charge.
    AccountTotals:
      type: object
      description: Consolidated account totals.
      properties:
        itemsSubtotal:
          type: number
          format: double
          description: Sum of active account items.
        serviceCharge:
          allOf:
          - $ref: '#/components/schemas/ChargeAmount'
          description: Service charge applied to the account total, when present.
        taxes:
          type: object
          description: Taxes calculated on the account.
          properties:
            amount:
              type: number
              format: double
              description: Total tax amount calculated for the account.
        discount:
          type: number
          format: double
          description: |
            Total discount applied at account close. Amount granted on the items subtotal at close time.
        paid:
          type: number
          format: double
          description: Total paid so far.
        due:
          type: number
          format: double
          description: Outstanding account balance.
    TransferRequest:
      type: object
      description: Request body to transfer items or a full account.
      example:
        transferType: ITEMS
        itemIds:
        - item-2
        target:
          operationMode: TABLE
          identifier: '12'
        reason: Customer changed tables
      required:
      - transferType
      - target
      properties:
        transferType:
          type: string
          enum:
          - ITEMS
          - FULL_ACCOUNT
          description: 'Transfer type: partial by items or full account.'
        itemIds:
          type: array
          description: Items to transfer when transferType = ITEMS.
          items:
            type: string
        target:
          allOf:
          - $ref: '#/components/schemas/OperationalAccountRef'
          description: Target account for the transfer.
        reason:
          type: string
          description: Optional transfer reason for history or reporting.
    TransferResponse:
      type: object
      description: Result of an item or full-account transfer.
      properties:
        sourceAccountId:
          type: string
          description: Source account.
        targetAccountId:
          type: string
          description: Target account.
        transferredItemIds:
          type: array
          items:
            type: string
          description: Items actually transferred.
        transferredAt:
          type: string
          format: date-time
          description: Transfer date/time.
    OperationalAccountRef:
      type: object
      description: Account reference by operational key or accountId.
      required:
      - operationMode
      - identifier
      properties:
        accountId:
          type: string
          description: Target account when accountId is already known.
        operationMode:
          allOf:
          - $ref: '#/components/schemas/OperationMode'
          description: Target account operational mode (table, tab, or counter).
        identifier:
          type: string
          description: Target account operational identifier.
    FiscalRequest:
      type: object
      description: Request body for account fiscal issuance/association.
      properties:
        printDocument:
          type: boolean
          description: Whether physical printing of the document was requested.
        paymentNSURequiredForNFCE:
          type: boolean
          description: Whether the payment NSU is required for NFC-e issuance.
    FiscalDocument:
      type: object
      description: Fiscal document issued or in progress for the account.
      example:
        documentId: doc-nfce-9001
        documentStatus: ISSUED
        documentNumber: '000123'
        documentSeries: '1'
        documentKey: '35260312345678000190550010000001231000001234'
        environment: '1'
        issuedAt: '2026-03-15T20:12:30Z'
        statusCode: '100'
        statusReason: NF-e use authorized
        issuanceType: '1'
      properties:
        documentId:
          type: string
          description: Unique fiscal document identifier.
        documentStatus:
          type: string
          enum:
          - NOT_ISSUED
          - PENDING
          - ISSUED
          - ERROR
          description: Current fiscal document status.
        documentNumber:
          type: string
          description: Invoice number.
        documentSeries:
          type: string
          description: Fiscal document series.
        documentKey:
          type: string
          description: Fiscal document key.
        environment:
          type: string
          enum:
          - '1'
          - '2'
          description: |
            Fiscal environment. 1 = production. 2 = homologation.
        authorizationProtocol:
          type: string
          description: Fiscal document authorization protocol.
        model:
          type: string
          description: Fiscal document model.
        issuedAt:
          type: string
          format: date-time
          description: Document issuance date/time.
        exitAt:
          type: string
          format: date-time
          description: Exit date/time associated with the document.
        statusCode:
          type: string
          description: Status code returned by SEFAZ.
        statusReason:
          type: string
          description: Status description returned by SEFAZ.
        contingencyAt:
          type: string
          format: date-time
          description: Contingency date/time, when applicable.
        issuanceType:
          type: string
          enum:
          - '1'
          - '9'
          description: |
            Issuance type. 1 = normal. 9 = contingency.
        xml:
          type: string
          description: Fiscal document XML content when returned.
        pdfBase64:
          type: string
          description: Base64 DANFE/receipt representation when returned.
        imageBase64:
          type: string
          description: Base64 image representation of the document when returned.
    OrderFiscalInfo:
      type: object
      description: Fiscal preferences provided on the indoor order.
      properties:
        shouldIssueDocument:
          type: boolean
          description: Whether the order/account should generate a fiscal document.
        documentStatus:
          type: string
          enum:
          - NOT_ISSUED
          - PENDING
          - ISSUED
          description: Known fiscal status at order time.
        printDocument:
          type: boolean
          description: Whether the document should be printed.
        paymentNSURequiredForNFCE:
          type: boolean
          description: Whether payment NSU will be required for NFC-e issuance.
    AccountFiscalSummary:
      type: object
      description: Account fiscal status summary.
      properties:
        documentIssued:
          type: boolean
          description: Whether at least one fiscal document was issued for the account.
        documentId:
          type: string
          description: Identifier of the main fiscal document linked to the account.
    OriginChannel:
      type: object
      description: Indoor order origin channel.
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - TOTEM
          - QR_CODE
          - CUSTOMER_TABLET
          - WAITER_TABLET
          - FRONT_DESK
          - POS
          - APP
          - WHATSAPP
          - OTHER
          description: Indoor order origin channel.
        id:
          type: string
          description: Specific channel/device/origin identifier.
        notes:
          type: string
          description: Free-text note about the origin channel.
    FulfillmentInfo:
      type: object
      description: Order delivery or pickup method.
      properties:
        type:
          type: string
          enum:
          - DISPATCH
          - CALL
          description: Order delivery/pickup method.
        call:
          allOf:
          - $ref: '#/components/schemas/CallInfo'
          description: Customer call data when type = CALL.
        dispatch:
          allOf:
          - $ref: '#/components/schemas/DispatchInfo'
          description: Order dispatch data when type = DISPATCH.
    CallInfo:
      type: object
      description: How the customer is called for order pickup.
      properties:
        notifyOriginator:
          type: boolean
          description: Whether the originator should be notified when the item/order is ready.
        type:
          type: string
          enum:
          - TICKET_NUMBER
          - PAGER
          - CALL_NAME
          - WHATSAPP
          - OTHER
          description: Identification type used to call the customer.
        label:
          type: string
          description: Visible call value such as ticket number, name, or equivalent label.
    DispatchInfo:
      type: object
      description: Order dispatch point data.
      properties:
        id:
          type: string
          description: Dispatch point/location identifier.
        label:
          type: string
          description: Friendly name of the dispatch point/location.
        sector:
          type: string
          description: Sector, court, or operational area related to dispatch.
        seat:
          allOf:
          - $ref: '#/components/schemas/SeatRef'
          description: Seat, place, or position associated with dispatch.
    SeatRef:
      type: object
      description: Reference to a seat, place, or position.
      properties:
        id:
          type: string
          description: Seat, place, or position identifier.
        label:
          type: string
          description: Friendly name of the seat, place, or position.
    ServiceInfo:
      type: object
      description: Service data associated with the order.
      properties:
        waiterCode:
          type: string
          description: Code of the responsible waiter/attendant.
        waiterName:
          type: string
          description: Name of the responsible waiter/attendant.
        peopleCount:
          type: integer
          description: Number of people associated with the account.
    Notifications:
      type: object
      description: Notification channels linked to the account or customer.
      properties:
        whatsAppId:
          type: string
          description: WhatsApp identifier linked to the account or customer.
    AccountPreCloseRequest:
      type: object
      description: Optional request body for account pre-close.
      properties:
        reason:
          type: string
          description: Optional pre-close reason.
        requestedBy:
          type: string
          description: System or actor that requested pre-close.
    AccountUnlockRequest:
      type: object
      description: Optional request body for account unlock.
      properties:
        reason:
          type: string
          description: Optional unlock reason.
    AccountCloseRequest:
      type: object
      description: Optional request body for final account close.
      properties:
        reason:
          type: string
          description: Optional final close reason.
        discount:
          type: number
          format: double
          description: |
            Discount applied at account close when provided by the originator. If present, MUST be reflected in AccountTotals.discount.
    ItemCancelRequest:
      type: object
      description: Optional request body for item cancellation.
      properties:
        reason:
          type: string
          description: Item cancellation reason.
    AsyncAcceptedResponse:
      type: object
      description: Acceptance confirmation for an asynchronously processed operation.
      example:
        status: ACCEPTED
        correlationId: corr-a1b2c3d4
      properties:
        status:
          type: string
          enum:
          - ACCEPTED
          description: Confirmation that the request was accepted for asynchronous processing.
        correlationId:
          type: string
          description: Correlation identifier for the asynchronous operation.
    EventNotification:
      type: object
      description: Event notification delivered via webhook (accountEvent).
      example:
        eventId: evt-010
        eventType: PAYMENT_CREATED
        occurredAt: '2026-03-15T19:25:00Z'
        accountId: acc-table-5-20260315
        paymentId: pay-1
      required:
      - eventId
      - eventType
      - occurredAt
      properties:
        eventId:
          type: string
          description: Unique event identifier.
        eventType:
          allOf:
          - $ref: '#/components/schemas/EventType'
          description: Notified event type.
        occurredAt:
          type: string
          format: date-time
          description: Date/time when the event occurred.
        accountId:
          type: string
          description: Account related to the event.
        orderId:
          type: string
          description: Order related to the event, when applicable.
        paymentId:
          type: string
          description: Payment related to the event, when applicable.
        documentId:
          type: string
          description: Fiscal document related to the event, when applicable.
        payload:
          type: object
          additionalProperties: true
          description: Complementary event payload.
    EventType:
      type: string
      description: Event type for account, payment, or fiscal lifecycle.
      enum:
      - ACCOUNT_OPENED
      - ACCOUNT_ITEM_ADDED
      - ACCOUNT_ITEM_REMOVED
      - ACCOUNT_ITEM_CANCELLED
      - ACCOUNT_PRE_CLOSED
      - ACCOUNT_UNLOCKED
      - ACCOUNT_CLOSED
      - PAYMENT_CREATED
      - PAYMENT_UPDATED
      - FISCAL_ISSUED
      - FISCAL_ERROR
    OperationMode:
      type: string
      enum:
      - TABLE
      - TAB
      - COUNTER
      description: Primary operational mode for indoor service.
    ConsumptionType:
      type: string
      enum:
      - DINE_IN
      - TAKEAWAY
      description: Consumption intent associated with the indoor order.
    AccountStatus:
      type: string
      enum:
      - AVAILABLE
      - IN_USE
      - BLOCKED
      - IN_PAYMENT
      - CLOSED
      description: Operational account status.
    ErrorResponse:
      type: object
      description: Standard error response body.
      properties:
        code:
          type: string
          description: Standardized error code.
        message:
          type: string
          description: Descriptive error message.
        details:
          type: array
          items:
            type: string
          description: Optional list of additional details.
