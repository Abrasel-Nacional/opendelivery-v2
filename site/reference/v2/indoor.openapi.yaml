paths:
  /accounts:
    get:
      tags:
      - Accounts
      operationId: getAccount
      summary: Get account by operational key
      description: |-
        Retrieves the active account using the operational key (operationMode + identifier).
        This is the primary way to access and operate on an account.

        | **Hosted by** | Software Service |
        |---|---|
        | **Called by** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- GET --> SS["Software Service"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
      - $ref: '#/components/parameters/OperationModeQuery'
      - $ref: '#/components/parameters/IdentifierQuery'
      responses:
        '200':
          description: Account found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
              examples:
                accountInUse:
                  summary: TABLE account in use with partial payment
                  value: null
                  accountId: acc-table-5-20260315
                  operationMode: TABLE
                  identifier: '5'
                  status: IN_USE
                  lastEvent: ACCOUNT_ITEM_ADDED
                  openedAt: '2026-03-15T19:02:11Z'
                  orders:
                  - orderId: ord-1001
                    originChannel: QR_CODE
                    createdAt: '2026-03-15T19:02:11Z'
                  - orderId: ord-1002
                    originChannel: WAITER_TABLET
                    createdAt: '2026-03-15T19:18:40Z'
                  items:
                  - itemId: item-1
                    externalCode: SKU-BURGER-01
                    name: Classic Burger
                    quantity: 2
                    unitPrice: 32.9
                    totalPrice: 65.8
                    origin: ORDERING_APPLICATION
                    addedAt: '2026-03-15T19:02:12Z'
                    status: ACTIVE
                    options:
                    - externalCode: OPT-CHEESE
                      name: Extra cheese
                      quantity: 1
                      unitPrice: 4.0
                      totalPrice: 4.0
                  - itemId: item-2
