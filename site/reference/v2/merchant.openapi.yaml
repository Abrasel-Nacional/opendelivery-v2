info:
  title: Open Delivery V2 — Merchant
  version: 2.0.0-rc
  summary: Normative Merchant contracts — store identity, services, and catalog CRUD
  description: |-
    ## Release Candidate status

    This contract is part of Open Delivery Protocol **V2.0.0-rc** (Release Candidate).
    It is published for **ecosystem validation**: company review and implementation pilots.
    Clarifying or corrective changes may still occur based on pilot feedback.
    A stable release will follow only after validation completes.
    **V1 remains the production reference** during the transition.

    ---

    This specification is the **normative, self-contained contract** of Open Delivery
    for the **merchant domain**: store identity, operational services
    (`DELIVERY` / `TAKEOUT` / `INDOOR`), and **catalog** (menus, categories,
    item offers, option groups, options).

    An implementer MUST be able to integrate this capability using **only this document**.
    Related guides are listed under **External docs**.

    ## Merchant stands alone

    Merchant **does not require** Orders. Platforms MAY implement Merchant without Orders
    (catalog and store only). Using Merchant together with Orders is the common full stack,
    but it is not mandatory — except that **Indoor** requires Orders separately.

    ## Async-first model

    State-change operations return `202 Accepted` (or `201` on resource create when the
    body is returned synchronously). Never treat `202` alone as final business confirmation —
    re-read via GET / snapshot when reconciling.

    ## Breaking changes from V1

    | Change | V1 | V2 |
    |---|---|---|
    | Merchant ID | Generated by PDV / Software Service | **Generated by Ordering Application (originator)**; PDV keeps `externalCode` |
    | Catalog updates | Monolithic `merchantUpdate` / `menuUpdated` webhook | **CRUD per entity** + optional full `snapshot` |
    | Service identification | Service object with its own id | **By `serviceType` only** (`DELIVERY`, `TAKEOUT`, `INDOOR`) |
    | `merchantType` | Present (e.g. RESTAURANT) | **Removed** |
    | Option pricing | `option_price` optional; confusing `subtotal` | **`option_price` required** (use `0` if free); **no `subtotal`** |
    | Unit price | Often implicit | **`unity_price` explicit** (minor units) |
    | Operational availability | Not standardized | **`quantity_available`** (operational signal, not multi-channel stock) |
    | Temporary pause | Ad-hoc | **`POST …/services/{serviceType}/pause`** (does not change operating hours) |

    ## Catalog hierarchy

    ```
    Merchant
    ├── Service (DELIVERY | TAKEOUT | INDOOR) → optional menuId
    └── Menu
        └── Category
            └── ItemOffer
                └── OptionGroup (recursive)
                    └── Option → OptionGroup…
    ```

    ## Authorization

    Bearer token (OAuth 2.0). Preferred scopes: `od.menu` (catalog/store) or application
    scopes declared in Discovery. See [Authentication](../authentication/).

    ## Catalog change notifications

    V2 **does not** redefine the V1 monolithic `merchantUpdate` webhook as the core path.
    Incremental sync uses CRUD + `GET …/snapshot` for bootstrap/reconciliation.
    Push notifications for catalog deltas are **out of MVP** unless declared bilaterally
    in Discovery.
