tags:
- name: CapabilityOverview
  x-displayName: Overview
  x-traitTag: true
  description: |-
    ## Merchant capability

    Open Delivery Merchant defines how **Ordering Applications** and **Software Services**
    exchange **store identity**, **service contexts**, and **catalog**.

    > **Open Delivery is a protocol, not a product API.**
    > There is no central production host. Each party hosts the endpoints it is responsible for.

    ### Parties

    | Role | Responsibility |
    |---|---|
    | **Software Service** | Typical **host** of store and catalog endpoints (source of operational truth at the restaurant). |
    | **Ordering Application** | **Generates `merchantId`**, consumes store/catalog, may PATCH availability signals depending on the integration. |
    | **Delivery Platform** (optional) | Reads service availability / delivery area when needed. |

    ### Responsibilities by endpoint (typical marketplace / PDV)

    | Endpoint family | Hosted by | Called by |
    |---|---|---|
    | `GET /merchants` (list authorized) | Token issuer / OA app model | Application with app-scoped token |
    | `GET/PATCH /merchants/{id}`, services, pause | Software Service | Ordering Application |
    | Menus, categories, item-offers, option-groups, options | Software Service | Ordering Application |
    | `GET …/snapshot` | Software Service | Ordering Application |

    ```od-call-flow
    method: GET
    from: Ordering Application
    fromLabel: Client
    fromParty: oa
    to: Software Service
    toLabel: Host
    toParty: ss
    ```

    ### Service status

    | Status | Meaning |
    |---|---|
    | `OPEN` | Accepting orders for that service type |
    | `CLOSED` | Outside operating hours or permanently offline for the service |
    | `PAUSED` | Temporary operational pause (`pause` endpoint); does **not** rewrite `operatingHours` |

    ```mermaid
    stateDiagram-v2
        [*] --> OPEN
        OPEN --> PAUSED: POST …/pause
        PAUSED --> OPEN: duration ends or PATCH status OPEN
        OPEN --> CLOSED: schedule / operator
        CLOSED --> OPEN: schedule / operator
    ```

    ### Snapshot vs CRUD

    | Scenario | Approach |
    |---|---|
    | Bootstrap / full reconciliation | `GET …/menus/{menuId}/snapshot` |
    | Price, name, availability change | CRUD / PATCH on the entity |
    | New item or category | `POST` on the entity collection |

    ### Authentication

    <SecurityDefinitions />
