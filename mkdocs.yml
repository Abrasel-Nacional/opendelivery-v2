site_name: Open Delivery Protocol
site_description: Open standard for ordering, fulfillment, and delivery interoperability
site_url: https://abrasel-nacional.github.io/opendelivery-v2/

repo_name: Abrasel-Nacional/opendelivery-v2
repo_url: https://github.com/Abrasel-Nacional/opendelivery-v2

docs_dir: docs
site_dir: site

nav:
  - Overview:
    - Home: index.md
    - Core Concepts: documentation/core-concepts.md
    - Roadmap: documentation/roadmap.md
  - Specification:
    - Overview: specification/overview.md
    - Authentication: protocol/authentication.md
    - Merchant Capability:
      - Overview: specification/merchant.md
      - Transport:
        - REST: specification/merchant-rest.md
    - Orders Capability:
      - Overview: specification/orders.md
      - Transport:
        - REST: specification/orders-rest.md
      - Indoor Extension:
        - Overview: specification/indoor.md
        - Transport:
          - REST: specification/indoor-rest.md
    - Customer Capability:
      - Overview: specification/customer.md
      - Transport:
        - REST: specification/customer-rest.md
      - Loyalty Extension:
        - Overview: specification/loyalty.md
        - Transport:
          - REST: specification/loyalty-rest.md
    - Logistics Capability:
      - Overview: specification/logistics.md
      - Transport:
        - REST: specification/logistics-rest.md
    - REST Transport:
      - Overview: specification/rest.md
      - Discovery: specification/rest-discovery.md

theme:
  name: material
  language: en
  logo: assets/images/opendelivery-logo.png
  favicon: assets/images/opendelivery-logo.png
  palette:
    - scheme: default
      primary: teal
      accent: lime
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - header.autohide

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences

extra_css:
  - stylesheets/landing.css
