site_name: Open Delivery Protocol
site_description: Open standard for ordering, fulfillment, and delivery interoperability
site_url: https://docs.opendelivery.com.br/

repo_name: ODP on GitHub
repo_url: https://github.com/Abrasel-Nacional/opendelivery-v2

docs_dir: docs
site_dir: site

# Atas e artefatos internos não entram no site publicado
exclude_docs: |
  reference/v2/comites/**
  reference/v2/scalar.html
  transport-bindings/**

nav:
  - Guia:
    - Início: index.md
    - Primeiros Passos: guide/getting-started.md
    - Trilhas por papel: guide/by-role.md
    - Conceitos: documentation/core-concepts.md
    - Visão Geral do Protocolo: overview.md
    - Papéis e Responsabilidades: protocol/roles-and-responsibilities.md
    - Migração e Histórico:
      - Changelog: guide/changelog.md
      - Migração V1→V2: guide/migration-v1-v2.md
      - Roadmap: documentation/roadmap.md
  - Protocolo:
    - Fundamentos:
      - Princípios: protocol/principles.md
      - Fluxos: protocol/flows.md
      - Evolução: protocol/evolution.md
    - Infraestrutura:
      - Discovery: protocol/discovery.md
      - Autenticação: protocol/authentication.md
    - Capabilities:
      - Orders / Pedidos:
        - Visão geral: protocol/orders.md
        - Indoor / Salão: protocol/indoor.md
      - Merchant:
        - Visão geral: protocol/merchant.md
        - Dados da Loja: protocol/merchant-store.md
        - Menus: protocol/menu.md
      - Logística: protocol/logistics.md
      - Customer:
        - Visão geral: protocol/customer.md
        - Reviews: protocol/reviews.md
        - Loyalty: protocol/loyalty.md
  - Referência da API:
    - Convenções:
      - Visão Geral: reference/index.md
      - Regras gerais: reference/conventions.md
      - Tratamento de Erros: reference/error-handling.md
    - Infraestrutura:
      - Discovery: reference/discovery.md
      - Autenticação: reference/authentication.md
    - Capabilities:
      - Pedidos:
        - Visão geral: reference/orders.md
        - Indoor: reference/indoor.md
      - Merchant: reference/merchant.md
      - Logística: reference/logistics.md
      - Customer: reference/customer.md

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: pt
          default: true
          name: PT
          build: true
          site_name: Open Delivery Protocol
        - locale: en
          name: EN
          build: true
          site_name: Open Delivery Protocol
          site_description: Open standard for ordering, fulfillment, and delivery interoperability
          nav_translations:
            Guia: Guide
            Início: Home
            Primeiros Passos: Getting started
            Trilhas por papel: Paths by role
            Conceitos: Concepts
            Visão Geral do Protocolo: Protocol overview
            Papéis e Responsabilidades: Roles and responsibilities
            Migração e Histórico: Migration and history
            Changelog: Changelog
            Migração V1→V2: Migration V1→V2
            Roadmap: Roadmap
            Protocolo: Protocol
            Fundamentos: Fundamentals
            Princípios: Principles
            Fluxos: Flows
            Evolução: Evolution
            Referência da API: API reference
            Visão Geral: Overview
            Convenções: Conventions
            Regras gerais: General rules
            Tratamento de Erros: Error handling
            Infraestrutura: Infrastructure
            Discovery: Discovery
            Autenticação: Authentication
            Capabilities: Capabilities
            Merchant: Merchant
            Visão geral: Overview
            Dados da Loja: Store data
            Menus: Menus
            Orders / Pedidos: Orders
            Indoor / Salão: Indoor
            Logística: Logistics
            Customer: Customer
            Reviews: Reviews
            Loyalty: Loyalty
            Referência da API: API reference
            Pedidos: Orders

theme:
  name: material
  custom_dir: overrides
  language: pt
  logo: assets/images/opendelivery-logo-header.png
  favicon: assets/images/opendelivery-logo.png
  font:
    text: Google Sans
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    # navigation.indexes desativado: com ele, index.md (Início / Visão Geral)
    # vira o link do título da tab e some do menu lateral — deixando Guia e
    # Referência com markup diferente de Protocolo. Sem indexes, o nome da
    # tab fica só como label e Início/Visão Geral aparecem como itens normais.
    # navigation.instant desativado: incompatível com o language switcher do mkdocs-static-i18n
    - content.code.copy
    - content.tooltips
    - content.tabs.link
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

extra:
  generator: false
  # Token do Cloudflare Web Analytics (cole aqui depois de criar o site em
  # https://dash.cloudflare.com -> Analytics & Logs -> Web Analytics).
  # Deixe vazio para desativar.
  cloudflare_analytics_token: "87d4a20a53ec410e91d508e91545ebdc"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Abrasel-Nacional/opendelivery-v2
      name: GitHub

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/theme.css
  - stylesheets/landing.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
