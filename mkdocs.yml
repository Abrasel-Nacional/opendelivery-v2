site_name: Open Delivery Protocol
site_description: Open standard for ordering, fulfillment, and delivery interoperability
site_url: https://abrasel-nacional.github.io/opendelivery-v2/

repo_name: Abrasel-Nacional/opendelivery-v2
repo_url: https://github.com/Abrasel-Nacional/opendelivery-v2

docs_dir: docs
site_dir: site

nav:
  - Guide:
    - Home: index.md
    - Core Concepts: documentation/core-concepts.md
    - Discovery: protocol/discovery.md
    - Roadmap: documentation/roadmap.md
  - API Reference:
    - Overview: reference/index.md
    - Authentication: reference/authentication.md
    - Discovery: reference/discovery.md
    - Customer & Loyalty: reference/customer.md
    - Indoor / Salão: reference/indoor.md

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/images/opendelivery-logo.png
  favicon: assets/images/opendelivery-logo.png
  palette:
    - scheme: default
      primary: teal
      accent: lime
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - navigation.indexes

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences

extra_css:
  - stylesheets/landing.css
