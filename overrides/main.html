{% extends "base.html" %}

{% block extrahead %}
{{ super() }}
<style>
  /* Seta no tab que tem dropdown */
  .od-tab-has-dropdown > .md-tabs__link::after {
    content: " ▾";
    font-size: .55rem;
    opacity: .7;
    vertical-align: middle;
  }

  /* Dropdown renderizado como filho de <body> (padrão portal).
     position: fixed + z-index alto escapa de qualquer stacking context
     do Material e do container do ReDoc. */
  .od-dropdown {
    display: none;
    position: fixed;
    margin: 0;
    padding: .3rem 0;
    list-style: none;
    background: var(--md-primary-fg-color--dark, #00695c);
    border-radius: 0 0 .25rem .25rem;
    box-shadow: 0 .4rem 1rem rgba(0, 0, 0, .25);
    min-width: 14rem;
    z-index: 1000;
  }

  .od-dropdown li { margin: 0; }

  .od-dropdown a {
    display: block;
    padding: .5rem 1.1rem;
    color: rgba(255, 255, 255, .8);
    font-size: .7rem;
    font-weight: 500;
    letter-spacing: .02em;
    text-decoration: none;
    white-space: nowrap;
    transition: background .12s, color .12s;
  }

  .od-dropdown a:hover {
    background: rgba(255, 255, 255, .12);
    color: #fff;
  }

  .od-dropdown a.od-active {
    color: #fff;
    background: rgba(255, 255, 255, .08);
    font-weight: 700;
  }
</style>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
(function () {
  var NAV = [
    {% for tab in nav %}
    {
      title: {{ tab.title | tojson }},
      children: [
        {% if tab.children %}
        {% for child in tab.children %}
        { title: {{ child.title | tojson }}, url: {{ (config.site_url ~ child.url) | tojson }}, active: {{ child.active | tojson }} }{% if not loop.last %},{% endif %}
        {% endfor %}
        {% endif %}
      ]
    }{% if not loop.last %},{% endif %}
    {% endfor %}
  ];

  /* Um único dropdown compartilhado, filho direto de <body> */
  var portal = document.createElement("ul");
  portal.className = "od-dropdown";
  document.body.appendChild(portal);

  var hideTimer = null;

  function fillPortal(children) {
    portal.innerHTML = "";
    children.forEach(function (child) {
      if (!child.url) return;
      var li = document.createElement("li");
      var a  = document.createElement("a");
      a.href = child.url;
      a.textContent = child.title;

      if (child.active) {
        a.classList.add("od-active");
      }

      li.appendChild(a);
      portal.appendChild(li);
    });
  }

  function showPortal(tab, children) {
    clearTimeout(hideTimer);
    fillPortal(children);
    var r = tab.getBoundingClientRect();
    portal.style.left = r.left + "px";
    portal.style.top  = r.bottom + "px";
    portal.style.display = "block";
  }

  function scheduleHide() {
    hideTimer = setTimeout(function () {
      portal.style.display = "none";
    }, 150);
  }

  /* Manter aberto enquanto o mouse está sobre o próprio dropdown */
  portal.addEventListener("mouseenter", function () { clearTimeout(hideTimer); });
  portal.addEventListener("mouseleave", scheduleHide);

  function wireTabs() {
    document.querySelectorAll(".od-tab-has-dropdown").forEach(function (el) {
      el.classList.remove("od-tab-has-dropdown");
    });

    document.querySelectorAll(".md-tabs__item").forEach(function (tab, i) {
      var section = NAV[i];
      if (!section || !section.children || section.children.length === 0) return;

      tab.classList.add("od-tab-has-dropdown");

      tab.addEventListener("mouseenter", function () {
        showPortal(tab, section.children);
      });
      tab.addEventListener("mouseleave", scheduleHide);
    });
  }

  wireTabs();
})();
</script>
{% endblock %}
