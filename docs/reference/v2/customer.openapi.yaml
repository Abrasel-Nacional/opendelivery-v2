tags:
  - name: CapabilityOverview
    x-displayName: Overview
    x-traitTag: true
    description: |-
      ## Customer capability

      Open Delivery **Customer** standardizes exchange of **customer data** (dados do
      cliente) between ordering platforms and systems that manage customer relationships —
      including **Software CRM**, loyalty engines, and quality tools.

      > **Open Delivery is a protocol, not a product API.**
      > There is no central production host. Each party hosts the endpoints it implements.

      ### Parties

      | Role | Responsibility |
      |---|---|
      | **Ordering Application** | Origin of customer, lead, review, and often order-history payloads. Pushes data and/or serves pull APIs. Receives webhooks. |
      | **Software CRM** (or other Customer host) | System that **hosts** Customer endpoints (ingest, query, loyalty, reviews) and/or **pulls** from the Ordering Application. Emits customer/loyalty events when it is the authority. |

      Integration modes: **push** (OA → host), **pull** (host → OA), or **hybrid**. Declare modes in Discovery.

      ### Happy path — customer data + reviews

      ```mermaid
      sequenceDiagram
          participant OA as Ordering Application
          participant SS as Software CRM

          OA->>SS: POST /customers (batch)
          SS-->>OA: 202 Accepted
          OA->>SS: POST /leads (batch)
          SS-->>OA: 202 Accepted
          OA->>SS: POST /orders (customer-context batch)
          SS-->>OA: 202 Accepted
          SS->>OA: GET /customers
          OA-->>SS: 200 OK
          OA->>SS: POST /reviews
          SS-->>OA: 202 Accepted
          SS-)OA: webhook customerEvent
          OA-->>SS: 204
      ```

      ### Happy path — loyalty module

      ```mermaid
      sequenceDiagram
          participant OA as Ordering Application
          participant SS as Software CRM

          OA->>SS: GET /customers/{id}/loyalty-accounts
          SS-->>OA: 200 OK
          OA->>SS: GET /loyalty/rewards
          SS-->>OA: 200 OK
          OA->>SS: POST /loyalty/redemptions
          SS-->>OA: 202 Accepted
          SS-)OA: webhook loyaltyEvent
          OA-->>SS: 204
      ```

      ### Discovery and authentication

      Consult `GET /.well-known/opendelivery` before operating. Full contract:
      [Discovery](../discovery/). OAuth and webhook HMAC: [Authentication](../authentication/).

      <SecurityDefinitions />
  - name: ExternalDocs
    x-displayName: External docs
    x-traitTag: true
    description: |-
      ## External docs

      | Document | Purpose |
      |---|---|
      | [Customer guide](../../protocol/customer/) | Concepts, modules, V2 notes |
      | [Reviews guide](../../protocol/reviews/) | Reviews module narrative |
      | [Loyalty guide](../../protocol/loyalty/) | Loyalty module narrative |
      | [Orders API Spec](../orders/) | Operational order lifecycle and order schema |
      | [Authentication](../authentication/) | OAuth 2.0 and webhook signing |
      | [Discovery](../discovery/) | Declaring `customer` and supported operations |
  - name: CustomerDataOverview
    x-displayName: Customer data overview
    x-traitTag: true
    description: |-
      ## Customer data module

      Core of the Customer capability: customers, leads, customer-context orders, and
      relationship events. The protocol does **not** impose campaign, segmentation, or
      scoring rules.

      > **Customer-context orders** are not the Orders lifecycle. For kitchen/logistics
      > status, use [Orders](../orders/). Here, orders enrich the customer profile.

      ### Responsibilities (typical)

      | Endpoint | Hosted by | Called by |
      |---|---|---|
      | `GET/POST /customers` | Software CRM (or OA for pull) | Counterpart |
      | `GET/POST /leads` | Software CRM (or OA for pull) | Counterpart |
      | `GET/POST /orders` (customer context) | Software CRM (or OA for pull) | Counterpart |
      | Webhook `customerEvent` | Ordering Application | Software CRM |

  - name: Customers
    description: |-
      Central entity of Customer. Canonical `identifier` is required; other fields are
      optional and may be enriched over time.
  - name: Leads
    description: |-
      Potential customer in acquisition. Minimal structure; OA sends leads on interest events.
  - name: Orders
    description: |-
      Customer-context order history (batch/query). **Does not** replace operational
      Orders lifecycle. Order payload shape MUST align with the Orders capability schema.
  - name: Reviews
    description: |-
      Optional **Reviews** module of Customer. Flexible ratings (stars, NPS, thumbs).
      MAY be implemented without Loyalty or without full lead/order sync.
  - name: CustomerEvents
    description: |-
      Async webhook of customer-relationship facts. Not operational order lifecycle events.
  - name: LoyaltyOverview
    x-displayName: Loyalty overview
    x-traitTag: true
    description: |-
      ## Loyalty module

      Optional module of **Customer** (not a separate capability, not a Discovery extension).
      Transport for programs, accounts, transactions, rewards, coupons, and redemptions.
      Business rules (earn rates, tiers, expiry) stay in each implementation.

      Parties MAY implement **only** Loyalty endpoints of this specification if that is
      all they need — still under capability name `customer` in Discovery.

      ### Responsibilities (typical)

      | Endpoint | Hosted by | Called by |
      |---|---|---|
      | `/loyalty/*`, loyalty accounts | Software CRM / loyalty host | Ordering Application |
      | Webhook `loyaltyEvent` | Ordering Application | Loyalty host |

      ### Account status vs operations

      | Operation | `ENROLLED` | `ACTIVE` | `SUSPENDED` |
      |---|---|---|---|
      | Read balance | ✅ | ✅ | ✅ |
      | Earn points | MAY | ✅ | MUST NOT |
      | Redeem reward | MAY | ✅ | MUST NOT |
      | Use coupon | MAY | ✅ | MUST NOT |
  - name: Loyalty
    description: |-
      Loyalty programs, accounts, transactions, rewards, coupons, redemptions.
  - name: LoyaltyEvents
    description: |-
      Loyalty-specific webhook (earn, burn, redeem, coupon, tier changes).

