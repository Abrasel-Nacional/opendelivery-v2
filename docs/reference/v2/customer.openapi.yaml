  /loyalty/redemptions:
    post:
      tags: [Loyalty]
      summary: Solicita resgate de recompensa
      operationId: createLoyaltyRedemption
      description: |-
        Inicia o resgate de uma recompensa do catálogo para o cliente. A operação
        debita os pontos/cashback necessários e gera o benefício correspondente.
        Processamento é assíncrono — `202 Accepted` confirma o início do resgate.

        > **Validação de saldo DEVE ocorrer antes de aceitar o resgate.**
        > Se o saldo for insuficiente, retorne `409 Conflict`.

        | **Hospedado por** | Software Service (Loyalty) |
        |---|---|
        | **Chamado por** | Ordering Application |

        ```mermaid
        graph LR
            OA["Ordering Application"] -- POST --> SS["Software Service (Loyalty)"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoyaltyRedemptionRequest'
      responses:
        '202':
          description: Solicitação de resgate recebida para processamento assíncrono.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

webhooks:
  customerEvent:
    post:
      tags: [CustomerEvents]
      summary: Webhook de eventos focados no cliente
      operationId: receiveCustomerEvent
      description: |-
        Webhook assíncrono consumido pela Ordering Application para receber eventos
        com relevância direta para CRM — sem replicar o lifecycle operacional completo
        do pedido. Como todo webhook do protocolo, a requisição DEVE carregar os headers
        de assinatura HMAC-SHA256 (`X-App-Id`, `X-App-MerchantId`, `X-App-Signature`)
        definidos na [especificação de Autenticação](../authentication/).

        | **Hospedado por** | Ordering Application (endpoint de webhook) |
        |---|---|
        | **Chamado por** | Software Service (CRM) |

        ```mermaid
        graph LR
            SS["Software Service (CRM)"] -- POST --> OA["Ordering Application"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/XAppId'
        - $ref: '#/components/parameters/XAppMerchantId'
        - $ref: '#/components/parameters/XAppSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerEventEnvelope'
      responses:
        '204':
          description: Evento recebido.

  loyaltyEvent:
    post:
      tags: [LoyaltyEvents]
      summary: Webhook de eventos de fidelidade
      operationId: receiveLoyaltyEvent
      description: |-
        Webhook específico consumido pela Ordering Application para receber eventos
        de fidelidade: acúmulo de pontos, resgates, uso de cupons e mudança de tier.
        Como todo webhook do protocolo, a requisição DEVE carregar os headers
        de assinatura HMAC-SHA256 (`X-App-Id`, `X-App-MerchantId`, `X-App-Signature`)
        definidos na [especificação de Autenticação](../authentication/).

        | **Hospedado por** | Ordering Application (endpoint de webhook) |
        |---|---|
        | **Chamado por** | Software Service (Loyalty) |

        ```mermaid
        graph LR
            SS["Software Service (Loyalty)"] -- POST --> OA["Ordering Application"]
            style OA fill:#e0f2f1,stroke:#0f6f73,color:#0f6f73
            style SS fill:#fff3e0,stroke:#ef6c00,color:#ef6c00
        ```
      parameters:
        - $ref: '#/components/parameters/XAppId'
        - $ref: '#/components/parameters/XAppMerchantId'
        - $ref: '#/components/parameters/XAppSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoyaltyEventEnvelope'
      responses:
        '204':
          description: Evento recebido.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Bearer Token emitido via OAuth 2.0. Consulte a
        [especificação de Autenticação](../authentication/) para os modelos de
        concessão suportados (`client_credentials_merchant`,
        `client_credentials_application`, `authorization_code`).

  parameters:
    page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Página da consulta (começa em 1).
    pageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
      description: Quantidade de registros por página (máximo conforme discovery).
    createdFrom:
      in: query
      name: createdFrom
      schema:
        type: string
        format: date-time
      description: Filtro de data/hora inicial de criação (ISO 8601).
    createdTo:
      in: query
      name: createdTo
      schema:
        type: string
        format: date-time
      description: Filtro de data/hora final de criação (ISO 8601).
    updatedFrom:
      in: query
      name: updatedFrom
      schema:
        type: string
        format: date-time
      description: Filtro de data/hora inicial de atualização (ISO 8601).
    updatedTo:
      in: query
      name: updatedTo
      schema:
        type: string
        format: date-time
      description: Filtro de data/hora final de atualização (ISO 8601).
    customerIdentifierType:
      in: query
      name: customerIdentifierType
      schema:
        type: string
      description: "Tipo do identificador canônico do cliente (ex.: `phone`, `email`, `document`, `external_id`)."
    customerIdentifierValue:
      in: query
      name: customerIdentifierValue
      schema:
        type: string
      description: Valor do identificador canônico do cliente.
    externalId:
      in: query
      name: externalId
      schema:
        type: string
      description: Identificador externo para correlação e deduplicação entre sistemas.
    storeId:
      in: query
      name: storeId
      schema:
        type: string
      description: Identificador da unidade/loja para filtrar pedidos por origem.
    originChannel:
      in: query
      name: originChannel
      schema:
        $ref: '#/components/schemas/OriginChannel'
      description: Canal/origem do pedido para filtro.
    orderId:
      in: path
      name: orderId
      required: true
      schema:
        type: string
      description: Identificador único do pedido.
    orderIdQuery:
      in: query
      name: orderId
      schema:
        type: string
      description: Identificador do pedido para filtro de avaliações.
    reviewId:
      in: path
      name: reviewId
      required: true
      schema:
        type: string
      description: Identificador único da avaliação.
    programId:
      in: path
      name: programId
      required: true
      schema:
        type: string
      description: Identificador único do programa de fidelidade.
    programIdQuery:
      in: query
      name: programId
      schema:
        type: string
      description: Identificador do programa de fidelidade para filtro.
    accountId:
      in: path
      name: accountId
      required: true
      schema:
        type: string
      description: Identificador único da conta de fidelidade.
    customerId:
      in: path
      name: customerId
      required: true
      schema:
        type: string
      description: Identificador único do cliente.
    customerIdQuery:
      in: query
      name: customerId
      schema:
        type: string
      description: Identificador do cliente para filtro de cupons e contas.
    XAppId:
      in: header
      name: X-App-Id
      required: true
      schema:
        type: string
        format: uuid
      description: >
        Identificador único do Software Service que envia o webhook. Detalhado na
        [especificação de Autenticação](../authentication/).
    XAppMerchantId:
      in: header
      name: X-App-MerchantId
      required: true
      schema:
        type: string
      description: >
        Identificador único do merchant associado a este evento. Detalhado na
        [especificação de Autenticação](../authentication/).
    XAppSignature:
      in: header
      name: X-App-Signature
      required: true
      schema:
        type: string
      description: >
        Assinatura HMAC-SHA256 do corpo bruto da requisição, usando o `client_secret`
        compartilhado como chave (hexadecimal minúsculo). Algoritmo detalhado na
        [especificação de Autenticação](../authentication/).

  responses:
    BadRequest:
      description: Requisição inválida — payload malformado ou parâmetros incorretos.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Requisição sem credenciais válidas de autenticação.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso não encontrado.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflito de estado — duplicata, saldo insuficiente ou violação de regra de negócio.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Limite de requisições excedido.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Erro interno inesperado no processamento da requisição.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      description: Corpo padrão de resposta de erro.
      required: [code, message]
      properties:
        code:
          type: string
          description: Código de erro padronizado.
        message:
          type: string
          description: Mensagem descritiva do erro.
        details:
          type: array
          items:
            type: string
          description: Lista opcional de detalhes adicionais.

    AsyncAcceptedResponse:
      type: object
      description: Confirmação de aceite de uma operação processada de forma assíncrona.
      properties:
        status:
          type: string
          enum: [ACCEPTED]
          description: Confirmação de que a solicitação foi aceita para processamento assíncrono.
        correlationId:
          type: string
          description: Identificador de correlação da operação assíncrona para rastreabilidade.

    Identifier:
      type: object
      description: Identificador canônico do cliente — chave primária para deduplicação entre sistemas.
      required: [type, value]
      properties:
        type:
          type: string
          description: "Tipo do identificador (`document`, `phone`, `email`, `external_id`, `custom`)."
        value:
          type: string
          description: Valor do identificador no tipo declarado.

    ExternalIdentifier:
      type: object
      description: "Identificador externo para correlação com sistemas de terceiros (ex.: PDV, ERP)."
      required: [source, value]
      properties:
        source:
          type: string
          description: "Identificador do sistema de origem (ex.: `pdv`, `crm`, `erp`)."
        value:
          type: string
          description: Valor do identificador no sistema de origem.

    ContactPoint:
      type: object
      description: Ponto de contato do cliente (telefone, e-mail ou outro canal).
      required: [type, value]
      properties:
        type:
          type: string
          enum: [phone, email, other]
          description: Tipo do canal de contato.
        value:
          type: string
          description: "Valor do canal de contato (ex.: `+5511999999999`, `maria@example.com`)."

    Consent:
      type: object
      description: Registro de consentimento do cliente para um propósito e canal específicos.
      properties:
        purpose:
          type: string
          description: "Finalidade do consentimento (ex.: `marketing`, `transactional`, `analytics`)."
        channel:
          type: string
          description: "Canal ao qual o consentimento se aplica (ex.: `email`, `sms`, `push`)."
        status:
          type: string
          enum: [opt_in, opt_out, legal_consent, revoked]
          description: Estado atual do consentimento.
        source:
          type: string
          description: "Origem do registro de consentimento (ex.: `checkout`, `app`, `pdv`)."
        grantedAt:
          type: string
          format: date-time
          description: Data/hora em que o consentimento foi concedido (ISO 8601).
        revokedAt:
          type: string
          format: date-time
          description: Data/hora em que o consentimento foi revogado (ISO 8601).

    Address:
      type: object
      description: Endereço do cliente.
      properties:
        type:
          type: string
          description: "Tipo do endereço (ex.: `home`, `work`, `delivery`)."
        street:
          type: string
          description: Logradouro.
        number:
          type: string
          description: Número do endereço.
        complement:
          type: string
          description: "Complemento (ex.: apto, sala)."
        neighborhood:
          type: string
          description: Bairro.
        city:
          type: string
          description: Cidade.
        state:
          type: string
          description: Estado (UF).
        postalCode:
          type: string
          description: CEP ou código postal.
        country:
          type: string
          description: "País (ISO 3166-1 alpha-2, ex.: `BR`)."

    Customer:
      type: object
      description: >
        Entidade central do padrão Customer. O único campo obrigatório é `identifier` —
        todos os demais campos são opcionais e podem ser enriquecidos progressivamente.
      required: [identifier]
      properties:
        id:
          type: string
          description: Identificador interno do cliente no Software Service (CRM).
        identifier:
          $ref: '#/components/schemas/Identifier'
        externalIds:
          type: array
          description: Identificadores externos para correlação e deduplicação entre sistemas.
          items:
            $ref: '#/components/schemas/ExternalIdentifier'
        name:
          type: string
          description: Nome de exibição do cliente.
        contacts:
          type: array
          description: Canais de contato do cliente (telefone, e-mail, etc.).
          items:
            $ref: '#/components/schemas/ContactPoint'
        birthDate:
          type: string
          format: date
          description: "Data de nascimento do cliente (ISO 8601 `YYYY-MM-DD`)."
        addresses:
          type: array
          description: Endereços cadastrados do cliente.
          items:
            $ref: '#/components/schemas/Address'
        metadata:
          type: object
          additionalProperties: true
          description: "Metadados extensíveis para enriquecimento específico de implementação (ex.: restrições, tags, regras customizadas)."
        consents:
          type: array
          description: Registros de consentimento do cliente por propósito e canal.
          items:
            $ref: '#/components/schemas/Consent'
        createdAt:
          type: string
          format: date-time
          description: Data/hora de criação do cliente na plataforma de origem (ISO 8601).
        updatedAt:
          type: string
          format: date-time
          description: Data/hora da última atualização do cliente (ISO 8601).

    CustomerUpsertRequest:
      type: object
      description: Lote de clientes para importação ou sincronização.
      required: [items]
      properties:
        items:
          type: array
          description: Lista de clientes a criar ou atualizar.
          items:
            $ref: '#/components/schemas/Customer'

    CustomerListResponse:
      type: object
      description: Resposta paginada de consulta de clientes.
      properties:
        items:
          type: array
          description: Clientes retornados na página atual.
          items:
            $ref: '#/components/schemas/Customer'
        page:
          type: integer
          description: Número da página atual.
        pageSize:
          type: integer
          description: Tamanho da página retornada.
        total:
          type: integer
          description: Total de registros disponíveis para os filtros aplicados.

    Lead:
      type: object
      description: Potencial cliente em fase de aquisição — estrutura mínima sem exigência de cadastro completo.
      properties:
        id:
          type: string
          description: Identificador único do lead.
        name:
          type: string
          description: Nome do lead, quando disponível.
        contact:
          $ref: '#/components/schemas/ContactPoint'
        source:
          type: string
          description: "Canal ou evento de origem do lead (ex.: `cart_abandoned`, `menu_view`, `form`)."
        metadata:
          type: object
          additionalProperties: true
          description: Metadados extensíveis para enriquecimento específico de implementação.
        createdAt:
          type: string
          format: date-time
          description: Data/hora de captura do lead (ISO 8601).
        updatedAt:
          type: string
          format: date-time
          description: Data/hora da última atualização do lead (ISO 8601).

    LeadUpsertRequest:
      type: object
      description: Lote de leads para importação ou sincronização.
      required: [items]
      properties:
        items:
          type: array
          description: Lista de leads a criar ou atualizar.
          items:
            $ref: '#/components/schemas/Lead'

    LeadListResponse:
      type: object
      description: Resposta paginada de consulta de leads.
      properties:
        items:
          type: array
          description: Leads retornados na página atual.
          items:
            $ref: '#/components/schemas/Lead'
        page:
          type: integer
          description: Número da página atual.
        pageSize:
          type: integer
          description: Tamanho da página retornada.
        total:
          type: integer
          description: Total de registros disponíveis para os filtros aplicados.

    OriginChannel:
      type: string
      description: Canal de origem do pedido.
      enum:
        - own_app
        - marketplace
        - in_store
        - qr_code
        - kiosk
        - delivery
        - takeout
        - other

    OrderCustomerRef:
      type: object
      description: Referência ao cliente vinculado ao pedido no contexto CRM.
      properties:
        identifier:
          $ref: '#/components/schemas/Identifier'
        externalIds:
          type: array
          description: Identificadores externos do cliente para reconciliação.
          items:
            $ref: '#/components/schemas/ExternalIdentifier'

    Order:
      type: object
      description: >
        Visão CRM do pedido — snapshot do histórico de compras do cliente para analytics
        e segmentação. Não replica o lifecycle operacional completo do pedido.
      properties:
        id:
          type: string
          description: Identificador único do pedido na plataforma de origem.
        storeId:
          type: string
          description: Identificador da unidade/loja onde o pedido foi realizado.
        originChannel:
          $ref: '#/components/schemas/OriginChannel'
        customer:
          $ref: '#/components/schemas/OrderCustomerRef'
        totalAmount:
          type: number
          description: Valor total do pedido em centavos (ou unidade monetária base do país).
        items:
          type: array
          description: Itens do pedido relevantes para analytics de relacionamento (nome, SKU, quantidade e valor).
          items:
            type: object
            properties:
              sku:
                type: string
                description: Código SKU do item.
              name:
                type: string
                description: Nome de exibição do item.
              quantity:
                type: integer
                description: Quantidade pedida.
              unitPrice:
                type: number
                description: Preço unitário em centavos.
        metadata:
          type: object
          additionalProperties: true
          description: Metadados extensíveis para campos específicos de cada implementação.
        createdAt:
          type: string
          format: date-time
          description: Data/hora de criação do pedido (ISO 8601).
        updatedAt:
          type: string
          format: date-time
          description: Data/hora da última atualização do pedido (ISO 8601).

    OrderUpsertRequest:
      type: object
      description: Lote de pedidos para importação ou sincronização no contexto CRM.
      required: [items]
      properties:
        items:
          type: array
          description: Lista de pedidos a criar ou atualizar.
          items:
            $ref: '#/components/schemas/Order'

    OrderListResponse:
      type: object
      description: Resposta paginada de consulta de pedidos no contexto CRM.
      properties:
        items:
          type: array
          description: Pedidos retornados na página atual.
          items:
            $ref: '#/components/schemas/Order'
        page:
          type: integer
          description: Número da página atual.
        pageSize:
          type: integer
          description: Tamanho da página retornada.
        total:
          type: integer
          description: Total de registros disponíveis para os filtros aplicados.

    RatingMethod:
      type: string
      description: Metodologia de avaliação utilizada.
      enum: [stars, nps, binary, score, other]

    ReviewRating:
      type: object
      description: Avaliação individual dentro de uma review — suporta múltiplas metodologias por registro.
      properties:
        method:
          $ref: '#/components/schemas/RatingMethod'
        value:
          oneOf:
            - type: integer
            - type: number
            - type: boolean
            - type: string
          description: Valor da avaliação no formato compatível com a metodologia escolhida.
        scaleMin:
          type: number
          description: "Valor mínimo da escala (ex.: 1 para estrelas 1-5, 0 para NPS)."
        scaleMax:
          type: number
          description: "Valor máximo da escala (ex.: 5 para estrelas 1-5, 10 para NPS)."
        isOverall:
          type: boolean
          default: false
          description: Indica se esta avaliação é a nota geral (overall) da review.
        category:
          type: string
          description: "Categoria avaliada — string aberta sem enum fechado no MVP (ex.: `delivery`, `food_quality`, `price`)."
        question:
          type: string
          description: Texto da pergunta associada a esta avaliação, quando aplicável.
        comment:
          type: string
          description: Comentário textual associado a esta avaliação específica.

    Review:
      type: object
      description: Avaliação submetida por um cliente sobre um pedido ou experiência.
      properties:
        id:
          type: string
          description: Identificador único da avaliação.
        customerIdentifier:
          $ref: '#/components/schemas/Identifier'
        orderId:
          type: string
          description: Identificador do pedido avaliado, quando aplicável.
        source:
          type: string
          description: "Sistema ou canal de origem da avaliação (ex.: `app`, `crm`, `totem`)."
        ratings:
          type: array
          description: Lista de avaliações individuais que compõem esta review (suporta múltiplas metodologias).
          items:
            $ref: '#/components/schemas/ReviewRating'
        comment:
          type: string
          description: Comentário geral da review, independente das avaliações individuais.
        createdAt:
          type: string
          format: date-time
          description: Data/hora de criação da avaliação (ISO 8601).

    ReviewUpsertRequest:
      type: object
      description: Lote de avaliações para importação ou sincronização no CRM.
      required: [items]
      properties:
        items:
          type: array
          description: Lista de avaliações a criar ou atualizar.
          items:
            $ref: '#/components/schemas/Review'

    ReviewListResponse:
      type: object
      description: Resposta paginada de consulta de avaliações.
      properties:
        items:
          type: array
          description: Avaliações retornadas na página atual.
          items:
            $ref: '#/components/schemas/Review'
        page:
          type: integer
          description: Número da página atual.
        pageSize:
          type: integer
          description: Tamanho da página retornada.
        total:
          type: integer
          description: Total de registros disponíveis para os filtros aplicados.

    CustomerEventType:
      type: string
      description: Tipo de evento de relacionamento com cliente.
      enum:
        - order.created
        - order.cancelled
        - order.delivered
        - cart.abandoned
        - customer.updated
        - customer.consent.updated
        - review.created

    CustomerEventEnvelope:
      type: object
      description: Envelope de evento de relacionamento com cliente entregue via webhook.
      required: [eventType, occurredAt]
      properties:
        id:
          type: string
          description: Identificador único do evento para idempotência.
        eventType:
          $ref: '#/components/schemas/CustomerEventType'
        occurredAt:
          type: string
          format: date-time
          description: Data/hora de ocorrência do evento de negócio (ISO 8601).
        customerIdentifier:
          $ref: '#/components/schemas/Identifier'
        orderId:
          type: string
          description: Identificador do pedido relacionado, quando aplicável.
        payload:
          type: object
          additionalProperties: true
          description: Payload complementar específico do tipo de evento.

    LoyaltyProgram:
      type: object
      description: Programa de fidelidade — define o escopo, tipo e configuração do programa.
      required: [id, name]
      properties:
        id:
          type: string
          description: Identificador único do programa de fidelidade.
        name:
          type: string
          description: Nome de exibição do programa.
        ownerType:
          type: string
          enum: [store, chain, coalition, shared, other]
          description: "Tipo de proprietário (`store`: loja individual, `chain`: rede, `coalition`: coalizão multi-marca, `shared`: compartilhado)."
        status:
          type: string
          description: "Status atual do programa (ex.: `active`, `inactive`, `suspended`)."
        metadata:
          type: object
          additionalProperties: true
          description: Metadados extensíveis para configurações específicas de implementação.

    LoyaltyProgramUpsertRequest:
      type: object
      description: Lote de programas de fidelidade para cadastro ou sincronização.
      required: [items]
      properties:
        items:
          type: array
          description: Lista de programas a criar ou atualizar.
          items:
            $ref: '#/components/schemas/LoyaltyProgram'

    LoyaltyProgramListResponse:
      type: object
      description: Resposta paginada de consulta de programas de fidelidade.
      properties:
        items:
          type: array
          description: Programas retornados na página atual.
          items:
            $ref: '#/components/schemas/LoyaltyProgram'
        page:
          type: integer
          description: Número da página atual.
        pageSize:
          type: integer
          description: Tamanho da página retornada.
        total:
          type: integer
          description: Total de registros disponíveis.

    LoyaltyBalanceType:
      type: string
      description: Tipo de saldo da conta de fidelidade.
      enum: [points, cashback, other]

    LoyaltyAccount:
      type: object
      description: Conta de fidelidade vinculada a um cliente e programa. Agrupa saldo, tipo e metadados de fidelidade.
      properties:
        id:
          type: string
          description: Identificador único da conta de fidelidade.
        programId:
          type: string
          description: Identificador do programa ao qual esta conta pertence.
        customerId:
          type: string
          description: Identificador do cliente vinculado à conta.
        balanceType:
          $ref: '#/components/schemas/LoyaltyBalanceType'
        balance:
          type: number
          description: "Saldo disponível na conta (pontos, reais ou outra unidade conforme `balanceType`)."
        currency:
          type: string
          description: "Código da moeda quando `balanceType` é `cashback` (ISO 4217, ex.: `BRL`)."
        expiresAt:
          type: string
          format: date-time
          description: Data/hora de expiração do saldo, quando aplicável (ISO 8601).
        metadata:
          type: object
          additionalProperties: true
          description: "Metadados extensíveis (ex.: tier, data de ingresso no programa, status da conta)."

    LoyaltyAccountListResponse:
      type: object
      description: Lista de contas de fidelidade de um cliente.
      properties:
        items:
          type: array
          description: Contas de fidelidade retornadas.
          items:
            $ref: '#/components/schemas/LoyaltyAccount'

    LoyaltyTransactionType:
      type: string
      description: Tipo de movimentação na conta de fidelidade.
      enum: [earn, redeem, adjust, expire, coupon_use, tier_change, other]

    LoyaltyTransaction:
      type: object
      description: Movimentação na conta de fidelidade — acúmulo, resgate, ajuste ou expiração.
      properties:
        id:
          type: string
          description: Identificador único da transação.
        accountId:
          type: string
          description: Identificador da conta de fidelidade relacionada.
        type:
          $ref: '#/components/schemas/LoyaltyTransactionType'
        amount:
          type: number
          description: Valor da movimentação (positivo para acúmulo, negativo para resgate/expiração).
        relatedOrderId:
          type: string
          description: Identificador do pedido que originou a movimentação, quando aplicável.
        occurredAt:
          type: string
          format: date-time
          description: Data/hora em que a movimentação ocorreu (ISO 8601).
        metadata:
          type: object
          additionalProperties: true
          description: Metadados complementares da transação.

    LoyaltyTransactionListResponse:
      type: object
      description: Resposta paginada de consulta de movimentações de fidelidade.
      properties:
        items:
          type: array
          description: Movimentações retornadas na página atual.
          items:
            $ref: '#/components/schemas/LoyaltyTransaction'
        page:
          type: integer
          description: Número da página atual.
        pageSize:
          type: integer
          description: Tamanho da página retornada.
        total:
          type: integer
          description: Total de movimentações disponíveis para os filtros aplicados.

    LoyaltyRewardType:
      type: string
      description: Tipo de recompensa resgatável no catálogo.
      enum: [product, shipping, cashback, generic]

    LoyaltyReward:
      type: object
      description: Recompensa disponível no catálogo do programa de fidelidade para resgate.
      properties:
        id:
          type: string
          description: Identificador único da recompensa.
        programId:
          type: string
          description: Identificador do programa ao qual a recompensa pertence.
        type:
          $ref: '#/components/schemas/LoyaltyRewardType'
        name:
          type: string
          description: "Nome de exibição da recompensa (ex.: `R$10 Off`, `Frete Grátis`, `Sobremesa Grátis`)."
        sku:
          type: string
          description: "SKU do produto associado, quando `type` for `product`."
        cost:
          type: number
          description: Custo em pontos/cashback necessário para resgatar esta recompensa.
        metadata:
          type: object
          additionalProperties: true
          description: "Metadados extensíveis da recompensa (ex.: validade, imagem, restrições de uso)."

    LoyaltyRewardListResponse:
      type: object
      description: Resposta paginada de consulta do catálogo de recompensas.
      properties:
        items:
          type: array
          description: Recompensas retornadas na página atual.
          items:
            $ref: '#/components/schemas/LoyaltyReward'
        page:
          type: integer
          description: Número da página atual.
        pageSize:
          type: integer
          description: Tamanho da página retornada.
        total:
          type: integer
          description: Total de recompensas disponíveis para os filtros aplicados.

    LoyaltyCoupon:
      type: object
      description: Cupom de fidelidade ou relacionamento vinculado a um cliente — gerado por resgate ou distribuído por campanha.
      properties:
        id:
          type: string
          description: Identificador único do cupom.
        programId:
          type: string
          description: Identificador do programa de fidelidade associado, quando aplicável.
        customerId:
          type: string
          description: Identificador do cliente detentor do cupom.
        code:
          type: string
          description: Código de uso do cupom (aplicado no checkout).
        status:
          type: string
          description: "Status atual do cupom (`available`, `applied`, `used`, `expired`, `cancelled`)."
        metadata:
          type: object
          additionalProperties: true
          description: "Metadados extensíveis do cupom (ex.: tipo, valor, restrições de uso)."
        expiresAt:
          type: string
          format: date-time
          description: Data/hora de expiração do cupom (ISO 8601).

    LoyaltyCouponListResponse:
      type: object
      description: Resposta paginada de consulta de cupons.
      properties:
        items:
          type: array
          description: Cupons retornados na página atual.
          items:
            $ref: '#/components/schemas/LoyaltyCoupon'
        page:
          type: integer
          description: Número da página atual.
        pageSize:
          type: integer
          description: Tamanho da página retornada.
        total:
          type: integer
          description: Total de cupons disponíveis para os filtros aplicados.

    LoyaltyRedemptionRequest:
      type: object
      description: Solicitação de resgate de uma recompensa do catálogo para o cliente.
      required: [accountId, rewardId]
      properties:
        accountId:
          type: string
          description: Identificador da conta de fidelidade do cliente que está resgatando.
        rewardId:
          type: string
          description: Identificador da recompensa a ser resgatada do catálogo.
        quantity:
          type: integer
          default: 1
          description: "Quantidade de unidades a resgatar (default: 1)."
        relatedOrderId:
          type: string
          description: Identificador do pedido relacionado ao resgate, quando aplicável.
        metadata:
          type: object
          additionalProperties: true
          description: Metadados complementares do resgate para rastreabilidade.

    LoyaltyEventType:
      type: string
      description: Tipo de evento de movimentação de fidelidade.
      enum:
        - loyalty.points.earned
        - loyalty.cashback.earned
        - loyalty.redemption.created
        - loyalty.coupon.used
        - loyalty.tier.changed

    LoyaltyEventEnvelope:
      type: object
      description: Envelope de evento de fidelidade entregue via webhook à Ordering Application.
      required: [eventType, occurredAt]
      properties:
        id:
          type: string
          description: Identificador único do evento para idempotência.
        eventType:
          $ref: '#/components/schemas/LoyaltyEventType'
        occurredAt:
          type: string
          format: date-time
          description: Data/hora de ocorrência do evento de negócio (ISO 8601).
        accountId:
          type: string
          description: Identificador da conta de fidelidade relacionada ao evento.
        customerId:
          type: string
          description: Identificador do cliente relacionado ao evento.
        programId:
          type: string
          description: Identificador do programa de fidelidade relacionado ao evento.
        payload:
          type: object
          additionalProperties: true
          description: "Payload complementar específico do tipo de evento (ex.: pontos acumulados, tier atingido)."
