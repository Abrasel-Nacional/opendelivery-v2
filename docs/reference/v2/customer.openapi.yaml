openapi: 3.1.0
x-spectral-ignore:
  - owasp:api4:2023-string-restricted
info:
  title: Open Delivery V2 — Customer
  version: 2.0.0-rc
  summary: Normative Customer contracts — customer data, leads, relationship orders, reviews, loyalty, and events
  description: |-
    ## Release Candidate status

    This contract is part of Open Delivery Protocol **V2.0.0-rc** (Release Candidate).
    It is published for **ecosystem validation**: company review and implementation pilots.
    Clarifying or corrective changes may still occur based on pilot feedback.
    A stable release will follow only after validation completes.
    **V1 remains the production reference** during the transition.

    ---

    This specification is the **normative, self-contained contract** of the Open Delivery
    **Customer** capability: customer records, leads, order history in a **customer-data**
    context, reviews, relationship events, and loyalty programs.

    An implementer MUST be able to integrate using **only this document** for the modules
    they implement. Guides are listed under **External docs**.

    ## Capability name

    The capability is named **`customer`** only. There is **no** capability named “CRM”.
    **CRM software** is a product class that MAY implement or consume Customer endpoints
    (often called **Software CRM** in guides). Do not rename the protocol capability to CRM.

    ## Modular modules (not Discovery extensions)

    Customer is **one** capability. Within it, parties MAY implement:

    | Module | Typical paths | Standalone? |
    |---|---|---|
    | **Core customer data** | `/customers`, `/leads`, customer-context `/orders`, `customerEvent` | Base module |
    | **Reviews** | `/reviews`, review-related events | **MAY implement Reviews alone** among Customer modules |
    | **Loyalty** | `/loyalty/*`, loyalty accounts, `loyaltyEvent` | **MAY implement Loyalty alone** among Customer modules |

    Reviews and Loyalty are **not** separate Discovery extensions and **not** separate
    capabilities. They are optional modules of Customer. Discovery SHOULD declare which
    Customer operations/modules are active.

    Customer **does not require** Orders for the core customer-data and reviews modules.
    When customer-context orders are exchanged, the **order data shape is the same as**
    the [Orders](../orders/) capability — do not redefine order schema here.

    ## Async-first model

    Batch and write operations typically return `202 Accepted`. Webhooks notify facts.
    Deduplicate by event id. Do not treat HTTP status alone as final business confirmation.

    ## Authorization

    Bearer OAuth 2.0. Preferred scope: `od.crm` (historical name for customer-domain access)
    or scopes declared in Discovery. See [Authentication](../authentication/).

