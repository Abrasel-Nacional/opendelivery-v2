    #     '500':
    #       $ref: '#/components/responses/InternalServerError'

  /accounts/fiscal:
    post:
      tags: [Fiscal]
      operationId: requestFiscalDocument
      summary: Solicitar emissão/associação fiscal da conta
      description: >
        Solicita a emissão ou recuperação do documento fiscal associado à conta.
        O processamento é assíncrono e deve ser acompanhado por eventos e/ou GET de fallback.
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FiscalRequest'
      responses:
        '202':
          description: Solicitação fiscal aceita
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Fiscal]
      operationId: listAccountFiscalDocuments
      summary: Listar documentos fiscais vinculados à conta
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      responses:
        '200':
          description: Lista de documentos fiscais
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    maxItems: 1000
                    items:
                      $ref: '#/components/schemas/FiscalDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

