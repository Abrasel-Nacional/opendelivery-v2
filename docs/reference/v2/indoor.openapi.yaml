openapi: 3.1.0
x-spectral-ignore:
  - owasp:api4:2023-string-restricted
info:
  title: Open Delivery V2 - Salão / Indoor API
  version: 2.0.0-rc
  summary: API proposta para operações de salão/indoor no Open Delivery V2
  description: >
    Especificação proposta para o módulo Salão/Indoor do Open Delivery V2.
    O pedido continua sendo o canal de entrada de itens, enquanto a conta
    é a entidade central para agrupamento operacional, pagamentos, eventos,
    fechamento e integração fiscal.

servers:
  - url: https://api.example.com/od/v2
    description: Ambiente de production
    x-internal: false
  - url: https://sandbox.example.com/od/v2
    description: Ambiente de staging/homologação
    x-internal: true

security:
  - bearerAuth: []

tags:
  - name: Orders
    description: Operações de criação e consulta de pedidos indoor
  - name: Accounts
    description: Operações sobre conta de salão (mesa, comanda, balcão)
  - name: Payments
    description: Lançamentos de pagamentos da conta
  - name: Fiscal
    description: Solicitação e consulta de documentos fiscais
  - name: Events
    description: Consulta por polling de eventos emitidos pelo ciclo de vida da conta

paths:
  /orders:
    post:
      tags: [Orders]
      operationId: createIndoorOrder
      summary: Criar pedido indoor
      description: >
        Cria um pedido do tipo INDOOR. O pedido é o canal de entrada dos itens
        e pode criar ou localizar uma conta operacional associada à combinação
        operationMode + identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '201':
          description: Pedido criado com sucesso
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}:
    get:
      tags: [Orders]
      operationId: getOrderById
      summary: Consultar pedido por ID
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Pedido encontrado
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts:
    post:
      tags: [Accounts]
      operationId: openAccount
      summary: Abrir conta explicitamente
      description: >
        Abre uma conta explicitamente quando a implementação desejar criar a conta
        antes do primeiro pedido. Em implementações que não trabalham com abertura
        explícita, a conta também pode nascer implicitamente no primeiro POST /orders.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountOpenRequest'
      responses:
        '201':
          description: Conta aberta
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '409':
          $ref: '#/components/responses/Conflict'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Accounts]
      operationId: getAccount
      summary: Consultar conta por chave operacional
      description: >
        Recupera a conta ativa usando a chave operacional (operationMode + identifier).
        Esta é a forma primária de acessar e operar sobre uma conta.
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      responses:
        '200':
          description: Conta encontrada
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags: [Accounts]
      operationId: updateAccount
      summary: Atualizar metadados da conta
      description: >
        Atualiza atributos operacionais da conta, como identificação, serviço,
        notificações ou configurações aplicáveis enquanto a conta estiver ativa.
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequest'
      responses:
        '200':
          description: Conta atualizada
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/{accountId}:
    get:
      tags: [Accounts]
      operationId: getAccountById
      summary: Consultar conta por accountId
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Conta encontrada
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/pre-close:
    post:
      tags: [Accounts]
      operationId: preCloseAccount
      summary: Pré-fechar / bloquear conta para pagamento
      description: >
        Solicita o pré-fechamento da conta, também tratado como lock operacional
        para impedir alterações concorrentes durante o checkout.
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountPreCloseRequest'
      responses:
        '202':
          description: Solicitação de pré-fechamento aceita
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/unlock:
    post:
      tags: [Accounts]
      operationId: unlockAccount
      summary: Desbloquear conta
      description: >
        Remove o lock/pre-close da conta quando o PDV permitir reabertura do fluxo
        operacional antes do fechamento final.
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUnlockRequest'
      responses:
        '202':
          description: Solicitação de desbloqueio aceita
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/close:
    post:
      tags: [Accounts]
      operationId: closeAccount
      summary: Fechar conta definitivamente
      description: >
        Fecha a conta definitivamente. O fechamento final representa o marco
        operacional absoluto e irreversível da conta.
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCloseRequest'
      responses:
        '202':
          description: Solicitação de fechamento aceita
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/items/{itemId}/cancel:
    post:
      tags: [Accounts]
      operationId: cancelAccountItem
      summary: Cancelar item da conta
      description: >
        Cancela um item já lançado na conta. Alterações semânticas de item devem
        ser tratadas como cancelamento e novo lançamento, e não edição direta do item.
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
        - $ref: '#/components/parameters/ItemId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCancelRequest'
      responses:
        '200':
          description: Item cancelado
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/transfers:
    post:
      tags: [Accounts]
      operationId: transferAccountContent
      summary: Transferir itens ou conta completa
      description: >
        Executa operação atômica de transferência entre contas/operações.
        Permite transferência parcial por item ou transferência total da conta/mesa.
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Transferência concluída
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /accounts/payments:
    post:
      tags: [Payments]
      operationId: createPayment
      summary: Lançar pagamento na conta
      description: >
        Registra um lançamento de pagamento na conta. O pagamento pode ser total
        ou parcial, por valor, e opcionalmente por item, conforme capacidade do PDV.
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
      responses:
        '201':
          description: Pagamento lançado
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags: [Payments]
      operationId: listAccountPayments
      summary: Listar pagamentos da conta
      parameters:
        - $ref: '#/components/parameters/OperationModeQuery'
        - $ref: '#/components/parameters/IdentifierQuery'
      responses:
        '200':
          description: Lista de pagamentos
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    maxItems: 1000
                    items:
                      $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

